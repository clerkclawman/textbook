<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phonics Flashcards</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Comic Sans MS', 'Chalkboard SE', 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      overflow: hidden;
    }
    
    header {
      position: fixed;
      top: 8px;
      left: 8px;
      z-index: 100;
    }
    
    .mini-clock {
      font-family: 'Courier New', monospace;
      font-size: 0.7rem;
      color: rgba(255,255,255,0.7);
      background: rgba(0,0,0,0.2);
      padding: 0.25rem 0.5rem;
      border-radius: 6px;
    }
    
    @media TV { .mini-clock { font-size: 1rem; } }
    
    .controls-top {
      position: fixed;
      top: 8px;
      right: 8px;
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      justify-content: flex-end;
      padding: 0.4rem 0.6rem;
      background: rgba(0,0,0,0.3);
      border-radius: 15px;
      z-index: 100;
    }
    
    .controls-bottom {
      position: fixed;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      justify-content: center;
      padding: 0.5rem 0.8rem;
      background: rgba(0,0,0,0.3);
      border-radius: 20px;
      z-index: 100;
    }
    
    .controls button, .controls select, .controls-top button, .controls-top select, .controls-bottom button, .controls-bottom select {
      padding: 0.4rem 0.8rem;
      border: 1.5px solid rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.1);
      color: #fff;
      font-size: 0.65rem;
      cursor: pointer;
      border-radius: 12px;
      transition: all 0.2s ease;
      font-weight: 600;
    }
    
    .controls-top button, .controls-top select {
      font-size: 0.6rem;
      padding: 0.3rem 0.6rem;
    }
    
    .controls-bottom button, .controls-bottom select {
      font-size: 0.7rem;
      padding: 0.5rem 0.9rem;
    }
    
    .controls button:hover, .controls select:hover, .controls-top button:hover, .controls-top select:hover, .controls-bottom button:hover, .controls-bottom select:hover {
      background: rgba(255,255,255,0.2);
      border-color: rgba(255,255,255,0.5);
    }
    
    .controls button.active, .controls select.active, .controls-top button.active, .controls-top select.active, .controls-bottom button.active, .controls-bottom select.active {
      background: rgba(255,255,255,0.25);
      color: #fbbf24;
      border-color: #fbbf24;
    }
    
    .card-container {
      perspective: 1000px;
      width: min(85vw, 90vh);
      height: min(85vh, 90vw);
      max-width: 900px;
      max-height: 800px;
    }
    
    .card {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.6s ease;
      cursor: pointer;
    }
    
    .card.flipped { transform: rotateY(180deg); }
    
    .card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 30px;
      box-shadow: 0 25px 80px rgba(0,0,0,0.4);
      font-weight: 900;
    }
    
    .card-front {
      background: #fff;
      color: #667eea;
      font-size: min(42vw, 38vh);
    }
    
    .card-back {
      background: linear-gradient(145deg, #fff9c4, #fff59d);
      color: #333;
      transform: rotateY(180deg);
      font-size: min(22vw, 20vh);
      flex-direction: column;
      gap: 1.5rem;
    }
    
    .emoji {
      font-size: min(28vw, 26vh);
    }
    
    @media TV {
      .card-container { max-width: 1000px; max-height: 850px; }
      .card-front { font-size: 500px !important; }
      .card-back { font-size: 320px !important; }
      .emoji { font-size: 300px !important; }
      .controls button, .controls select, .controls-top button, .controls-top select, .controls-bottom button, .controls-bottom select { font-size: 0.9rem; padding: 0.6rem 1rem; }
      .home-btn { font-size: 0.8rem; }
    }
    
    @media (max-width: 768px) {
      .mini-clock { font-size: 0.6rem; padding: 0.2rem 0.4rem; }
      
      .controls-top {
        top: 4px;
        right: 4px;
        left: 4px;
        justify-content: center;
        gap: 0.3rem;
        padding: 0.3rem 0.5rem;
        flex-wrap: wrap;
      }
      
      .controls-top button, .controls-top select {
        font-size: 0.55rem;
        padding: 0.25rem 0.5rem;
        border-radius: 8px;
      }
      
      .controls-bottom {
        bottom: 4px;
        left: 4px;
        right: 4px;
        transform: none;
        gap: 0.4rem;
        padding: 0.4rem 0.6rem;
        width: auto;
      }
      
      .controls-bottom button, .controls-bottom select {
        font-size: 0.6rem;
        padding: 0.3rem 0.7rem;
        border-radius: 10px;
      }
      
      .card-container {
        width: 85vw;
        height: 45vh;
        margin-top: 8vh;
      }
      
      .card-front { font-size: 30vw; }
      .card-back { font-size: 18vw; }
      .emoji { font-size: 22vw; }
      
      .home-btn {
        bottom: 45px;
        right: 4px;
        font-size: 0.55rem;
        padding: 0.3rem 0.5rem;
      }
    }
    
    @media (min-width: 769px) and (max-width: 1023px) {
      .card-container {
        width: 80vw;
        height: 55vh;
      }
      
      .card-front { font-size: 25vw; }
      .card-back { font-size: 15vw; }
      .emoji { font-size: 18vw; }
      
      .controls-top {
        top: 6px;
        padding: 0.4rem 0.7rem;
      }
      
      .controls-bottom {
        bottom: 6px;
        padding: 0.5rem 0.8rem;
      }
    }
    
    .home-btn {
      position: fixed;
      bottom: 50px;
      right: 8px;
      background: rgba(255,255,255,0.15);
      color: #fff;
      border: 1.5px solid rgba(255,255,255,0.3);
      padding: 0.4rem 0.6rem;
      border-radius: 8px;
      font-size: 0.65rem;
      font-weight: 600;
      cursor: pointer;
      z-index: 101;
      transition: all 0.2s;
      text-decoration: none;
    }
    
    .home-btn:hover { background: rgba(255,255,255,0.25); }
  </style>
</head>
<body>
  <header>
    <div class="mini-clock" id="miniClock"></div>
  </header>
  
  <div class="controls-top">
    <select id="deckSelect">
      <option value="basic">Basic</option>
      <option value="advanced">Phonics</option>
      <option value="sight-words">Sight</option>
    </select>
    <select id="caseSelect">
      <option value="upper">ABC</option>
      <option value="lower">abc</option>
    </select>
    <button id="orderBtn" data-order="alphabetical">A→Z</button>
    <button id="jumbleBtn" data-order="jumble">🔀</button>
  </div>
  
  <div class="controls-bottom">
    <button id="prevBtn">←</button>
    <select id="autoRotateSelect">
      <option value="off">Auto: Off</option>
      <option value="slow">3s</option>
      <option value="fast">1s</option>
    </select>
    <button id="nextBtn">→</button>
  </div>
  
  <div class="card-container">
    <div class="card" id="card">
      <div class="card-face card-front">
        <div id="letter">A</div>
      </div>
      <div class="card-face card-back">
        <div id="word">apple</div>
        <div id="emoji">🍎</div>
      </div>
    </div>
  </div>

  <script>
    const basicData = [
      { letter: 'A', word: 'apple', emoji: '🍎' },
      { letter: 'B', word: 'ball', emoji: '⚽' },
      { letter: 'C', word: 'cat', emoji: '🐱' },
      { letter: 'D', word: 'dog', emoji: '🐕' },
      { letter: 'E', word: 'egg', emoji: '🥚' },
      { letter: 'F', word: 'fish', emoji: '🐟' },
      { letter: 'G', word: 'goat', emoji: '🐐' },
      { letter: 'H', word: 'hat', emoji: '🎩' },
      { letter: 'I', word: 'ice cream', emoji: '🍦' },
      { letter: 'J', word: 'juice', emoji: '🧃' },
      { letter: 'K', word: 'kite', emoji: '🪁' },
      { letter: 'L', word: 'lemon', emoji: '🍋' },
      { letter: 'M', word: 'milk', emoji: '🥛' },
      { letter: 'N', word: 'nest', emoji: '🪺' },
      { letter: 'O', word: 'orange', emoji: '🍊' },
      { letter: 'P', word: 'pig', emoji: '🐷' },
      { letter: 'Q', word: 'queen', emoji: '👸' },
      { letter: 'R', word: 'rabbit', emoji: '🐰' },
      { letter: 'S', word: 'sun', emoji: '☀️' },
      { letter: 'T', word: 'tree', emoji: '🌳' },
      { letter: 'U', word: 'umbrella', emoji: '☂️' },
      { letter: 'V', word: 'van', emoji: '🚐' },
      { letter: 'W', word: 'water', emoji: '💧' },
      { letter: 'X', word: 'xylophone', emoji: '🎵' },
      { letter: 'Y', word: 'yogurt', emoji: '🥣' },
      { letter: 'Z', word: 'zebra', emoji: '🦓' }
    ];
    
    const advancedData = [
      { letter: 'sh', word: 'ship', emoji: '⛵' },
      { letter: 'ch', word: 'chip', emoji: '🍟' },
      { letter: 'th', word: 'thumb', emoji: '👍' },
      { letter: 'wh', word: 'what', emoji: '❓' },
      { letter: 'ph', word: 'phone', emoji: '📱' },
      { letter: 'ck', word: 'duck', emoji: '🦆' },
      { letter: 'ng', word: 'sing', emoji: '🎤' },
      { letter: 'bl', word: 'blue', emoji: '🔵' },
      { letter: 'cl', word: 'clock', emoji: '⏰' },
      { letter: 'fl', word: 'flower', emoji: '🌸' },
      { letter: 'pl', word: 'plane', emoji: '✈️' },
      { letter: 'sl', word: 'sleep', emoji: '😴' },
      { letter: 'br', word: 'brown', emoji: '🟤' },
      { letter: 'cr', word: 'crab', emoji: '🦀' },
      { letter: 'dr', word: 'dragon', emoji: '🐉' },
      { letter: 'fr', word: 'frog', emoji: '🐸' },
      { letter: 'gr', word: 'green', emoji: '🟢' },
      { letter: 'pr', word: 'prince', emoji: '🤴' },
      { letter: 'tr', word: 'tree', emoji: '🌳' },
      { letter: 'st', word: 'star', emoji: '⭐' },
      { letter: 'sp', word: 'spoon', emoji: '🥄' },
      { letter: 'sm', word: 'smile', emoji: '😊' },
      { letter: 'sn', word: 'snake', emoji: '🐍' },
      { letter: 'sw', word: 'swim', emoji: '🏊' },
      { letter: 'sc', word: 'scarf', emoji: '🧣' },
      { letter: 'sk', word: 'skunk', emoji: '🦨' },
      { letter: 'spl', word: 'splash', emoji: '💦' },
      { letter: 'spr', word: 'spring', emoji: '🌷' },
      { letter: 'str', word: 'stripe', emoji: '🐯' },
      { letter: 'scr', word: 'scream', emoji: '😱' },
      { letter: 'ai', word: 'rain', emoji: '🌧️' },
      { letter: 'ay', word: 'day', emoji: '☀️' },
      { letter: 'ee', word: 'tree', emoji: '🌳' },
      { letter: 'ie', word: 'pie', emoji: '🥧' },
      { letter: 'oa', word: 'soap', emoji: '🧼' },
      { letter: 'ow', word: 'owl', emoji: '🦉' },
      { letter: 'oi', word: 'coin', emoji: '🪙' },
      { letter: 'oy', word: 'boy', emoji: '👦' },
      { letter: 'oo', word: 'moon', emoji: '🌚' },
      { letter: 'ue', word: 'blue', emoji: '🔵' },
      { letter: 'aw', word: 'saw', emoji: '🪚' },
      { letter: 'ew', word: 'new', emoji: '✨' }
    ];
    
    const sightWordsData = [
      { letter: 'the', word: 'その (sono)', emoji: '📝' },
      { letter: 'be', word: 'ある (aru)', emoji: '✓' },
      { letter: 'to', word: 'へ (e)', emoji: '↘️' },
      { letter: 'of', word: 'の (no)', emoji: '📦' },
      { letter: 'and', word: 'と (to)', emoji: '&' },
      { letter: 'I', word: '私', emoji: '👤' },
      { letter: 'a', word: '一 (ichi)', emoji: '🔤' },
      { letter: 'in', word: 'に (ni)', emoji: '📥' },
      { letter: 'is', word: 'です (desu)', emoji: '✅' },
      { letter: 'it', word: 'それ (sore)', emoji: '📎' },
      { letter: 'you', word: 'あなた', emoji: '👥' },
      { letter: 'he', word: '彼', emoji: '👨' },
      { letter: 'she', word: '彼女', emoji: '👩' },
      { letter: 'we', word: '私達', emoji: '👥' },
      { letter: 'they', word: '彼ら', emoji: '👥' },
      { letter: 'have', word: 'ある (aru)', emoji: '✋' },
      { letter: 'are', word: '～です (~desu)', emoji: '✅' },
      { letter: 'was', word: 'でした (deshita)', emoji: '✓' },
      { letter: 'what', word: '何', emoji: '❓' },
      { letter: 'when', word: 'いつ (itsu)', emoji: '🕐' },
      { letter: 'where', word: 'どこ (doko)', emoji: '📍' },
      { letter: 'who', word: '誰', emoji: '👤' },
      { letter: 'how', word: 'どう', emoji: '🤔' },
      { letter: 'come', word: '来る (kuru)', emoji: '🏃' },
      { letter: 'go', word: '行く (iku)', emoji: '🚶' },
      { letter: 'do', word: 'する (suru)', emoji: '✍' },
      { letter: 'will', word: '～する (suru)', emoji: '🔮' },
      { letter: 'say', word: '言う (iu)', emoji: '💬' },
      { letter: 'see', word: '見る (miru)', emoji: '👀' },
      { letter: 'make', word: '作る (tsukuru)', emoji: '🔨' },
      { letter: 'take', word: '取る (toru)', emoji: '🤲' },
      { letter: 'know', word: '知る (shiru)', emoji: '💡' },
      { letter: 'think', word: '思う (omou)', emoji: '💭' },
      { letter: 'look', word: '見る (miru)', emoji: '👀' },
      { letter: 'want', word: '欲しい (hoshii)', emoji: '💭' },
      { letter: 'like', word: '好き', emoji: '❤️' },
      { letter: 'love', word: '好き愛 (suki-ai)', emoji: '💕' },
      { letter: 'can', word: 'できる (dekiru)', emoji: '✅' },
      { letter: 'play', word: '遊ぶ (asobu)', emoji: '🎮' },
      { letter: 'stop', word: '止まる (tomeru)', emoji: '🛑' },
      { letter: 'good', word: 'いい (ii)', emoji: '✨' },
      { letter: 'bad', word: '悪い (warui)', emoji: '❌' },
      { letter: 'big', word: '大きい (ookii)', emoji: '🐘' },
      { letter: 'little', word: '小さい (chiisai)', emoji: '🐣' },
      { letter: 'help', word: '手伝う (tetsudau)', emoji: '🆘' },
      { letter: 'please', word: 'おねがいします', emoji: '🙏' },
      { letter: 'thank', word: 'ありがとう', emoji: '🙏' }
    ];
    
    let currentDeck = 'basic';
    let currentData = [...basicData];
    let currentIndex = 0;
    let isFlipped = false;
    let autoRotateInterval = null;
    let useUppercase = true;
    let useAlphabetical = true;
    
    const card = document.getElementById('card');
    const letterEl = document.getElementById('letter');
    const wordEl = document.getElementById('word');
    const emojiEl = document.getElementById('emoji');
    const deckSelect = document.getElementById('deckSelect');
    const caseSelect = document.getElementById('caseSelect');
    const orderBtn = document.getElementById('orderBtn');
    const jumbleBtn = document.getElementById('jumbleBtn');
    const autoRotateSelect = document.getElementById('autoRotateSelect');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    
    function updateCard() {
      const item = currentData[currentIndex];
      
      if (currentDeck === 'sight-words') {
        letterEl.textContent = item.letter;
        wordEl.textContent = item.word;
        emojiEl.textContent = item.emoji;
      } else {
        letterEl.textContent = useUppercase ? item.letter.toUpperCase() : item.letter.toLowerCase();
        wordEl.textContent = item.word;
        emojiEl.textContent = item.emoji;
      }
      
      isFlipped = false;
      card.classList.remove('flipped');
    }
    
    function flipCard() {
      isFlipped = !isFlipped;
      card.classList.toggle('flipped');
    }
    
    function nextCard() {
      currentIndex = (currentIndex + 1) % currentData.length;
      updateCard();
    }
    
    function prevCard() {
      currentIndex = (currentIndex - 1 + currentData.length) % currentData.length;
      updateCard();
    }
    
    function sortData() {
      if (useAlphabetical) {
        currentData.sort((a, b) => a.letter.localeCompare(b.letter));
        orderBtn.classList.add('active');
        jumbleBtn.classList.remove('active');
      } else {
        currentData.sort(() => Math.random() - 0.5);
        orderBtn.classList.remove('active');
        jumbleBtn.classList.add('active');
      }
      currentIndex = 0;
      updateCard();
    }
    
    function switchDeck(deckName) {
      currentDeck = deckName;
      currentIndex = 0;
      
      switch(deckName) {
        case 'basic': currentData = [...basicData]; useUppercase = true; break;
        case 'advanced': currentData = [...advancedData]; useUppercase = false; break;
        case 'sight-words': currentData = [...sightWordsData]; useUppercase = false; break;
      }
      
      useAlphabetical = true;
      updateCard();
    }
    
    function setAutoRotate() {
      clearInterval(autoRotateInterval);
      
      const value = autoRotateSelect.value;
      if (value === 'slow') {
        autoRotateInterval = setInterval(() => {
          if (isFlipped) { flipCard(); } else { nextCard(); }
        }, 3000);
      } else if (value === 'fast') {
        autoRotateInterval = setInterval(() => {
          if (isFlipped) { flipCard(); } else { nextCard(); }
        }, 1000);
      }
    }
    
    card.addEventListener('click', flipCard);
    nextBtn.addEventListener('click', nextCard);
    prevBtn.addEventListener('click', prevCard);
    deckSelect.onchange = () => switchDeck(deckSelect.value);
    caseSelect.addEventListener('change', () => {
      useUppercase = caseSelect.value === 'upper';
      if (currentDeck === 'basic') updateCard();
    });
    orderBtn.addEventListener('click', () => {
      useAlphabetical = true;
      sortData();
    });
    jumbleBtn.addEventListener('click', () => {
      useAlphabetical = false;
      sortData();
    });
    autoRotateSelect.addEventListener('change', setAutoRotate);
    
    document.addEventListener('keydown', (e) => {
      switch(e.key) {
        case ' ':
        case 'Enter': flipCard(); break;
        case 'ArrowRight': nextCard(); break;
        case 'ArrowLeft': prevCard(); break;
      }
    });
    
    function updateMiniClock() {
      const now = new Date();
      const time = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
      const date = now.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
      document.getElementById('miniClock').textContent = `${date} ${time}`;
    }
    
    setInterval(updateMiniClock, 1000);
    updateMiniClock();
    updateCard();
    orderBtn.classList.add('active');
  </script>
  
  <a href="index.html" class="home-btn">🏠</a>
</body>
</html>
