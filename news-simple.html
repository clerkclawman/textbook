<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>NEWS</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      overflow: hidden;
      scrollbar-width: none;
    }

    html::-webkit-scrollbar { display: none; }

    body {
      font-family: 'Segoe UI', 'Poppins', 'Helvetica Neue', 'Arial', sans-serif;
      background: #000000;
      color: #fff;
      height: 100vh;
      width: 100vw;
      max-width: 100vw;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    header {
      position: fixed;
      top: 8px;
      left: 8px;
      right: 8px;
      background: rgba(0,0,0,0.3);
      color: #fff;
      padding: 0.5vh 1vw;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
      border-radius: 10px;
      z-index: 100;
      overflow: hidden;
      height: 4vh;
    }

    .logo {
      font-size: 2.8vh;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .page-info {
      background: rgba(251, 191, 36, 0.2);
      color: #fbbf24;
      padding: 0.5rem 1rem;
      font-weight: 700;
      border-radius: 8px;
      font-size: 2vh;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      border: 2px solid rgba(251, 191, 36, 0.3);
    }

    .page-indicator {
      font-size: 2.5vh;
      font-weight: 800;
    }

    .section-toggle {
      display: flex;
      gap: 1vw;
    }

    .toggle-btn {
      background: rgba(102, 126, 234, 0.3);
      border: 2px solid rgba(102, 126, 234, 0.5);
      color: #e5e7eb;
      padding: 0.5vh 1vw;
      font-size: 2vh;
      font-weight: 700;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .toggle-btn:hover {
      background: rgba(102, 126, 234, 0.5);
    }

    .toggle-btn.active {
      background: rgba(102, 126, 234, 0.8);
      border-color: #667eea;
    }

    .mini-clock {
      font-family: 'Courier New', 'Segoe UI', monospace;
      font-size: 3vh;
      color: #0f0;
      background: rgba(0,0,0,0.85);
      padding: 0.6vh 1.2vw;
      border-radius: 8px;
      border: 2px solid rgba(0,255,0,0.4);
      min-width: 280px;
      font-weight: bold;
      box-shadow: 0 4px 15px rgba(0,0,0,0.6);
    }

    .ticker-container {
      background: #fbbf24;
      color: #000;
      padding: 1.5vh 0;
      flex-shrink: 0;
      font-size: 4vh;
      border-bottom: 3px solid #1e40af;
      overflow: hidden;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .ticker-content {
      display: inline-block;
      white-space: nowrap;
      animation: scroll 60s linear infinite;
      padding-left: 100vw;
    }

    @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

    .ticker-item {
      display: inline-block;
      font-weight: 700;
      margin: 0 3vw;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .main-container {
      flex: 1;
      position: relative;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
      padding-top: 6vh;
      padding-bottom: 6vh;
    }

    .page {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      padding: 1.5vh 1.5vw;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }

    .page.active {
      display: flex;
      animation: slideIn 0.4s ease;
    }

    @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

    .page-title {
      background: linear-gradient(90deg, #1e3a8a, #1e40af);
      color: #fff;
      padding: 1.2vh 2vw;
      font-weight: 800;
      text-align: center;
      font-size: 4vh;
      border-radius: 10px;
      margin-bottom: 1.5vh;
      text-transform: uppercase;
      letter-spacing: 2px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      flex-shrink: 0;
    }

    .content-area {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 0.8vh;
      min-height: 0;
    }

    .headline-item {
      background: linear-gradient(135deg, #1f2937 0%, #111827 100%);
      border-left: 8px solid #22d3ee;
      padding: 1.5vh 2vw;
      font-size: 3.5vh;
      line-height: 1.3;
      cursor: pointer;
      transition: all 0.2s ease;
      color: #e5e7eb;
      border-radius: 8px;
      overflow: visible;
      text-overflow: clip;
      white-space: normal;
      word-wrap: break-word;
      hyphens: auto;
      font-weight: 600;
      min-height: 5vh;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }

    .headline-item:hover {
      background: linear-gradient(135deg, #374151 0%, #1f2937 100%);
      transform: translateX(8px);
      border-left-color: #0ea5e9;
    }

    .headline-time {
      font-size: 2.2vh;
      color: #9ca3af;
      background: rgba(255,255,255,0.1);
      padding: 0.3vh 0.8vw;
      border-radius: 6px;
      font-weight: 500;
      margin-left: 1vw;
      flex-shrink: 0;
    }

    .wiki-item {
      background: linear-gradient(135deg, #1f2937 0%, #111827 100%);
      border-left: 8px solid #fbbf24;
      padding: 1.5vh 2vw;
      font-size: 3.5vh;
      line-height: 1.3;
      cursor: pointer;
      transition: all 0.2s ease;
      color: #e5e7eb;
      border-radius: 8px;
      overflow: visible;
      text-overflow: clip;
      white-space: normal;
      word-wrap: break-word;
      hyphens: auto;
      font-weight: 600;
      min-height: 5vh;
      display: inline-block;
      text-decoration: none;
    }
    .wiki-item:hover {
      background: linear-gradient(135deg, #374151 0%, #1f2937 100%);
      border-left-color: #f59e0b;
      transform: translateX(8px);
    }

    .wiki-year {
      font-size: 2.2vh;
      color: #fbbf24;
      background: rgba(251, 191, 36, 0.2);
      padding: 0.3vh 0.8vw;
      border-radius: 6px;
      font-weight: 500;
      margin-left: 1vw;
      display: inline-block;
    }

    .wiki-text {
      display: inline;
    }

    .weather-container {
      background: linear-gradient(135deg, #059669, #047857);
      color: #fff;
      padding: 1.5vh 0;
      flex-shrink: 0;
      font-size: 3.5vh;
      border-top: 3px solid rgba(255,255,255,0.3);
      overflow: hidden;
      font-weight: bold;
      text-transform: uppercase;
    }

    .weather-content {
      display: inline-block;
      white-space: nowrap;
      animation: scroll 60s linear infinite;
      padding-left: 100vw;
    }

    .weather-item {
      display: inline-block;
      margin: 0 2.5vw;
      padding: 0 1vw;
      background: rgba(255,255,255,0.15);
      border-radius: 8px;
    }

    .home-btn {
      position: fixed;
      bottom: 70px;
      right: 10px;
      background: rgba(255, 255, 255, 0.2);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.4);
      padding: 0.8rem 1.2rem;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      z-index: 1000;
      text-decoration: none;
      transition: all 0.2s;
    }

    .home-btn:hover {
      transform: scale(1.05);
    }

    @media TV {
      .logo { font-size: 4.5vh; }
      .toggle-btn { font-size: 3vh; padding: 0.8vh 1.5vw; }
      .page-title { font-size: 6vh; }
      .headline-item, .wiki-item { font-size: 5vh; }
      .mini-clock { font-size: 4vh; }
      .ticker-container, .weather-container { font-size: 5.5vh; }
    }

    @media (max-width: 768px) {
      header {
        flex-wrap: wrap;
        padding: 1vh 1.5vw;
        height: auto;
        gap: 1vh;
      }
      .logo { font-size: 2.2vh; }
      .toggle-btn { font-size: 1.6vh; padding: 0.5vh 1vw; }
      .mini-clock {
        order: 3;
        width: 100%;
        font-size: 2vh;
        min-width: 180px;
      }
      .ticker-container { font-size: 2.5vh; }
      .weather-container { font-size: 2.2vh; }
      .headline-item, .wiki-item { font-size: 2.2vh; padding: 1.5vh 1.5vw; }
      .page-title { font-size: 3vh; }
      .main-container { padding-top: 10vh; padding-bottom: 8vh; }
      .home-btn { bottom: 55px; right: 8px; font-size: 0.85rem; }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">📺 NEWS</div>
    <div class="section-toggle">
      <button class="toggle-btn active" id="bbcBtn" onclick="showSection('bbc')">BBC</button>
      <button class="toggle-btn" id="intlBtn" onclick="showSection('intl')">WORLD</button>
      <button class="toggle-btn" id="wikiBtn" onclick="showSection('wiki')">WIKI</button>
    </div>
    <div class="page-info">
      <span id="pageIndicator">Loading...</span>
    </div>
    <div class="mini-clock" id="miniClock">Loading...</div>
  </header>

  <div class="ticker-container">
    <div class="ticker-content" id="tickerContent">Loading news...</div>
  </div>

  <div class="main-container">
    <div class="page active" id="bbcPage">
      <div class="page-title">🇬🇧 BBC NEWS</div>
      <div class="content-area" id="bbcContent">Loading...</div>
    </div>

    <div class="page" id="intlPage">
      <div class="page-title">🌍 INTERNATIONAL NEWS</div>
      <div class="content-area" id="intlContent">Loading...</div>
    </div>

    <div class="page" id="wikiPage">
      <div class="page-title">📅 WIKIPEDIA ON THIS DAY</div>
      <div class="content-area" id="wikiContent">Loading...</div>
    </div>
  </div>

  <div class="weather-container">
    <div class="weather-content" id="weatherContent">Loading...</div>
  </div>

  <a href="index.html" class="home-btn">🏠</a>

  <script>
    const weatherEmojis = {
      0: '☀️', 1: '🌤️', 2: '⛅', 3: '☁️',
      45: '🌫️', 48: '🌫️',
      51: '🌦️', 53: '🌦️', 55: '🌦️',
      61: '🌧️', 63: '🌧️', 65: '🌧️',
      71: '🌨️', 73: '🌨️', 75: '🌨️',
      80: '🌦️', 81: '🌦️', 82: '🌦️',
      95: '⛈️', 96: '⛈️', 99: '⛈️'
    };

    const cities = [
      { name: 'Osaka', lat: 34.6937, lon: 135.5023 },
      { name: 'Sapporo', lat: 43.0642, lon: 141.3469 },
      { name: 'Naha', lat: 26.2124, lon: 127.6792 },
      { name: 'New York', lat: 40.7128, lon: -74.0060 },
      { name: 'London', lat: 51.5074, lon: -0.1278 },
      { name: 'Lancaster', lat: 54.0466, lon: -2.8008 }
    ];

    let bbcData = [];
    let intlData = [];
    let wikiData = [];
    let bbcPage = 1;
    let intlPage = 1;
    let wikiPage = 1;
    let currentSection = 'bbc';

    function updateMiniClock() {
      const now = new Date();
      const time = now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
      const date = now.toLocaleDateString('en-US', { day: 'numeric', month: 'short', year: 'numeric' });
      document.getElementById('miniClock').textContent = `${date} ${time}`;
    }

    function formatPubDate(dateStr) {
      const date = new Date(dateStr);
      const hours = date.getHours().toString().padStart(2, '0');
      const mins = date.getMinutes().toString().padStart(2, '0');
      return `${hours}:${mins}`;
    }

    function showSection(section) {
      currentSection = section;
      document.getElementById('bbcBtn').classList.toggle('active', section === 'bbc');
      document.getElementById('intlBtn').classList.toggle('active', section === 'intl');
      document.getElementById('wikiBtn').classList.toggle('active', section === 'wiki');

      document.getElementById('bbcPage').classList.remove('active');
      document.getElementById('intlPage').classList.remove('active');
      document.getElementById('wikiPage').classList.remove('active');
      document.getElementById(section + 'Page').classList.add('active');

      updatePageIndicator();
    }

    function updatePageIndicator() {
      let current, total;
      if (currentSection === 'bbc') {
        current = bbcPage;
        total = Math.ceil(bbcData.length / 3) || 1;
      } else if (currentSection === 'intl') {
        current = intlPage;
        total = Math.ceil(intlData.length / 3) || 1;
      } else {
        current = wikiPage;
        total = Math.ceil(wikiData.length / 10) || 1;
      }
      document.getElementById('pageIndicator').textContent = `${current} / ${total}`;
    }

    async function fetchBBC() {
      try {
        const response = await fetch('https://api.rss2json.com/v1/api.json?rss_url=' + encodeURIComponent('http://feeds.bbci.co.uk/news/rss.xml'));
        const data = await response.json();

        if (data.items) {
          bbcData = data.items.map(item => ({
            title: item.title,
            link: item.link,
            pubDate: item.pubDate
          })).slice(0, 30);
          updateTicker();
          updateBBCPage();
          updatePageIndicator();
        }
      } catch (e) { console.log('BBC error:', e); }
    }

    async function fetchIntl() {
      try {
        const response = await fetch('https://api.rss2json.com/v1/api.json?rss_url=' + encodeURIComponent('http://feeds.reuters.com/Reuters/worldNews'));
        const data = await response.json();

        if (data.items) {
          intlData = data.items.map(item => ({
            title: item.title,
            link: item.link,
            pubDate: item.pubDate
          })).slice(0, 30);
          updateIntlPage();
          updatePageIndicator();
        }
      } catch (e) { console.log('Intl error:', e); }
    }

    function updateTicker() {
      const headlines = [
        ...bbcData.slice(0, 10).map(h => '🇬🇧 ' + h.title),
        ...intlData.slice(0, 10).map(h => '🌍 ' + h.title)
      ].join('    •    ');
      document.getElementById('tickerContent').innerHTML = headlines;
    }

    function updateBBCPage() {
      const itemsPerPage = 3;
      const start = (bbcPage - 1) * itemsPerPage;
      const items = bbcData.slice(start, start + itemsPerPage);

      document.getElementById('bbcContent').innerHTML = items.map(h => `
        <div class="headline-item" onclick="window.open('${h.link}', '_blank')">
          ${escapeHtml(h.title)} <span class="headline-time">${formatPubDate(h.pubDate)}</span>
        </div>
      `).join('');
    }

    function updateIntlPage() {
      const itemsPerPage = 3;
      const start = (intlPage - 1) * itemsPerPage;
      const items = intlData.slice(start, start + itemsPerPage);

      document.getElementById('intlContent').innerHTML = items.map(h => `
        <div class="headline-item" style="border-left-color: #f59e0b;" onclick="window.open('${h.link}', '_blank')">
          ${escapeHtml(h.title)} <span class="headline-time">${formatPubDate(h.pubDate)}</span>
        </div>
      `).join('');
    }

    function updateWikiPage() {
      const itemsPerPage = 10;
      const start = (wikiPage - 1) * itemsPerPage;
      const items = wikiData.slice(start, start + itemsPerPage);

      document.getElementById('wikiContent').innerHTML = items.map(e => {
        const searchQuery = encodeURIComponent(e.description.replace(/ \(.+\)$/, '').substring(0, 50));
        const wikiLink = `https://en.wikipedia.org/wiki/Special:Search?search=${searchQuery}&fulltext=1`;
        return `
          <a href="${wikiLink}" target="_blank" class="wiki-item">
            ${escapeHtml(e.description)} <span class="wiki-year">${e.year}</span>
          </a>
        `;
      }).join('');
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    async function fetchWiki() {
      const now = new Date();
      const month = now.getMonth() + 1;
      const day = now.getDate();

      try {
        const url = `https://byabbe.se/on-this-day/${month}/${day}/events.json`;
        const response = await fetch(url);
        const data = await response.json();
        wikiData = data.events.sort((a, b) => b.year - a.year).slice(0, 20);
        updateWikiPage();
        updatePageIndicator();
      } catch (e) {
        console.log('Wiki error:', e);
        const wikiLink = `https://en.wikipedia.org/wiki/${now.getFullYear()}_${month}_${day}`;
        wikiData = [{
          year: now.getFullYear(),
          description: `Today is ${now.toLocaleDateString('en-US', { month: 'long', day: 'numeric' })} 📅`
        }];
        updateWikiPage();
        updatePageIndicator();
      }
    }

    async function fetchWeather() {
      try {
        const weatherData = await Promise.all(cities.map(async city => {
          const url = `https://api.open-meteo.com/v1/forecast?latitude=${city.lat}&longitude=${city.lon}&current_weather=true`;
          const response = await fetch(url);
          const data = await response.json();
          return {
            name: city.name,
            temp: Math.round(data.current_weather.temperature),
            code: data.current_weather.weathercode
          };
        }));

        document.getElementById('weatherContent').innerHTML = weatherData.map(city => {
          const emoji = weatherEmojis[city.code] || '🌡️';
          return `<span class="weather-item">${city.name}: <span class="weather-temp">${city.temp}°C</span> ${emoji}</span>`;
        }).join('');
      } catch (e) { console.log('Weather error:', e); }
    }

    updateMiniClock();
    setInterval(updateMiniClock, 1000);

    fetchBBC();
    fetchIntl();
    fetchWiki();
    fetchWeather();

    setInterval(fetchWeather, 30 * 60 * 1000);
    setInterval(fetchBBC, 5 * 60 * 1000);
    setInterval(fetchIntl, 5 * 60 * 1000);
    setInterval(fetchWiki, 2 * 60 * 60 * 1000);
  </script>
</body>
</html>
