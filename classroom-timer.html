<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎯 Classroom Timer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Courier New', 'Courier', monospace;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    header {
      padding: 0.5rem 1rem;
      background: rgba(255,255,255,0.05);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    
    .mini-clock {
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
      color: #00ff87;
    }
    
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    
    .timer-display {
      font-size: 20vw;
      font-weight: bold;
      color: #fff;
      text-shadow: 4px 4px 0 rgba(0,0,0,0.5);
      line-height: 1;
      margin-top: -5vh;
    }
    
    .timer-display.warning {
      color: #FFD700;
      animation: pulse 1s infinite;
    }
    
    .timer-display.danger {
      color: #FF0000;
      animation: shake 0.2s infinite;
    }
    
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.07); } }
    @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-12px); } 75% { transform: translateX(12px); } }
    
    .controls-row {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      width: 100%;
      padding: 0 2rem;
      margin-top: 2rem;
    }
    
    .controls-group {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    
    button, select {
      padding: 1rem 1.5rem;
      border: 3px solid rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.1);
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      border-radius: 15px;
      font-weight: bold;
      font-family: 'Segoe UI', sans-serif;
      transition: all 0.3s;
    }
    
    button:hover, select:hover { transform: scale(1.05); background: rgba(255,255,255,0.2); }
    button.active, select.active { background: #00ff87; color: #1a1a2e; border-color: #00ff87; }
    
    .btn-green { border-color: #4CAF50; }
    .btn-red { border-color: #FF5252; }
    .btn-yellow { border-color: #FFD93D; }
    
    @media TV {
      .timer-display { font-size: 25vh !important; }
      button, select { font-size: 1.5rem; min-width: 180px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="mini-clock" id="miniClock"></div>
  </header>
  
  <main>
    <div class="timer-display" id="timerDisplay">05:00</div>
    
    <div class="controls-row">
      <div class="controls-group">
        <button class="btn-green" id="startBtn">▶ START</button>
        <button class="btn-red" id="stopBtn">⏸ PAUSE</button>
        <button class="btn-yellow" id="resetBtn">🔄 RESET</button>
      </div>
      
      <div class="controls-group">
        <button class="preset-btn" data-seconds="5">5s</button>
        <button class="preset-btn" data-seconds="60">1 min</button>
        <button class="preset-btn" data-seconds="120">2 min</button>
        <button class="preset-btn" data-seconds="300">5 min</button>
        <button class="preset-btn" data-seconds="600">10 min</button>
        <button class="preset-btn" data-seconds="1500">25 min</button>
        <button class="preset-btn" data-seconds="3000">50 min</button>
      </div>
      
      <div class="controls-group">
        <select id="soundSelect">
          <option value="bell">🔔 Bell</option>
          <option value="trump">🎺 Trump</option>
          <option value="alarm">🚨 Alarm</option>
          <option value="siren">🚨 Siren</option>
          <option value="foghorn">🌫️ Foghorn</option>
          <option value="airhorn">📯 Air Horn</option>
          <option value="whoop">📢 Whoop</option>
          <option value="buzz">🔊 Buzz</option>
          <option value="chime">🔔 Chime</option>
          <option value="gong">🔔 Gong</option>
          <option value="horn">📯 Horn</option>
          <option value="whistle">🎵 Whistle</option>
          <option value="rooster">🐓 Rooster</option>
        </select>
      </div>
    </div>
  </main>

  <script>
    let timerRunning = false;
    let timerInterval = null;
    let totalSeconds = 300;
    let remainingSeconds = 300;
    let currentSound = 'bell';
    let audioContext = null;
    
    function initAudio() {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
    }
    
    function updateMiniClock() {
      const now = new Date();
      const time = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
      const date = now.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
      document.getElementById('miniClock').textContent = `${date} {time}`;
    }
    
    function playTone(freq, duration, type = 'sine', volume = 0.4) {
      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();
      osc.connect(gain);
      gain.connect(audioContext.destination);
      osc.frequency.value = freq;
      osc.type = type;
      gain.gain.setValueAtTime(volume, audioContext.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
      osc.start();
      osc.stop(audioContext.currentTime + duration);
    }
    
    // Tick sound - quiet
    function playTick() {
      initAudio();
      playTone(600, 0.03, 'square', 0.08);
    }
    
    // Urgent tick - louder
    function playUrgentTick() {
      initAudio();
      playTone(880, 0.08, 'square', 0.25);
    }
    
    function playBell() {
      initAudio();
      for (let i = 1; i <= 5; i++) {
        setTimeout(() => {
          playTone(523.25 + (i * 20), 0.3, 'sine', 0.4);
        }, i * 200);
      }
    }
    
    function playTrump() {
      initAudio();
      const duration = 4;
      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();
      const lpf = audioContext.createBiquadFilter();
      
      osc.connect(lpf);
      lpf.connect(gain);
      gain.connect(audioContext.destination);
      
      // Realistic brass trumpet
      osc.frequency.setValueAtTime(220, audioContext.currentTime);
      osc.frequency.setValueAtTime(250, audioContext.currentTime + 0.1);
      osc.frequency.setValueAtTime(280, audioContext.currentTime + 0.2);
      osc.type = 'sawtooth';
      
      lpf.frequency.setValueAtTime(800, audioContext.currentTime);
      lpf.frequency.setValueAtTime(1200, audioContext.currentTime + 0.5);
      
      gain.gain.setValueAtTime(0.6, audioContext.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
      
      // Add vibrato
      const lfo = audioContext.createOscillator();
      const lfoGain = audioContext.createGain();
      lfo.connect(lfoGain);
      lfoGain.connect(osc.frequency);
      lfo.frequency.value = 6;
      lfoGain.gain.value = 5;
      
      lfo.start();
      osc.start();
      osc.stop(audioContext.currentTime + duration);
      lfo.stop(audioContext.currentTime + duration);
    }
    
    function playAlarm() {
      initAudio();
      for (let i = 0; i < 8; i++) {
        setTimeout(() => {
          playTone(880, 0.1, 'square', 0.5);
          setTimeout(() => playTone(880, 0.1, 'square', 0.5), 100);
        }, i * 150);
      }
    }
    
    function playSiren() {
      initAudio();
      let freq = 600;
      const duration = 0.1;
      for (let i = 0; i < 20; i++) {
        setTimeout(() => {
          playTone(freq, duration, 'sawtooth', 0.5);
          freq = freq === 600 ? 1200 : 600;
        }, i * duration * 1000);
      }
    }
    
    function playFoghorn() {
      initAudio();
      const duration = 1.0;
      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();
      
      osc.connect(gain);
      gain.connect(audioContext.destination);
      
      osc.frequency.setValueAtTime(80, audioContext.currentTime);
      osc.frequency.exponentialRampToValueAtTime(150, audioContext.currentTime + 0.5);
      osc.type = 'sawtooth';
      
      gain.gain.setValueAtTime(0.7, audioContext.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
      
      osc.start();
      osc.stop(audioContext.currentTime + duration);
    }
    
    function playAirHorn() {
      initAudio();
      for (let i = 0; i < 3; i++) {
        setTimeout(() => {
          playTone(400, 0.2, 'sawtooth', 0.4);
          setTimeout(() => playTone(350, 0.1, 'sawtooth', 0.5), 150);
        }, i * 300);
      }
    }
    
    function playWhoop() {
      initAudio();
      setTimeout(() => {
        playTone(300, 0.5, 'sine', 0.3);
      }, 0);
      setTimeout(() => {
        playTone(500, 0.4, 'sine', 0.3);
      }, 500);
      setTimeout(() => {
        playTone(800, 0.3, 'sine', 0.3);
      }, 900);
    }
    
    function playBuzz() {
      initAudio();
      const duration = 1.5;
      for (let i = 0; i < 10; i++) {
        setTimeout(() => {
          const freq = 120 + Math.random() * 50;
          playTone(freq, 0.05, 'sawtooth', 0.4);
        }, i * (duration / 10) * 1000);
      }
    }
    
    playChime = () => { initAudio(); playTone(440, 0.2, 'sine', 0.3); playTone(554, 0.2, 'sine', 0.3); };
    playGong = () => { initAudio(); playTone(200, 1.5, 'triangle', 0.5); };
    playHorn = () => { initAudio(); playTone(350, 1.0, 'sawtooth', 0.4); };
    playWhistle = () => { initAudio(); setTimeout(() => playTone(1200, 0.3, 'sine', 0.3), 0); setTimeout(() => playTone(1500, 0.15, 'sine', 0.3), 300); };
    playRooster = () => { initAudio(); playTone(800, 0.15, 'sawtooth', 0.4); setTimeout(() => playTone(600, 0.2, 'sawtooth', 0.3), 150); setTimeout(() => playTone(1000, 0.5, 'sawtooth', 0.45), 400); };
    
    function formatTime(seconds) {
      const mins = Math.floor(seconds / 60);
      const secs = seconds % 60;
      return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }
    
    function updateDisplay() {
      const display = document.getElementById('timerDisplay');
      display.textContent = formatTime(remainingSeconds);
      
      display.classList.remove('warning', 'danger');
      if (remainingSeconds <= 10) {
        display.classList.add('danger');
      } else if (remainingSeconds <= 30) {
        display.classList.add('warning');
      }
    }
    
    function startTimer() {
      if (timerRunning) return;
      timerRunning = true;
      initAudio();
      
      timerInterval = setInterval(() => {
        if (remainingSeconds > 0) {
          remainingSeconds--;
          updateDisplay();
          
          // Constant ticking for all modes
          if (remainingSeconds <= 10) {
            // Last 10 seconds - loud!
            playUrgentTick();
          } else {
            // Normal quiet tick
            playTick();
          }
        } else {
          clearInterval(timerInterval);
          timerRunning = false;
          
          // Big finale sound
          switch(currentSound) {
            case 'bell': playBell(); break;
            case 'trump': playTrump(); break;
            case 'alarm': setImmediate(() => { playAlarm(); }); break;
            case 'siren': setImmediate(() => { playSiren(); }); break;
            case 'foghorn': setImmediate(() => { playFoghorn(); }); break;
            case 'airhorn': setImmediate(() => { playAirHorn(); }); break;
            case 'whoop': setImmediate(() => { playWhoop(); }); break;
            case 'buzz': setImmediate(() => { playBuzz(); }); break;
            case 'chime': setImmediate(() => { playChime(); }); break;
            case 'gong': setImmediate(() => { playGong(); }); break;
            case 'horn': setImmediate(() => { playHorn(); }); break;
            case 'whistle': setImmediate(() => { playWhistle(); }); break;
            case 'rooster': setImmediate(() => { playRooster(); }); break;
          }
        }
      }, 1000);
    }
    
    function stopTimer() {
      timerRunning = false;
      clearInterval(timerInterval);
    }
    
    function resetTimer() {
      stopTimer();
      remainingSeconds = totalSeconds;
      updateDisplay();
      
      // Preserve selected preset
      document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
      const minutes = Math.floor(totalSeconds / 60);
      document.querySelector(`[data-seconds="${totalSeconds}"]`)?.classList.add('active');
    }
    
    function switchSound(sound) {
      currentSound = sound;
    }
    
    document.getElementById('startBtn').onclick = startTimer;
    document.getElementById('stopBtn').onclick = stopTimer;
    document.getElementById('resetBtn').onclick = resetTimer;
    document.getElementById('soundSelect').onchange = (e) => switchSound(e.target.value);
    
    document.querySelectorAll('.preset-btn').forEach(btn => {
      btn.onclick = () => {
        if (!timerRunning) {
          totalSeconds = parseInt(btn.dataset.seconds);
          remainingSeconds = totalSeconds;
          
          document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          
          updateDisplay();
        }
      };
    });
    
    document.querySelectorAll('.preset-btn').forEach(b => {
      if (b.dataset.seconds === '300') b.classList.add('active');
    });
    
    document.addEventListener('keydown', e => {
      if (e.code === 'Space') e.preventDefault();
      if (e.code === 'Space') (timerRunning ? stopTimer() : startTimer());
      if (e.code === 'KeyR') resetTimer();
    });
    
    updateMiniClock();
    setInterval(updateMiniClock, 1000);
    updateDisplay();
  </script>
</body>
</html>
