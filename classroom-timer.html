<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎯 Classroom Timer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Comic Sans MS', 'Chalkboard SE', 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #FF6B6B 0%, #4ECDC4 50%, #45B7D1 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      color: #fff;
      overflow: hidden;
    }
    
    header {
      padding: 1.5rem;
      background: rgba(0,0,0,0.2);
      text-align: center;
    }
    
    h1 { font-size: 2.5rem; text-shadow: 2px 2px 0 rgba(0,0,0,0.2); }
    
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    
    .sound-selector, .presets {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 1.5rem;
    }
    
    button {
      padding: 0.8rem 1.5rem;
      border: 3px solid rgba(255,255,255,0.5);
      background: rgba(255,255,255,0.15);
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      border-radius: 25px;
      font-weight: bold;
      transition: all 0.3s;
    }
    
    button:hover { transform: scale(1.1); background: rgba(255,255,255,0.3); }
    button.active { background: #fff; color: #FF6B6B; border-color: #fff; }
    
    .timer-container {
      background: rgba(255,255,255,0.15);
      padding: 2rem;
      border-radius: 30px;
      text-align: center;
      margin-bottom: 2rem;
    }
    
    .timer-display {
      font-size: 6rem;
      font-weight: bold;
      color: #fff;
      text-shadow: 3px 3px 0 rgba(0,0,0,0.3);
      font-family: 'Courier New', monospace;
    }
    
    .timer-display.warning { color: #FFD700; animation: wobble 0.5s infinite; }
    .timer-display.danger { color: #FF0000; animation: shake 0.2s infinite; }
    
    @keyframes wobble { 0%, 100% { transform: rotate(-3deg); } 50% { transform: rotate(3deg); } }
    @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    
    .controls { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
    .btn-green { border-color: #4CAF50; }
    .btn-red { border-color: #FF5252; }
    .btn-yellow { border-color: #FFD93D; }
    
    @media TV {
      .timer-display { font-size: 12rem; }
      button { font-size: 1.8rem; min-width: 220px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>🎯 Classroom Timer</h1>
  </header>
  
  <main>
    <div class="sound-selector">
      <button class="sound-btn active" data-sound="countdown">🔢 Countdown</button>
      <button class="sound-btn" data-sound="bomb">💣 Bomb</button>
      <button class="sound-btn" data-sound="fireworks">🎆 Fireworks</button>
      <button class="sound-btn" data-sound="alarm">🚨 Alarm</button>
      <button class="sound-btn" data-sound="fart">💨 Fart</button>
    </div>
    
    <div class="presets">
      <button class="preset-btn" data-seconds="60">1 min</button>
      <button class="preset-btn" data-seconds="120">2 min</button>
      <button class="preset-btn" data-seconds="300">5 min</button>
      <button class="preset-btn" data-seconds="600">10 min</button>
      <button class="preset-btn" data-seconds="1500">25 min</button>
      <button class="preset-btn" data-seconds="3000">50 min</button>
    </div>
    
    <div class="timer-container">
      <div class="timer-display" id="timerDisplay">01:00</div>
    </div>
    
    <div class="controls">
      <button class="btn-green" id="startBtn">▶️ Start</button>
      <button class="btn-red" id="stopBtn">⏸ Pause</button>
      <button class="btn-yellow" id="resetBtn">🔄 Reset</button>
    </div>
  </main>

  <script>
    let timerRunning = false;
    let timerInterval = null;
    let totalSeconds = 60;
    let remainingSeconds = 60;
    let currentSoundMode = 'countdown';
    let audioContext = null;
    
    function initAudio() {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
    }
    
    function playTone(freq, duration, type = 'sine', volume = 0.3) {
      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();
      osc.connect(gain);
      gain.connect(audioContext.destination);
      osc.frequency.value = freq;
      osc.type = type;
      gain.gain.setValueAtTime(volume, audioContext.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
      osc.start();
      osc.stop(audioContext.currentTime + duration);
    }
    
    // Tick sound (clock tick)
    function playTick() {
      initAudio();
      playTone(880, 0.05, 'square', 0.15);
    }
    
    // Countdown sound (more exciting final 10 seconds)
    function playCountdownSound(seconds) {
      initAudio();
      
      if (seconds > 10) {
        // Normal ticking
        playTick();
      } else {
        // Final countdown - ascending pitch, faster and more urgent
        const baseFreq = 600 + (10 - seconds) * 100;
        const duration = 0.15 - ((10 - seconds) * 0.01);
        playTone(baseFreq, duration, 'sine', 0.4);
        
        // Double beep for last 3 seconds
        if (seconds <= 3 && seconds > 0) {
          setTimeout(() => {
            playTone(baseFreq + 200, duration * 0.5, 'sine', 0.3);
          }, duration * 500);
        }
      }
    }
    
    // Bomb explosion sound
    function playBombSound() {
      initAudio();
      
      // Buildup - rising pitch
      for (let i = 0; i < 10; i++) {
        setTimeout(() => {
          playTone(200 + i * 80, 0.05, 'sawtooth', 0.3);
        }, i * 50);
      }
      
      // Explosion - deep rumble
      setTimeout(() => {
        const osc = audioContext.createOscillator();
        const gain = audioContext.createGain();
        const lpf = audioContext.createBiquadFilter();
        
        osc.connect(lpf);
        lpf.connect(gain);
        gain.connect(audioContext.destination);
        
        osc.frequency.setValueAtTime(60, audioContext.currentTime);
        osc.frequency.exponentialRampToValueAtTime(20, audioContext.currentTime + 1.5);
        osc.type = 'sawtooth';
        
        lpf.frequency.setValueAtTime(500, audioContext.currentTime);
        lpf.frequency.exponentialRampToValueAtTime(50, audioContext.currentTime + 1.5);
        
        gain.gain.setValueAtTime(0.8, audioContext.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 1.5);
        
        osc.start();
        osc.stop(audioContext.currentTime + 1.5);
      }, 500);
    }
    
    // Fireworks sound
    function playFireworksSound() {
      initAudio();
      const sounds = ['sine', 'triangle', 'square'];
      const colors = ['#FF6B6B', '#4ECDC4', '#45B7D1', '#FFD93D'];
      
      for (let i = 0; i < 8; i++) {
        setTimeout(() => {
          const freq = 200 + Math.random() * 600;
          const dur = 0.3 + Math.random() * 0.3;
          playTone(freq, dur, sounds[Math.floor(Math.random() * sounds.length)], 0.3);
          
          // Add visual confetti
          createConfetti(colors[Math.floor(Math.random() * colors.length)]);
        }, i * 150);
      }
    }
    
    // Alarm sound - loud buzzing
    function playAlarmSound() {
      initAudio();
      
      let count = 0;
      const alarmInterval = setInterval(() => {
        playTone(880, 0.15, 'square', 0.4);
        setTimeout(() => playTone(880, 0.15, 'square', 0.4), 200);
        count++;
        if (count >= 6) clearInterval(alarmInterval);
      }, 300);
    }
    
    // Fart sound - realistic squelch
    function playFartSound() {
      initAudio();
      
      const duration = 0.8;
      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();
      const lpf = audioContext.createBiquadFilter();
      
      osc.connect(lpf);
      lpf.connect(gain);
      gain.connect(audioContext.destination);
      
      osc.frequency.setValueAtTime(120, audioContext.currentTime);
      osc.frequency.linearRampToValueAtTime(80, audioContext.currentTime + duration * 0.3);
      osc.frequency.linearRampToValueAtTime(150, audioContext.currentTime + duration * 0.7);
      osc.type = 'sawtooth';
      
      lpf.frequency.setValueAtTime(400, audioContext.currentTime);
      lpf.frequency.exponentialRampToValueAtTime(80, audioContext.currentTime + duration);
      
      gain.gain.setValueAtTime(0.5, audioContext.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
      
      // Add some randomness
      const noise = audioContext.createOscillator();
      const noiseGain = audioContext.createGain();
      noise.connect(noiseGain);
      noiseGain.connect(gain);
      noise.frequency.setValueAtTime(2000, audioContext.currentTime);
      noise.frequency.setValueAtTime(100, audioContext.currentTime + duration);
      noise.type = 'square';
      noiseGain.gain.setValueAtTime(0.1, audioContext.currentTime);
      noiseGain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
      
      osc.start();
      noise.start();
      osc.stop(audioContext.currentTime + duration);
      noise.stop(audioContext.currentTime + duration);
    }
    
    // Bomb ticking during countdown
    function playBombTick() {
      initAudio();
      playTone(600, 0.03, 'square', 0.2);
    }
    
    function createConfetti(color = '#FFD93D') {
      const confetti = document.createElement('div');
      confetti.style.cssText = `
        position: fixed;
        width: 10px;
        height: 10px;
        background: ${color};
        left: ${Math.random() * 100}vw;
        top: -10px;
        pointer-events: none;
        animation: fall 3s linear forwards;
      `;
      document.body.appendChild(confetti);
      setTimeout(() => confetti.remove(), 3000);
    }
    
    const style = document.createElement('style');
    style.textContent = `@keyframes fall { to { transform: translateY(100vh) rotate(720deg); } }`;
    document.head.appendChild(style);
    
    function formatTime(seconds) {
      const mins = Math.floor(seconds / 60);
      const secs = seconds % 60;
      return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }
    
    function updateDisplay() {
      const display = document.getElementById('timerDisplay');
      display.textContent = formatTime(remainingSeconds);
      
      display.classList.remove('warning', 'danger');
      if (remainingSeconds <= 10) {
        display.classList.add('danger');
      } else if (remainingSeconds <= 30) {
        display.classList.add('warning');
      }
    }
    
    function startTimer() {
      if (timerRunning) return;
      timerRunning = true;
      initAudio();
      
      timerInterval = setInterval(() => {
        if (remainingSeconds > 0) {
          remainingSeconds--;
          updateDisplay();
          
          if (currentSoundMode === 'countdown') {
            playCountdownSound(remainingSeconds);
          } else if (currentSoundMode === 'bomb' && remainingSeconds <= 10) {
            playBombTick();
          }
        } else {
          clearInterval(timerInterval);
          timerRunning = false;
          
          // End sound
          switch(currentSoundMode) {
            case 'bomb': playBombSound(); break;
            case 'fireworks': playFireworksSound(); break;
            case 'alarm': playAlarmSound(); break;
            case 'fart': playFartSound(); break;
            default:
              for (let i = 1; i <= 3; i++) {
                setTimeout(() => playTone(440 + i * 110, 0.3, 'sine', 0.4), i * 350);
              }
          }
        }
      }, 1000);
    }
    
    function stopTimer() { timerRunning = false; clearInterval(timerInterval); }
    
    function resetTimer() {
      stopTimer();
      remainingSeconds = totalSeconds;
      updateDisplay();
    }
    
    function switchSound(mode) {
      currentSoundMode = mode;
      document.querySelectorAll('.sound-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.sound === mode);
      });
    }
    
    document.getElementById('startBtn').onclick = startTimer;
    document.getElementById('stopBtn').onclick = stopTimer;
    document.getElementById('resetBtn').onclick = resetTimer;
    
    document.querySelectorAll('.sound-btn').forEach(btn => {
      btn.onclick = () => switchSound(btn.dataset.sound);
    });
    
    document.querySelectorAll('.preset-btn').forEach(btn => {
      btn.onclick = () => {
        if (!timerRunning) {
          totalSeconds = parseInt(btn.dataset.seconds);
          remainingSeconds = totalSeconds;
          document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          updateDisplay();
        }
      };
    });
    
    document.querySelectorAll('.preset-btn')[0].classList.add('active');
    document.addEventListener('keydown', e => {
      if (e.code === 'Space') e.preventDefault();
      if (e.code === 'Space') (timerRunning ? stopTimer() : startTimer());
      if (e.code === 'KeyR') resetTimer();
    });
    
    updateDisplay();
  </script>
</body>
</html>
