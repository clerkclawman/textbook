<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>NEWS</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    html {
      overflow: hidden;
      scrollbar-width: none;
    }
    
    html::-webkit-scrollbar { display: none; }
    
    body {
      font-family: 'Segoe UI', 'Poppins', 'Helvetica Neue', 'Arial', sans-serif;
      background: #000000;
      color: #fff;
      height: 100vh;
      width: 100vw;
      max-width: 100vw;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    
    header {
      position: fixed;
      top: 8px;
      left: 8px;
      right: 8px;
      background: rgba(0,0,0,0.3);
      color: #fff;
      padding: 0.5vh 1vw;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
      border-radius: 10px;
      z-index: 100;
      overflow: hidden;
    }
    
    .logo {
      font-size: 1.8vh;
      font-weight: 700;
      letter-spacing: 1px;
    }
    
    .page-info {
      background: rgba(251, 191, 36, 0.2);
      color: #fbbf24;
      padding: 0.3rem 0.7rem;
      font-weight: 700;
      border-radius: 6px;
      font-size: 1.3vh;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      border: 1px solid rgba(251, 191, 36, 0.3);
    }
    
    .page-indicator {
      font-size: 1.6vh;
      font-weight: 800;
    }
    
    .mini-clock {
      font-family: 'Courier New', monospace;
      font-size: 1.2vh;
      color: rgba(255,255,255,0.7);
      background: rgba(0,0,0,0.2);
      padding: 0.25rem 0.6rem;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.15);
    }
    
    .ticker-container {
      background: #fbbf24;
      color: #000;
      padding: 0.5vh 0;
      flex-shrink: 0;
      font-size: 1.5vh;
      border-bottom: 2px solid #1e40af;
      overflow: hidden;
    }
    
    .ticker-content {
      display: inline-block;
      white-space: nowrap;
      animation: scroll 35s linear infinite;
      padding-left: 100vw;
    }
    
    @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
    
    .ticker-item {
      display: inline-block;
      font-weight: 600;
      margin: 0 2vw;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    
    .main-container {
      flex: 1;
      position: relative;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
      padding-top: 5vh;
    }
    
    .page {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      padding: 1.5vh 1.5vw;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }
    
    .page.active {
      display: flex;
      animation: slideIn 0.4s ease;
    }
    
    @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
    
    .page-title {
      background: linear-gradient(90deg, #1e3a8a, #1e40af);
      color: #fff;
      padding: 1vh 1.5vw;
      font-weight: 800;
      text-align: center;
      font-size: 3.5vh;
      border-radius: 10px;
      margin-bottom: 1.2vh;
      text-transform: uppercase;
      letter-spacing: 2px;
      box-shadow: 0 3px 15px rgba(0,0,0,0.4);
      flex-shrink: 0;
    }
    
    .content-area {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 0.8vh;
      min-height: 0;
    }
    
    .headline-item {
      background: linear-gradient(135deg, #1f2937 0%, #111827 100%);
      border-left: 6px solid #22d3ee;
      padding: 1vh 1.5vw;
      font-size: 2.6vh;
      line-height: 1.3;
      cursor: pointer;
      transition: all 0.2s ease;
      color: #e5e7eb;
      border-radius: 6px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    
    .headline-item:hover {
      background: linear-gradient(135deg, #374151 0%, #1f2937 100%);
      transform: translateX(5px);
    }
    
    .wiki-item {
      background: linear-gradient(135deg, #1f2937 0%, #111827 100%);
      border-left: 6px solid #fbbf24;
      padding: 1vh 1.5vw;
      font-size: 2.6vh;
      line-height: 1.3;
      display: flex;
      gap: 1vw;
      align-items: flex-start;
      color: #e5e7eb;
      border-radius: 6px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    
    .wiki-year {
      background: #ef4444;
      color: #fff;
      padding: 0.3rem 0.8rem;
      font-weight: 900;
      font-size: 2.2vh;
      border-radius: 6px;
      flex-shrink: 0;
    }
    
    .wiki-text {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    
    .pagination {
      display: flex;
      justify-content: center;
      gap: 0.4vw;
      margin-top: auto;
      padding-top: 0.5vh;
    }
    
    .page-btn {
      background: rgba(34, 211, 238, 0.3);
      color: #22d3ee;
      border: 1px solid rgba(34, 211, 238, 0.5);
      padding: 0.3vh 0.7vw;
      font-size: 1.2vh;
      cursor: pointer;
      font-weight: 600;
      border-radius: 5px;
      transition: all 0.2s;
    }
    
    .page-btn:hover { background: rgba(34, 211, 238, 0.5); }
    .page-btn.active { background: #fbbf24; color: #000; border-color: #fbbf24; }
    .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    
    .weather-container {
      background: linear-gradient(135deg, #059669 0%, #047857 100%);
      color: #fff;
      padding: 0.5vh 0;
      flex-shrink: 0;
      font-size: 1.4vh;
      border-top: 2px solid #10b981;
      overflow: hidden;
    }
    
    .weather-content {
      display: inline-block;
      white-space: nowrap;
      animation: scroll 30s linear infinite;
      padding-left: 100vw;
    }
    
    .weather-item {
      display: inline-block;
      margin: 0 1.5vw;
      padding: 0.2vh 0.6vw;
      background: rgba(255,255,255,0.1);
      border-radius: 4px;
    }
    
    .weather-temp {
      font-weight: 700;
      color: #fef3c7;
    }
    
    .progress-container {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 0.4vh;
      background: #1f2937;
    }
    
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #22d3ee, #fbbf24);
      transition: width 0.3s linear;
      border-radius: 2px;
    }
    
    @media TV {
      header { padding: 1.5vh 2vw; }
      .logo { font-size: 4vh; }
      .page-info { font-size: 2.5vh; padding: 0.6vh 1.2vw; }
      .page-indicator { font-size: 3.5vh; }
      .mini-clock { font-size: 2.2vh; }
      .ticker-container, .weather-container { font-size: 2.2vh; }
      .page-title { font-size: 5vh; padding: 1.2vh 2vw; }
      .headline-item, .wiki-item { font-size: 3.5vh; padding: 1.2vh 2vw; }
      .wiki-year { font-size: 3vh; }
      .page-btn { font-size: 2rem; padding: 0.6vh 1.2vw; }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">📺 NEWS</div>
    <div class="page-info">
      PAGE <span class="page-indicator" id="pageIndicator">1</span> / 2
    </div>
    <div class="mini-clock" id="miniClock"></div>
  </header>
  
  <div class="ticker-container">
    <div class="ticker-content" id="tickerContent">
      Loading headlines...
    </div>
  </div>
  
  <div class="main-container">
    <div class="page active" id="page1">
      <div class="page-title">🇬🇧 BBC NEWS</div>
      <div class="content-area" id="bbcContent">
        <div class="headline-item">Loading BBC News...</div>
      </div>
      <div class="pagination" id="bbcPagination"></div>
    </div>
    
    <div class="page" id="page2">
      <div class="page-title">📅 ON THIS DAY</div>
      <div class="content-area" id="wikiContent">
        <div class="wiki-item">Loading Wikipedia...</div>
      </div>
      <div class="pagination" id="wikiPagination"></div>
    </div>
  </div>
  
  <div class="weather-container">
    <div class="weather-content" id="weatherContent">
      Loading weather...
    </div>
  </div>
  
  <div class="progress-container">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <script>
    let bbcData = [];
    let wikiData = [];
    let bbcPage = 1;
    let wikiPage = 1;
    let currentPage = 1;
    const PAGE_ROTATION_TIME = 10000;
    let pageRotationInterval = null;
    
    const weatherEmojis = {
      0: '☀️', 1: '🌤️', 2: '⛅', 3: '☁️',
      45: '🌫️', 48: '🌫️',
      51: '🌦️', 53: '🌦️', 55: '🌦️',
      61: '🌧️', 63: '🌧️', 65: '🌧️',
      71: '🌨️', 73: '🌨️', 75: '🌨️',
      80: '🌦️', 81: '🌦️', 82: '🌦️',
      95: '⛈️', 96: '⛈️', 99: '⛈️'
    };
    
    const cities = [
      { name: 'Osaka', lat: 34.6937, lon: 135.5023 },
      { name: 'Sapporo', lat: 43.0642, lon: 141.3469 },
      { name: 'Naha', lat: 26.2124, lon: 127.6792 },
      { name: 'New York', lat: 40.7128, lon: -74.0060 },
      { name: 'London', lat: 51.5074, lon: -0.1278 },
      { name: 'Lancaster', lat: 54.0466, lon: -2.8008 },
      { name: 'Moscow', lat: 55.7558, lon: 37.6173 },
      { name: 'Beijing', lat: 39.9042, lon: 116.4074 },
      { name: 'Hollywood', lat: 34.0928, lon: -118.3287 }
    ];
    
    function updateMiniClock() {
      const now = new Date();
      const time = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
      const date = now.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
      document.getElementById('miniClock').textContent = `${date} ${time}`;
    }
    
    function rotatePage() {
      currentPage = currentPage === 1 ? 2 : 1;
      document.getElementById('page1').classList.toggle('active', currentPage === 1);
      document.getElementById('page2').classList.toggle('active', currentPage === 2);
      document.getElementById('pageIndicator').textContent = currentPage;
    }
    
    function startPageRotation() {
      clearInterval(pageRotationInterval);
      updateProgressBar(0);
      
      let progress = 0;
      const progressInterval = setInterval(() => {
        progress += 1;
        updateProgressBar((progress / (PAGE_ROTATION_TIME / 100)) * 100);
      }, PAGE_ROTATION_TIME / 100);
      
      pageRotationInterval = setInterval(() => {
        rotatePage();
        clearInterval(progressInterval);
        progress = 0;
      }, PAGE_ROTATION_TIME);
    }
    
    function updateProgressBar(percent) {
      document.getElementById('progressBar').style.width = `${percent}%`;
    }
    
    async function fetchWeather() {
      try {
        const weatherData = await Promise.all(cities.map(async city => {
          const url = `https://api.open-meteo.com/v1/forecast?latitude=${city.lat}&longitude=${city.lon}&current_weather=true`;
          const response = await fetch(url);
          const data = await response.json();
          return {
            name: city.name,
            temp: Math.round(data.current_weather.temperature),
            code: data.current_weather.weathercode
          };
        }));
        
        document.getElementById('weatherContent').innerHTML = weatherData.map(city => {
          const emoji = weatherEmojis[city.code] || '🌡️';
          return `<span class="weather-item">${city.name}: <span class="weather-temp">${city.temp}°C</span> ${emoji}</span>`;
        }).join('');
      } catch (e) { console.log('Weather error:', e); }
    }
    
    async function fetchWiki() {
      const now = new Date();
      const month = now.getMonth() + 1;
      const day = now.getDate();
      
      try {
        const url = `https://byabbe.se/on-this-day/${month}/${day}/events.json`;
        const response = await fetch(url);
        const data = await response.json();
        
        if (data.events && data.events.length) {
          wikiData = data.events.sort((a, b) => b.year - a.year).slice(0, 100);
          updateWiki(1);
        }
      } catch (e) {
        console.log('Wiki error:', e);
        document.getElementById('wikiContent').innerHTML = `
          <div class="wiki-item">
            <div class="wiki-year">${now.getFullYear()}</div>
            <div class="wiki-text">Today is ${now.toLocaleDateString('en-US', { month: 'long', day: 'numeric' })}</div>
          </div>`;
      }
    }
    
    async function fetchBBC() {
      try {
        const response = await fetch('https://api.rss2json.com/v1/api.json?rss_url=' + encodeURIComponent('http://feeds.bbci.co.uk/news/rss.xml'));
        const data = await response.json();
        
        if (data.items) {
          bbcData = data.items.map(item => ({
            title: item.title,
            link: item.link
          }));
          updateBBC(1);
          updateTicker();
        }
      } catch (e) { console.log('BBC error:', e); }
    }
    
    function updateTicker() {
      const headlines = bbcData.slice(0, 10).map(h => '📰 ' + h.title).join('    •    ');
      document.getElementById('tickerContent').innerHTML = headlines;
    }
    
    function updateBBC(page) {
      const itemsPerPage = 10;
      const start = (page - 1) * itemsPerPage;
      const end = start + itemsPerPage;
      const items = bbcData.slice(start, end);
      
      document.getElementById('bbcContent').innerHTML = items.map(h => `
        <div class="headline-item" onclick="window.open('${h.link}', '_blank')">${escapeHtml(h.title)}</div>
      `).join('');
      
      renderPagination('bbcPagination', page, itemsPerPage, setBBCPage);
    }
    
    function updateWiki(page) {
      const itemsPerPage = 10;
      const start = (page - 1) * itemsPerPage;
      const end = start + itemsPerPage;
      const items = wikiData.slice(start, end);
      
      document.getElementById('wikiContent').innerHTML = items.map(e => `
        <div class="wiki-item">
          <div class="wiki-year">${e.year}</div>
          <div class="wiki-text">${escapeHtml(e.description)}</div>
        </div>
      `).join('');
      
      renderPagination('wikiPagination', page, itemsPerPage, setWikiPage);
    }
    
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    function renderPagination(elId, currentPage, itemsPerPage, setPage) {
      const data = elId.includes('wiki') ? wikiData : bbcData;
      const totalPages = Math.ceil(data.length / itemsPerPage) || 1;
      let html = '';
      
      html += `<button class="page-btn ${currentPage === 1 ? 'active' : ''}" onclick="${elId === 'bbcPagination' ? 'setBBCPage' : 'setWikiPage'}(1)">1</button>`;
      
      if (totalPages <= 7) {
        for (let i = 2; i <= totalPages; i++) {
          html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="${elId === 'bbcPagination' ? 'setBBCPage' : 'setWikiPage'}(${i})">${i}</button>`;
        }
      } else {
        if (currentPage > 4) html += `<button class="page-btn" disabled>...</button>`;
        
        const start = Math.max(2, currentPage - 2);
        const end = Math.min(totalPages - 1, currentPage + 2);
        
        for (let i = start; i <= end; i++) {
          html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="${elId === 'bbcPagination' ? 'setBBCPage' : 'setWikiPage'}(${i})">${i}</button>`;
        }
        
        if (currentPage < totalPages - 3) html += `<button class="page-btn" disabled>...</button>`;
        html += `<button class="page-btn ${totalPages === currentPage ? 'active' : ''}" onclick="${elId === 'bbcPagination' ? 'setBBCPage' : 'setWikiPage'}(${totalPages})">${totalPages}</button>`;
      }
      
      document.getElementById(elId).innerHTML = html;
    }
    
    function setBBCPage(page) {
      bbcPage = page;
      updateBBC(page);
      startPageRotation();
    }
    
    function setWikiPage(page) {
      wikiPage = page;
      updateWiki(page);
      startPageRotation();
    }
    
    updateMiniClock();
    setInterval(updateMiniClock, 1000);
    
    fetchWeather();
    fetchWiki();
    fetchBBC();
    
    setInterval(fetchWeather, 30 * 60 * 1000);
    setInterval(fetchBBC, 30 * 60 * 1000);
    
    startPageRotation();
  </script>
</body>
</html>
