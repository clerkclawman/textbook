<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phonics Flashcards</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: 'Comic Sans MS', 'Chalkboard SE', 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      overflow: hidden;
    }
    
    header {
      position: absolute;
      top: 10px;
      left: 10px;
    }
    
    .mini-clock {
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
      color: rgba(255,255,255,0.8);
      background: rgba(0,0,0,0.2);
      padding: 0.3rem 0.6rem;
      border-radius: 8px;
    }
    
    @media TV {
      .mini-clock { font-size: 1.2rem; }
    }
    
    .controls {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 2rem;
      padding: 1rem;
      background: rgba(255,255,255,0.1);
      border-radius: 15px;
    }
    
    .controls button, .controls select {
      padding: 0.8rem 1.5rem;
      border: 2px solid rgba(255,255,255,0.4);
      background: rgba(255,255,255,0.15);
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      border-radius: 25px;
      transition: all 0.3s ease;
      font-weight: bold;
    }
    
    .controls button:hover, .controls select:hover {
      transform: scale(1.1);
      background: rgba(255,255,255,0.3);
      border-color: #fff;
    }
    
    .controls button.active, .controls select.active {
      background: #fff;
      color: #667eea;
      border-color: #fff;
    }
    
    .card-container {
      perspective: 1000px;
      width: min(90vw, 80vh);
      height: min(70vh, 60vw);
      max-width: 600px;
      max-height: 500px;
    }
    
    .card {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.6s ease;
      cursor: pointer;
    }
    
    .card.flipped {
      transform: rotateY(180deg);
    }
    
    .card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 25px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      font-weight: bold;
    }
    
    .card-front {
      background: #fff;
      color: #667eea;
      font-size: min(35vw, 30vh);
    }
    
    .card-back {
      background: linear-gradient(145deg, #fff9c4, #fff59d);
      color: #333;
      transform: rotateY(180deg);
      font-size: min(25vw, 20vh);
      flex-direction: column;
      gap: 1rem;
    }
    
    .emoji {
      font-size: min(20vw, 18vh);
    }
    
    @media TV {
      .card-container {
        max-width: 800px;
        max-height: 600px;
      }
      
      .card-front { font-size: 400px !important; }
      .card-back { font-size: 250px !important; }
      .emoji { font-size: 200px !important; }
      
      .controls button, .controls select {
        font-size: 1.5rem;
        padding: 1rem 2rem;
        min-width: 200px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="mini-clock" id="miniClock"></div>
  </header>
  
  <div class="controls">
    <select id="caseSelect">
      <option value="upper">A B C - Uppercase</option>
      <option value="lower">a b c - Lowercase</option>
    </select>
    
    <button id="orderBtn" data-order="alphabetical">Alphabetical</button>
    <button id="jumbleBtn" data-order="jumble">Jumble</button>
    
    <select id="autoRotate">
      <option value="off">Auto: Off</option>
      <option value="slow">Auto: Slow (3s)</option>
      <option value="fast">Auto: Fast (1s)</option>
    </select>
    
    <button id="prevBtn">← Prev</button>
    <button id="nextBtn">Next →</button>
  </div>
  
  <div class="card-container">
    <div class="card" id="card">
      <div class="card-face card-front">
        <div id="letter">A</div>
      </div>
      <div class="card-face card-back">
        <div id="word">apple</div>
        <div class="emoji" id="emoji">🍎</div>
      </div>
    </div>
  </div>

  <script>
    const phonicsData = [
      { letter: 'A', word: 'apple', emoji: '🍎' },
      { letter: 'B', word: 'ball', emoji: '⚽' },
      { letter: 'C', word: 'cat', emoji: '🐱' },
      { letter: 'D', word: 'dog', emoji: '🐕' },
      { letter: 'E', word: 'egg', emoji: '🥚' },
      { letter: 'F', word: 'fish', emoji: '🐟' },
      { letter: 'G', word: 'goat', emoji: '🐐' },
      { letter: 'H', word: 'hat', emoji: '🎩' },
      { letter: 'I', word: 'ice cream', emoji: '🍦' },
      { letter: 'J', word: 'juice', emoji: '🧃' },
      { letter: 'K', word: 'kite', emoji: '🪁' },
      { letter: 'L', word: 'lemon', emoji: '🍋' },
      { letter: 'M', word: 'milk', emoji: '🥛' },
      { letter: 'N', word: 'nest', emoji: '🪺' },
      { letter: 'O', word: 'orange', emoji: '🍊' },
      { letter: 'P', word: 'pig', emoji: '🐷' },
      { letter: 'Q', word: 'queen', emoji: '👸' },
      { letter: 'R', word: 'rabbit', emoji: '🐰' },
      { letter: 'S', word: 'sun', emoji: '☀️' },
      { letter: 'T', word: 'tree', emoji: '🌳' },
      { letter: 'U', word: 'umbrella', emoji: '☂️' },
      { letter: 'V', word: 'van', emoji: '🚐' },
      { letter: 'W', word: 'water', emoji: '💧' },
      { letter: 'X', word: 'xylophone', emoji: '🎵' },
      { letter: 'Y', word: 'yogurt', emoji: '🥣' },
      { letter: 'Z', word: 'zebra', emoji: '🦓' }
    ];
    
    let currentIndex = 0;
    let isFlipped = false;
    let autoRotateInterval = null;
    let useUppercase = true;
    let useAlphabetical = true;
    
    const card = document.getElementById('card');
    const letterEl = document.getElementById('letter');
    const wordEl = document.getElementById('word');
    const emojiEl = document.getElementById('emoji');
    const caseSelect = document.getElementById('caseSelect');
    const orderBtn = document.getElementById('orderBtn');
    const jumbleBtn = document.getElementById('jumbleBtn');
    const autoRotateSelect = document.getElementById('autoRotate');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    
    function updateCard() {
      const item = phonicsData[currentIndex];
      letterEl.textContent = useUppercase ? item.letter.toUpperCase() : item.letter.toLowerCase();
      wordEl.textContent = item.word;
      emojiEl.textContent = item.emoji;
      isFlipped = false;
      card.classList.remove('flipped');
    }
    
    function flipCard() {
      isFlipped = !isFlipped;
      card.classList.toggle('flipped');
    }
    
    function nextCard() {
      currentIndex = (currentIndex + 1) % phonicsData.length;
      updateCard();
    }
    
    function prevCard() {
      currentIndex = (currentIndex - 1 + phonicsData.length) % phonicsData.length;
      updateCard();
    }
    
    function sortData() {
      if (useAlphabetical) {
        phonicsData.sort((a, b) => a.letter.localeCompare(b.letter));
        orderBtn.classList.add('active');
        jumbleBtn.classList.remove('active');
      } else {
        phonicsData.sort(() => Math.random() - 0.5);
        orderBtn.classList.remove('active');
        jumbleBtn.classList.add('active');
      }
      currentIndex = 0;
      updateCard();
    }
    
    function setAutoRotate() {
      clearInterval(autoRotateInterval);
      
      const value = autoRotateSelect.value;
      if (value === 'slow') {
        autoRotateInterval = setInterval(() => {
          if (isFlipped) { flipCard(); } else { nextCard(); }
        }, 3000);
      } else if (value === 'fast') {
        autoRotateInterval = setInterval(() => {
          if (isFlipped) { flipCard(); } else { nextCard(); }
        }, 1000);
      }
    }
    
    card.addEventListener('click', flipCard);
    nextBtn.addEventListener('click', nextCard);
    prevBtn.addEventListener('click', prevCard);
    caseSelect.addEventListener('change', () => {
      useUppercase = caseSelect.value === 'upper';
      updateCard();
    });
    orderBtn.addEventListener('click', () => {
      useAlphabetical = true;
      sortData();
    });
    jumbleBtn.addEventListener('click', () => {
      useAlphabetical = false;
      sortData();
    });
    autoRotateSelect.addEventListener('change', setAutoRotate);
    
    document.addEventListener('keydown', (e) => {
      switch(e.key) {
        case ' ':
        case 'Enter':
          flipCard();
          break;
        case 'ArrowRight':
          nextCard();
          break;
        case 'ArrowLeft':
          prevCard();
          break;
        }
    });
    
    // Mini clock
    function updateMiniClock() {
      const now = new Date();
      const time = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
      const date = now.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
      document.getElementById('miniClock').textContent = `${date} ${time}`;
    }
    
    setInterval(updateMiniClock, 1000);
    updateMiniClock();
    updateCard();
    orderBtn.classList.add('active');
  </script>
</body>
</html>
