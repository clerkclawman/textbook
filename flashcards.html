<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phonics Flashcards</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Comic Sans MS', 'Chalkboard SE', 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      overflow: hidden;
    }
    
    header {
      position: absolute;
      top: 10px;
      left: 10px;
    }
    
    .mini-clock {
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
      color: rgba(255,255,255,0.8);
      background: rgba(0,0,0,0.2);
      padding: 0.3rem 0.6rem;
      border-radius: 8px;
    }
    
    @media TV { .mini-clock { font-size: 1.2rem; }
    
    .controls {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 2rem;
      padding: 1rem;
      background: rgba(255,255,255,0.1);
      border-radius: 15px;
    }
    
    .controls button, .controls select {
      padding: 0.8rem 1.5rem;
      border: 2px solid rgba(255,255,255,0.4);
      background: rgba(255,255,255,0.15);
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      border-radius: 25px;
      transition: all 0.3s ease;
      font-weight: bold;
    }
    
    .controls button:hover, .controls select:hover {
      transform: scale(1.1);
      background: rgba(255,255,255,0.3);
      border-color: #fff;
    }
    
    .controls button.active, .controls select.active {
      background: #fff;
      color: #667eea;
      border-color: #fff;
    }
    
    .card-container {
      perspective: 1000px;
      width: min(90vw, 80vh);
      height: min(70vh, 60vw);
      max-width: 600px;
      max-height: 500px;
    }
    
    .card {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.6s ease;
      cursor: pointer;
    }
    
    .card.flipped { transform: rotateY(180deg); }
    
    .card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 25px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      font-weight: bold;
    }
    
    .card-front {
      background: #fff;
      color: #667eea;
      font-size: min(35vw, 30vh);
    }
    
    .card-back {
      background: linear-gradient(145deg, #fff9c4, #fff59d);
      color: #333;
      transform: rotateY(180deg);
      padding: 1rem;
    }
    
    .front-letter { font-size: min(30vw, 25vh); }
    .front-word { font-size: min(18vw, 15vh); margin-bottom: 0.5rem; }
    .front-emoji { font-size: min(18vw, 15vh); }
    
    .back-word { font-size: min(20vw, 17vh); }
    .back-jp { font-size: min(14vw, 11vh); color: #ff6b6b; margin-top: 0.3rem; }
    .back-meaning { font-size: min(12vw, 9vw); color: #4ecdc4; }
    .back-emoji { font-size: min(18vw, 15vw); }
    
    @media TV {
      .card-container { max-width: 800px; max-height: 600px; }
      .card-front { font-size: 400px !important; }
      .card-back { font-size: 250px !important; }
      .front-letter { font-size: 300px !important; }
      .front-word { font-size: 180px !important; }
      .front-emoji { font-size: 180px !important; }
      .back-word { font-size: 200px !important; }
      .back-jp { font-size: 140px !important; }
      .back-meaning { font-size: 120px !important; }
      .back-emoji { font-size: 180px !important; }
      .controls button, .controls select { font-size: 1.5rem; padding: 1rem 2rem; min-width: 200px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="mini-clock" id="miniClock"></div>
  </header>
  
  <div class="controls">
    <select id="deckSelect">
      <option value="basic">📖 Basic Alphabet</option>
      <option value="advanced">🎯 Advanced Phonics</option>
      <option value="sight-words">📚 Sight Words</option>
    </select>
    
    <select id="caseSelect">
      <option value="upper">Uppercase ABC</option>
      <option value="lower">Lowercase abc</option>
    </select>
    
    <button id="orderBtn" data-order="alphabetical">A to Z</button>
    <button id="jumbleBtn" data-order="jumble">Jumble</button>
    
    <select id="autoRotate">
      <option value="off">Auto: Off</option>
      <option value="slow">Auto: Slow (3s)</option>
      <option value="fast">Auto: Fast (1s)</option>
    </select>
    
    <button id="prevBtn">← Prev</button>
    <button id="nextBtn">Next →</button>
  </div>
  
  <div class="card-container">
    <div class="card" id="card">
      <div class="card-face card-front">
        <div class="front-letter" id="frontLetter">A</div>
        <div class="front-word" id="frontWord">apple</div>
        <div class="front-emoji" id="frontEmoji">🍎</div>
      </div>
      <div class="card-face card-back">
        <div class="back-word" id="backWord"></div>
        <div class="back-jp" id="backJp"></div>
        <div class="back-meaning" id="backMeaning"></div>
        <div class="back-emoji" id="backEmoji"></div>
      </div>
    </div>
  </div>

  <script>
    // Basic alphabet
    const basicData = [
      { letter: 'A', word: 'apple', emoji: '🍎' },
      { letter: 'B', word: 'ball', emoji: '⚽' },
      { letter: 'C', word: 'cat', emoji: '🐱' },
      { letter: 'D', word: 'dog', emoji: '🐕' },
      { letter: 'E', word: 'egg', emoji: '🥚' },
      { letter: 'F', word: 'fish', emoji: '🐟' },
      { letter: 'G', word: 'goat', emoji: '🐐' },
      { letter: 'H', word: 'hat', emoji: '🎩' },
      { letter: 'I', word: 'ice cream', emoji: '🍦' },
      { letter: 'J', word: 'juice', emoji: '🧃' },
      { letter: 'K', word: 'kite', emoji: '🪁' },
      { letter: 'L', word: 'lemon', emoji: '🍋' },
      { letter: 'M', word: 'milk', emoji: '🥛' },
      { letter: 'N', word: 'nest', emoji: '🪺' },
      { letter: 'O', word: 'orange', emoji: '🍊' },
      { letter: 'P', word: 'pig', emoji: '🐷' },
      { letter: 'Q', word: 'queen', emoji: '👸' },
      { letter: 'R', word: 'rabbit', emoji: '🐰' },
      { letter: 'S', word: 'sun', emoji: '☀️' },
      { letter: 'T', word: 'tree', emoji: '🌳' },
      { letter: 'U', word: 'umbrella', emoji: '☂️' },
      { letter: 'V', word: 'van', emoji: '🚐' },
      { letter: 'W', word: 'water', emoji: '💧' },
      { letter: 'X', word: 'xylophone', emoji: '🎵' },
      { letter: 'Y', word: 'yogurt', emoji: '🥣' },
      { letter: 'Z', word: 'zebra', emoji: '🦓' }
    ];
    
    // Advanced phonics (digraphs, blends, diphthongs)
    const advancedData = [
      // Digraphs
      { letter: 'sh', word: 'ship', emoji: '⛵' },
      { letter: 'ch', word: 'chip', emoji: '🍟' },
      { letter: 'th', word: 'thumb', emoji: '👍' },
      { letter: 'wh', word: 'what', emoji: '❓' },
      { letter: 'ph', word: 'phone', emoji: '📱' },
      { letter: 'ck', word: 'duck', emoji: '🦆' },
      { letter: 'ng', word: 'sing', emoji: '🎤' },
      { letter: 'sh', word: 'shoe', emoji: '👟' },
      { letter: 'ch', word: 'chair', emoji: '🪑' },
      
      // Blends (consonants together)
      { letter: 'bl', word: 'blue', emoji: '🔵' },
      { letter: 'cl', word: 'clock', emoji: '⏰' },
      { letter: 'fl', word: 'flower', emoji: '🌸' },
      { letter: 'pl', word: 'plane', emoji: '✈️' },
      { letter: 'sl', word: 'sleep', emoji: '😴' },
      { letter: 'br', word: 'brown', emoji: '🟤' },
      { letter: 'cr', word: 'crab', emoji: '🦀' },
      { letter: 'dr', word: 'dragon', emoji: '🐉' },
      { letter: 'fr', word: 'frog', emoji: '🐸' },
      { letter: 'gr', word: 'green', emoji: '🟢' },
      { letter: 'pr', word: 'prince', emoji: '🤴' },
      { letter: 'tr', word: 'tree', emoji: '🌳' },
      { letter: 'st', word: 'star', emoji: '⭐' },
      { letter: 'sp', word: 'spoon', emoji: '🥄' },
      { letter: 'sm', word: 'smile', emoji: '😊' },
      { letter: 'sn', word: 'snake', emoji: '🐍' },
      { letter: 'sw', word: 'swim', emoji: '🏊' },
      { letter: 'sc', word: 'scarf', emoji: '🧣' },
      { letter: 'sk', word: 'skunk', emoji: '🦨' },
      
      // Three-letter blends
      { letter: 'spl', word: 'splash', emoji: '💦' },
      { letter: 'spr', word: 'spring', emoji: '🌷' },
      { letter: 'str', word: 'stripe', emoji: '🐯' },
      { letter: 'spl', word: 'splice', emoji: '🧵' },
      { letter: 'spr', word: 'spring', emoji: '🌷' },
      { letter: 'scr', word: 'scream', emoji: '🍦' },
      { letter: 'str', word: 'stream', emoji: '🌊' },
      { letter: 'spl', word: 'split', emoji: '✂️' },
      { letter: 'spr', word: 'spray', emoji: '🌊' },
      { letter: 'scr', word: 'scrape', emoji: '🌙' },
      { letter: 'str', word: 'strong', emoji: '💪' },
      
      // Four-letter blends
      { letter: 'str-1', word: 'strip', emoji: '🎞️' },
      { letter: 'fl-', word: 'float', emoji: '🎈' },
      { letter: 'gl-', word: 'glow', emoji: '✨' },
      { letter: 'br-', word: 'bring', emoji: '📦' },
      { letter: 'cr-', word: 'crash', emoji: '💥' },
      { letter: 'dr-', word: 'drive', emoji: '🚗' },
      { letter: 'fr-', word: 'from', emoji: '➡️' },
      { letter: 'gr-', word: 'grow', emoji: '🌱' },
      { letter: 'pr-', word: 'print', emoji: '🖨️' },
      { letter: 'tr-', word: 'trip', emoji: '✈️' },
      
      // Diphthongs (two vowels together)
      { letter: 'ai', word: 'rain', emoji: '🌧️' },
      { letter: 'ay', word: 'day', emoji: '☀️' },
      { letter: 'ee', word: 'tree', emoji: '🌳' },
      { letter: 'ie', word: 'pie', emoji: '🥧' },
      { letter: 'oa', word: 'soap', emoji: '🧼' },
      { letter: 'ow', word: 'owl', emoji: '🦉' },
      { letter: 'oi', word: 'coin', emoji: '🪙' },
      { letter: 'oy', word: 'boy', emoji: '👦' },
      { letter: 'oo', word: 'moon', emoji: '🌚' },
      { letter: 'ue', word: 'blue', emoji: '🔵' },
      { letter: 'aw', word: 'saw', emoji: '🪚' },
      { letter: 'ew', word: 'new', emoji: '✨' },
      { letter: 'oy', word: 'toy', emoji: '🧸' },
      { letter: 'oi', word: 'oil', emoji: '🛢️' }
    ];
    
    // Common sight words with Japanese translations
    const sightWordsData = [
      { word: 'the', emoji: '📝', jp: 'その (sono) - "その"', eng: 'the' },
      { word: 'be', emoji: '✓', jp: 'ある (aru) - "在る (aru)"', eng: 'is/am' },
      { word: 'to', emoji: '↘️', jp: 'へ (e) - "へ"', eng: 'to' },
      { word: 'of', emoji: '📦', jp: 'の (no) - "の"', eng: 'of' },
      { word: 'and', emoji: '&', jp: 'と (to) - "と"', eng: 'and' },
      { word: 'I', emoji: '👤', jp: '私 - "私"', eng: 'I' },
      { word: 'a', emoji: '🔤', jp: '一 - "一"', eng: 'a/an' },
      { word: 'in', emoji: '📥', jp: 'に (ni) - "に"', eng: 'in' },
      { word: 'is', emoji: '✅', jp: 'です - "です"', eng: 'is' },
      { word: 'it', emoji: '📎', jp: 'それ (sore)"', eng: 'it' },
      { word: 'you', emoji: '👥', jp: 'あなた - "あなた"', eng: 'you' },
      { word: 'he', emoji: '👨', jp: '彼 - "彼"', eng: 'he' },
      { word: 'she', emoji: '👩', jp: '彼女 - "カノジョ (kanojo)"', eng: 'she' },
      { word: 'we', emoji: '👥', jp: '私達 - "私たち"', eng: 'we' },
      { word: 'they', emoji: '👥', jp: '彼ら - "彼ら"', eng: 'they' },
      { word: 'have', emoji: '✋', jp: 'ある (aru) - "ある (have)"', eng: 'have' },
      { word: 'are', emoji: '✅', jp: '～です (~desu) - "～です (are)"', eng: 'are' },
      { word: 'was', emoji: '✓', jp: 'でした (deshita) - "でした (was)"', eng: 'was' },
      { word: 'were', emoji: '✓', jp: 'いました (imashita) - "いました (were)"', eng: 'were' },
      { word: 'what', emoji: '❓', jp: '何 - "何"', eng: 'what' },
      { word: 'when', emoji: '🕐', jp: 'いつ - "いつ"', eng: 'when' },
      { word: 'where', emoji: '📍', jp: 'どこ - "どこ"', eng: 'where' },
      { word: 'who', emoji: '👤', jp: '誰 - "誰"', eng: 'who' },
      { word: 'how', emoji: '🤔', jp: 'どう - "どう"', eng: 'how' },
      { word: 'come', emoji: '🏃', jp: '来る (kuru) - "来る (come)"', eng: 'come' },
      { word: 'go', emoji: '🚶', jp: '行く (iku) - "行く (go)"', eng: 'go' },
      { word: 'do', emoji: '✍', jp: 'する (suru) - "する (do)"', eng: 'do' },
      { word: 'will', emoji: '🔮', jp: '～する (suru) - "～する (will)"', eng: 'will' },
      { word: 'say', emoji: '💬', jp: '言う (iu) - "言う (say)"', eng: 'say' },
      { word: 'see', emoji: '👀', jp: '見る (miru) - "見る (see)"', eng: 'see' },
      { word: 'make', emoji: '🔨', jp: '作る (tsukuru) - "作る (make)"', eng: 'make/let' },
      { word: 'take', emoji: '🤲', jp: '取る (toru) - "取る (take)"', eng: 'take' },
      { word: 'know', emoji: '💡', jp: '知る (shiru) - "知る (know)"', eng: 'know' },
      { word: 'think', emoji: '💭', jp: '思う (omou) - "思う (think)"', eng: 'think' },
      { word: 'look', emoji: '👀', jp: '見る (miru) - "見る (look)"', eng: 'look' },
      { word: 'want', emoji: '💭', jp: '欲しい (hoshii) - "欲しい (want)"', eng: 'want' },
      { word: 'like', emoji: '❤️', jp: '好き - "好き (like)"', eng: 'like' },
      { word: 'love', emoji: '💕', jp: '好き愛 (suki-ai) - "好き愛 (love)"', eng: 'love' },
      { word: 'can', emoji: '✅', jp: 'できる (dekiru) - "できる (can)"', eng: 'can' },
      { word: 'will', emoji: '🔮', jp: '～する (suru) - "～する (will)"', eng: 'will' },
      { word: 'play', emoji: '🎮', jp: '遊ぶ (asobu) - "遊ぶ (play)"', eng: 'play' },
      { word: 'stop', emoji: '🛑', jp: '止ま (tomeru) - "止まる (stop)"', eng: 'stop' },
      { word: 'good', emoji: '✨', jp: 'いい (ii) - "いい (good)!"', eng: 'good' },
      { word: 'bad', emoji: '❌', jp: '悪い (warui) - "悪い (bad)"', eng: 'bad' },
      { word: 'big', emoji: '🐘', jp: '大きい (ookii) - "大きい (big)"', eng: 'big' },
      { word: 'little', emoji: '🐣', jp: '小さい (chiisai) - "小さい (little)"', eng: 'little' },
      { word: 'help', emoji: '🆘', jp: '手伝う (tetsudau) - "手伝う (help)"', eng: 'help' },
      { word: 'please', emoji: '🙏', jp: 'お願いします (onegaishimas) - 'お願いします', eng: 'please' },
      { word: 'thank', emoji: '🙏', jp: 'ありがとう (arigatou) - 'ありがとう', eng: 'thank' }
    ];
    
    let currentDeck = 'basic';
    let currentData = [...basicData];
    let currentIndex = 0;
    let isFlipped = false;
    let autoRotateInterval = null;
    let useUppercase = true;
    let useAlphabetical = true;
    
    const card = document.getElementById('card');
    const frontLetterEl = document.getElementById('frontLetter');
    const frontWordEl = document.getElementById('frontWord');
    const frontEmojiEl = document.getElementById('frontEmoji');
    const backWordEl = document.getElementById('backWord');
    const backJpEl = document.getElementById('backJp');
    const backMeaningEl = document.getElementById('backMeaning');
    const backEmojiEl = document.getElementById('backEmoji');
    const deckSelect = document.getElementById('deckSelect');
    const caseSelect = document.getElementById('caseSelect');
    const orderBtn = document.getElementById('orderBtn');
    const jumbleBtn = document.getElementById('jumbleBtn');
    const autoRotateSelect = document.getElementById('autoRotate');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    
    function updateCard() {
      const item = currentData[currentIndex];
      
      if (currentDeck === 'sight-words') {
        // Sight words mode
        frontLetterEl.textContent = item.word.charAt(0).toUpperCase();
        frontWordEl.textContent = item.word;
        frontEmojiEl.textContent = item.emoji;
        
        backWordEl.textContent = item.eng;
        backJpEl.textContent = item.jp;
        backMeaningEl.textContent = '';
      } else {
        // Basic or Advanced phonics
        frontLetterEl.textContent = useUppercase ? item.letter.toUpperCase() : item.letter.toLowerCase();
        frontWordEl.textContent = item.word;
        frontEmojiEl.textContent = item.emoji;
        
        backWordEl.textContent = '';
        backJpEl.textContent = '';
        backMeaningEl.textContent = '';
        backEmojiEl.textContent = item.emoji;
      }
      
      isFlipped = false;
      card.classList.remove('flipped');
    }
    
    function flipCard() {
      isFlipped = !isFlipped;
      card.classList.toggle('flipped');
    }
    
    function nextCard() {
      currentIndex = (currentIndex + 1) % currentData.length;
      updateCard();
    }
    
    function prevCard() {
      currentIndex = (currentIndex - 1 + currentData.length) % currentData.length;
      updateCard();
    }
    
    function sortData() {
      if (useAlphabetical) {
        currentData.sort((a, b) => {
          const aKey = currentDeck === 'sight-words' ? a.word : (currentDeck === 'advanced' ? a.letter : a.letter);
          const bKey = currentDeck === 'sight-words' ? b.word : (currentDeck === 'advanced' ? b.letter : b.letter);
          return aKey.localeCompare(bKey);
        });
        orderBtn.classList.add('active');
        jumbleBtn.classList.remove('active');
      } else {
        currentData.sort(() => Math.random() - 0.5);
        orderBtn.classList.remove('active');
        jumbleBtn.classList.add('active');
      }
      currentIndex = 0;
      updateCard();
    }
    
    function switchDeck(deckName) {
      currentDeck = deckName;
      currentIndex = 0;
      
      switch(deckName) {
        case 'basic':
          currentData = [...basicData];
          useUppercase = true;
          break;
        case 'advanced':
          currentData = [...advancedData];
          useUppercase = false;
          break;
        case 'sight-words':
          currentData = [...sightWordsData];
          useUppercase = false;
          break;
      }
      
      useAlphabetical = true;
      deckSelect.value = deckName;
      updateCard();
    }
    
    function setAutoRotate() {
      clearInterval(autoRotateInterval);
      
      const value = autoRotateSelect.value;
      if (value === 'slow') {
        autoRotateInterval = setInterval(() => {
          if (isFlipped) { flipCard(); } else { nextCard(); }
        }, 3000);
      } else if (value === 'fast') {
        autoRotateInterval = setInterval(() => {
          if (isFlipped) { flipCard(); } else { nextCard(); }
        }, 1000);
      }
    }
    
    card.addEventListener('click', flipCard);
    nextBtn.addEventListener('click', nextCard);
    prevBtn.addEventListener('click', prevCard);
    deckSelect.onchange = () => switchDeck(deckSelect.value);
    caseSelect.addEventListener('change', () => {
      useUppercase = caseSelect.value === 'upper';
      if (currentDeck === 'basic') updateCard();
    });
    orderBtn.addEventListener('click', () => {
      useAlphabetical = true;
      sortData();
    });
    jumbleBtn.addEventListener('click', () => {
      useAlphabetical = false;
      sortData();
    });
    autoRotateSelect.addEventListener('change', setAutoRotate);
    
    document.addEventListener('keydown', (e) => {
      switch(e.key) {
        case ' ':
        case 'Enter': flipCard(); break;
        case 'ArrowRight': nextCard(); break;
        case 'ArrowLeft': prevCard(); break;
      }
    });
    
    function updateMiniClock() {
      const now = new Date();
      const time = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
      const date = now.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
      document.getElementById('miniClock').textContent = `${date} ${time}`;
    }
    
    setInterval(updateMiniClock, 1000);
    updateMiniClock();
    updateCard();
    orderBtn.classList.add('active');
  </script>
</body>
</html>
