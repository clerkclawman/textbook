<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎯 Classroom Timer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Courier New', 'Courier', monospace;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    header {
      padding: 0.5rem 1rem;
      background: rgba(255,255,255,0.05);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    
    .mini-clock {
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
      color: #00ff87;
    }
    
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    
    .timer-display {
      font-size: 20vw;
      font-weight: bold;
      color: #fff;
      text-shadow: 4px 4px 0 rgba(0,0,0,0.5);
      line-height: 1;
      margin-top: -5vh;
    }
    
    .timer-display.warning {
      color: #FFD700;
      animation: pulse 1s infinite;
    }
    
    .timer-display.danger {
      color: #FF0000;
      animation: shake 0.2s infinite;
    }
    
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
    
    .controls-row {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      width: 100%;
      padding: 0 2rem;
      margin-top: 2rem;
    }
    
    .controls-group {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    
    button {
      padding: 1rem 1.5rem;
      border: 3px solid rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.1);
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      border-radius: 15px;
      font-weight: bold;
      font-family: 'Segoe UI', sans-serif;
      transition: all 0.3s;
    }
    
    button:hover { transform: scale(1.05); background: rgba(255,255,255,0.2); }
    button.active { background: #00ff87; color: #1a1a2e; border-color: #00ff87; }
    
    .btn-green { border-color: #4CAF50; }
    .btn-red { border-color: #FF5252; }
    .btn-yellow { border-color: #FFD93D; }
    
    @media TV {
      .timer-display { font-size: 25vh !important; }
      button { font-size: 1.5rem; min-width: 180px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="mini-clock" id="miniClock"></div>
  </header>
  
  <main>
    <div class="timer-display" id="timerDisplay">01:00</div>
    
    <div class="controls-row">
      <div class="controls-group">
        <button class="btn-green" id="startBtn">▶ START</button>
        <button class="btn-red" id="stopBtn">⏸ PAUSE</button>
        <button class="btn-yellow" id="resetBtn">🔄 RESET</button>
      </div>
      
      <div class="controls-group">
        <button class="preset-btn" data-seconds="60">1 min</button>
        <button class="preset-btn" data-seconds="120">2 min</button>
        <button class="preset-btn" data-seconds="300">5 min</button>
        <button class="preset-btn" data-seconds="600">10 min</button>
        <button class="preset-btn" data-seconds="1500">25 min</button>
        <button class="preset-btn" data-seconds="3000">50 min</button>
      </div>
      
      <div class="controls-group">
        <button class="sound-btn active" data-sound="countdown">🔢 Countdown</button>
        <button class="sound-btn" data-sound="bomb">💣 Bomb</button>
        <button class="sound-btn" data-sound="fireworks">🎆 Fireworks</button>
        <button class="sound-btn" data-sound="alarm">🚨 Alarm</button>
        <button class="sound-btn" data-sound="fart">💨 Fart</button>
      </div>
    </div>
  </main>

  <script>
    let timerRunning = false;
    let timerInterval = null;
    let totalSeconds = 60;
    let remainingSeconds = 60;
    let currentSoundMode = 'countdown';
    let audioContext = null;
    
    function initAudio() {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
    }
    
    function updateMiniClock() {
      const now = new Date();
      const time = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
      const date = now.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
      document.getElementById('miniClock').textContent = `${date} ${time}`;
    }
    
    function playTone(freq, duration, type = 'sine', volume = 0.4) {
      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();
      osc.connect(gain);
      gain.connect(audioContext.destination);
      osc.frequency.value = freq;
      osc.type = type;
      gain.gain.setValueAtTime(volume, audioContext.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
      osc.start();
      osc.stop(audioContext.currentTime + duration);
    }
    
    function playTick() {
      initAudio();
      playTone(880, 0.05, 'square', 0.15);
    }
    
    function playCountdownSound(seconds) {
      initAudio();
      
      if (seconds > 10) {
        playTick();
      } else {
        const baseFreq = 600 + (10 - seconds) * 100;
        const duration = 0.15 - ((10 - seconds) * 0.01);
        playTone(baseFreq, duration, 'sine', 0.5);
        
        if (seconds <= 3 && seconds > 0) {
          setTimeout(() => {
            playTone(baseFreq + 200, duration * 0.5, 'sine', 0.3);
          }, duration * 500);
        }
      }
    }
    
    function playBombTick() {
      initAudio();
      playTone(600, 0.03, 'square', 0.2);
    }
    
    function playBombSound() {
      initAudio();
      for (let i = 0; i < 10; i++) {
        setTimeout(() => {
          playTone(200 + i * 80, 0.05, 'sawtooth', 0.3);
        }, i * 50);
      }
      
      setTimeout(() => {
        const osc = audioContext.createOscillator();
        const gain = audioContext.createGain();
        const lpf = audioContext.createBiquadFilter();
        
        osc.connect(lpf);
        lpf.connect(gain);
        gain.connect(audioContext.destination);
        
        osc.frequency.setValueAtTime(60, audioContext.currentTime);
        osc.frequency.exponentialRampToValueAtTime(20, audioContext.currentTime + 1.5);
        osc.type = 'sawtooth';
        
        lpf.frequency.setValueAtTime(500, audioContext.currentTime);
        lpf.frequency.exponentialRampToValueAtTime(50, audioContext.currentTime + 1.5);
        
        gain.gain.setValueAtTime(0.8, audioContext.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 1.5);
        
        osc.start();
        osc.stop(audioContext.currentTime + 1.5);
      }, 500);
    }
    
    function playFireworksSound() {
      initAudio();
      const sounds = ['sine', 'triangle', 'square'];
      const colors = ['#FF6B6B', '#4ECDC4', '#45B7D1', '#FFD93D'];
      
      for (let i = 0; i < 8; i++) {
        setTimeout(() => {
          const freq = 200 + Math.random() * 600;
          const dur = 0.3 + Math.random() * 0.3;
          playTone(freq, dur, sounds[Math.floor(Math.random() * sounds.length)], 0.3);
        }, i * 150);
      }
    }
    
    function playAlarmSound() {
      initAudio();
      let count = 0;
      const alarmInterval = setInterval(() => {
        playTone(880, 0.15, 'square', 0.5);
        setTimeout(() => playTone(880, 0.15, 'square', 0.5), 200);
        count++;
        if (count >= 6) clearInterval(alarmInterval);
      }, 300);
    }
    
    function playFartSound() {
      initAudio();
      const duration = 0.8;
      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();
      const lpf = audioContext.createBiquadFilter();
      
      osc.connect(lpf);
      lpf.connect(gain);
      gain.connect(audioContext.destination);
      
      osc.frequency.setValueAtTime(120, audioContext.currentTime);
      osc.frequency.linearRampToValueAtTime(80, audioContext.currentTime + duration * 0.3);
      osc.frequency.linearRampToValueAtTime(150, audioContext.currentTime + duration * 0.7);
      osc.type = 'sawtooth';
      
      lpf.frequency.setValueAtTime(400, audioContext.currentTime);
      lpf.frequency.exponentialRampToValueAtTime(80, audioContext.currentTime + duration);
      
      gain.gain.setValueAtTime(0.5, audioContext.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
      
      osc.start();
      osc.stop(audioContext.currentTime + duration);
    }
    
    function formatTime(seconds) {
      const mins = Math.floor(seconds / 60);
      const secs = seconds % 60;
      return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }
    
    function updateDisplay() {
      const display = document.getElementById('timerDisplay');
      display.textContent = formatTime(remainingSeconds);
      
      display.classList.remove('warning', 'danger');
      if (remainingSeconds <= 10) {
        display.classList.add('danger');
      } else if (remainingSeconds <= 30) {
        display.classList.add('warning');
      }
    }
    
    function startTimer() {
      if (timerRunning) return;
      timerRunning = true;
      initAudio();
      
      timerInterval = setInterval(() => {
        if (remainingSeconds > 0) {
          remainingSeconds--;
          updateDisplay();
          
          if (currentSoundMode === 'countdown') {
            playCountdownSound(remainingSeconds);
          } else if (currentSoundMode === 'bomb' && remainingSeconds <= 10) {
            playBombTick();
          }
        } else {
          clearInterval(timerInterval);
          timerRunning = false;
          
          switch(currentSoundMode) {
            case 'bomb': playBombSound(); break;
            case 'fireworks': playFireworksSound(); break;
            case 'alarm': playAlarmSound(); break;
            case 'fart': playFartSound(); break;
            default:
              for (let i = 1; i <= 3; i++) {
                setTimeout(() => playTone(440 + i * 110, 0.3, 'sine', 0.4), i * 350);
              }
          }
        }
      }, 1000);
    }
    
    function stopTimer() {
      timerRunning = false;
      clearInterval(timerInterval);
    }
    
    function resetTimer() {
      stopTimer();
      remainingSeconds = totalSeconds;
      updateDisplay();
    }
    
    function switchSound(mode) {
      currentSoundMode = mode;
      document.querySelectorAll('.sound-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.sound === mode);
      });
    }
    
    document.getElementById('startBtn').onclick = startTimer;
    document.getElementById('stopBtn').onclick = stopTimer;
    document.getElementById('resetBtn').onclick = resetTimer;
    
    document.querySelectorAll('.sound-btn').forEach(btn => {
      btn.onclick = () => switchSound(btn.dataset.sound);
    });
    
    document.querySelectorAll('.preset-btn').forEach(btn => {
      btn.onclick = () => {
        if (!timerRunning) {
          totalSeconds = parseInt(btn.dataset.seconds);
          remainingSeconds = totalSeconds;
          document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          updateDisplay();
        }
      };
    });
    
    document.querySelectorAll('.preset-btn')[0].classList.add('active');
    
    document.addEventListener('keydown', e => {
      if (e.code === 'Space') e.preventDefault();
      if (e.code === 'Space') (timerRunning ? stopTimer() : startTimer());
      if (e.code === 'KeyR') resetTimer();
    });
    
    updateMiniClock();
    setInterval(updateMiniClock, 1000);
    updateDisplay();
  </script>
</body>
</html>
