<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEWS - Teletext Mode</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Segoe UI', 'Tahoma', 'sans-serif', 'Monaco', 'Consolas', monospace;
      background: #000080;
      color: #fff;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    
    header {
      background: #ff0000;
      color: #fff;
      padding: 0.5vh 1vw;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: bold;
      flex-shrink: 0;
      font-size: 1.8vh;
    }
    
    .page-info {
      background: #ffff00;
      color: #000;
      padding: 0.2rem 0.5rem;
      font-weight: bold;
    }
    
    .page-indicator {
      font-size: 2rem;
      font-weight: bold;
    }
    
    .mini-clock {
      font-family: 'Courier New', monospace;
      font-size: 1.6vh;
      color: #fff;
      background: #000;
      padding: 0.2rem 0.5rem;
    }
    
    .ticker-bar {
      background: #ffff00;
      color: #000;
      padding: 0.4vh 0;
      flex-shrink: 0;
      font-size: 1.4vh;
      white-space: nowrap;
      overflow: hidden;
    }
    
    .ticker-content {
      display: inline-block;
      animation: scroll 40s linear infinite;
    }
    
    @keyframes scroll { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }
    
    .container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    
    .page {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      padding: 2vh 2vw;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }
    
    .page.active {
      display: flex;
      animation: fadeIn 0.3s ease;
    }
    
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    
    .page-header {
      background: #00ffff;
      color: #000;
      padding: 0.5vh 1vw;
      font-weight: bold;
      margin-bottom: 1.5vh;
      text-align: center;
      font-size: 2.5vh;
      text-transform: uppercase;
    }
    
    .content-area {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 0.8vh;
    }
    
    .headline-item {
      background: #000080;
      border-left: 4px solid #ff00ff;
      padding: 0.8vh 1vw;
      font-size: 1.8vh;
      line-height: 1.3;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    
    .headline-item:hover {
      background: #1a1aff;
      cursor: pointer;
    }
    
    .wiki-item {
      background: #000080;
      border-left: 4px solid #ffff00;
      padding: 0.8vh 1vw;
      font-size: 1.8vh;
      line-height: 1.3;
      overflow: hidden;
      display: flex;
      gap: 1vw;
      align-items: flex-start;
    }
    
    .wiki-year {
      background: #ff0000;
      color: #fff;
      padding: 0.2rem 0.5rem;
      font-weight: bold;
      font-size: 1.6vh;
      flex-shrink: 0;
    }
    
    .wiki-text {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }
    
    .pagination {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-top: auto;
      padding-top: 1vh;
    }
    
    .page-btn {
      background: #fff;
      color: #000;
      border: none;
      padding: 0.5vh 1vw;
      font-size: 1.4vh;
      cursor: pointer;
      font-weight: bold;
      font-family: 'Courier New', monospace;
    }
    
    .page-btn:hover { background: #ffff00; }
    .page-btn.active { background: #ff00ff; color: #fff; }
    
    .progress-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 0.4vh;
      background: linear-gradient(90deg, #ff0000, #ff7f00, #ffff00);
      transition: width 0.3s linear;
    }
    
    .weather-bar {
      background: #00ff00;
      color: #000;
      padding: 0.3vh 0;
      font-size: 1.2vh;
      text-align: center;
      flex-shrink: 0;
      white-space: nowrap;
      overflow: hidden;
    }
    
    .weather-content {
      display: inline-block;
      animation: scroll 30s linear infinite;
    }
    
    .weather-item {
      display: inline-block;
      margin: 0 1vw;
    }
    
    @media TV {
      header { font-size: 2.5vh; padding: 1vh 2vw; }
      .page-header { font-size: 3.5vh; padding: 0.8vh 1.5vw; }
      .headline-item, .wiki-item { font-size: 2.5vh; padding: 1.2vh 1.5vw; }
      .ticker-bar, .weather-bar { font-size: 1.8vh; }
      .mini-clock { font-size: 2.2vh; }
      .page-btn { font-size: 2rem; padding: 1vh 1.5vw; }
    }
  </style>
</head>
<body>
  <header>
    <span>📺 TELETEXT NEWS</span>
    <div class="page-info">
      PAGE <span class="page-indicator" id="pageIndicator">1</span> / 2
    </div>
    <div class="mini-clock" id="miniClock"></div>
  </header>
  
  <div class="ticker-bar">
    <div class="ticker-content" id="tickerContent">
      Loading headlines...
    </div>
  </div>
  
  <div class="container">
    <div class="page active" id="page1">
      <div class="page-header">🇬🇧 BBC NEWS</div>
      <div class="content-area" id="bbcContent">
        <div class="headline-item">Loading BBC News...</div>
      </div>
      <div class="pagination" id="bbcPagination"></div>
    </div>
    
    <div class="page" id="page2">
      <div class="page-header">📅 ON THIS DAY</div>
      <div class="content-area" id="wikiContent">
        <div class="wiki-item">Loading Wikipedia...</div>
      </div>
      <div class="pagination" id="wikiPagination"></div>
    </div>
  </div>
  
  <div class="weather-bar">
    <div class="weather-content" id="weatherContent">
      Loading weather...
    </div>
  </div>
  
  <div class="progress-bar" id="progressBar"></div>

  <script>
    let bbcData = [];
    let wikiData = [];
    let bbcPage = 1;
    let wikiPage = 1;
    let currentPage = 1;
    const PAGE_ROTATION_TIME = 10000;
    let pageRotationInterval = null;
    
    const weatherEmojis = {
      0: '☀️', 1: '🌤️', 2: '⛅', 3: '☁️',
      45: '🌫️', 48: '🌫️',
      51: '🌦️', 53: '🌦️', 55: '🌦️',
      61: '🌧️', 63: '🌧️', 65: '🌧️',
      71: '🌨️', 73: '🌨️', 75: '🌨️',
      80: '🌦️', 81: '🌦️', 82: '🌦️',
      95: '⛈️', 96: '⛈️', 99: '⛈️'
    };
    
    const cities = [
      { name: 'Osaka', lat: 34.6937, lon: 135.5023 },
      { name: 'Sapporo', lat: 43.0642, lon: 141.3469 },
      { name: 'Naha', lat: 26.2124, lon: 127.6792 },
      { name: 'New York', lat: 40.7128, lon: -74.0060 },
      { name: 'London', lat: 51.5074, lon: -0.1278 },
      { name: 'Lancaster', lat: 54.0466, lon: -2.8008 },
      { name: 'Moscow', lat: 55.7558, lon: 37.6173 },
      { name: 'Beijing', lat: 39.9042, lon: 116.4074 },
      { name: 'Hollywood', lat: 34.0928, lon: -118.3287 }
    ];
    
    function updateMiniClock() {
      const now = new Date();
      const time = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
      const date = now.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
      document.getElementById('miniClock').textContent = `${date} ${time}`;
    }
    
    function rotatePage() {
      currentPage = currentPage === 1 ? 2 : 1;
      document.getElementById('page1').classList.toggle('active', currentPage === 1);
      document.getElementById('page2').classList.toggle('active', currentPage === 2);
      document.getElementById('pageIndicator').textContent = currentPage;
    }
    
    function startPageRotation() {
      clearInterval(pageRotationInterval);
      updateProgressBar(0);
      
      let progress = 0;
      const progressInterval = setInterval(() => {
        progress += 1;
        updateProgressBar((progress / (PAGE_ROTATION_TIME / 100)) * 100);
      }, PAGE_ROTATION_TIME / 100);
      
      pageRotationInterval = setInterval(() => {
        rotatePage();
        clearInterval(progressInterval);
        progress = 0;
      }, PAGE_ROTATION_TIME);
    }
    
    function updateProgressBar(percent) {
      document.getElementById('progressBar').style.width = `${percent}%`;
    }
    
    async function fetchWeather() {
      try {
        const weatherData = await Promise.all(cities.map(async city => {
          const url = `https://api.open-meteo.com/v1/forecast?latitude=${city.lat}&longitude=${city.lon}&current_weather=true`;
          const response = await fetch(url);
          const data = await response.json();
          return {
            name: city.name,
            temp: Math.round(data.current_weather.temperature),
            code: data.current_weather.weathercode
          };
        }));
        
        document.getElementById('weatherContent').innerHTML = weatherData.map(city => {
          const emoji = weatherEmojis[city.code] || '🌡️';
          return `<span class="weather-item">${city.name}: ${city.temp}°C ${emoji}</span>`;
        }).join('');
      } catch (e) { console.log('Weather error:', e); }
    }
    
    async function fetchWiki() {
      const now = new Date();
      const month = now.getMonth() + 1;
      const day = now.getDate();
      
      try {
        const url = `https://byabbe.se/on-this-day/${month}/${day}/events.json`;
        const response = await fetch(url);
        const data = await response.json();
        
        if (data.events && data.events.length) {
          wikiData = data.events.sort((a, b) => b.year - a.year).slice(0, 100);
          updateWiki(1);
        }
      } catch (e) {
        console.log('Wiki error:', e);
        document.getElementById('wikiContent').innerHTML = `
          <div class="wiki-item">
            <div class="wiki-year">${now.getFullYear()}</div>
            <div class="wiki-text">Today is ${now.toLocaleDateString('en-US', { month: 'long', day: 'numeric' })}</div>
          </div>`;
      }
    }
    
    async function fetchBBC() {
      try {
        const response = await fetch('https://api.rss2json.com/v1/api.json?rss_url=' + encodeURIComponent('http://feeds.bbci.co.uk/news/rss.xml'));
        const data = await response.json();
        
        if (data.items) {
          bbcData = data.items.map(item => ({
            title: item.title,
            link: item.link
          }));
          updateBBC(1);
          updateTicker();
        }
      } catch (e) { console.log('BBC error:', e); }
    }
    
    function updateTicker() {
      const headlines = bbcData.slice(0, 10).map(h => h.title).join('   +++   ');
      document.getElementById('tickerContent').textContent = headlines;
    }
    
    function updateBBC(page) {
      const itemsPerPage = 12;
      const start = (page - 1) * itemsPerPage;
      const end = start + itemsPerPage;
      const items = bbcData.slice(start, end);
      
      document.getElementById('bbcContent').innerHTML = items.map(h => `
        <div class="headline-item" onclick="window.open('${h.link}', '_blank')">${escapeHtml(h.title)}</div>
      `).join('');
      
      renderPagination('bbcPagination', page, itemsPerPage, setBBCPage);
    }
    
    function updateWiki(page) {
      const itemsPerPage = 12;
      const start = (page - 1) * itemsPerPage;
      const end = start + itemsPerPage;
      const items = wikiData.slice(start, end);
      
      document.getElementById('wikiContent').innerHTML = items.map(e => `
        <div class="wiki-item">
          <div class="wiki-year">${e.year}</div>
          <div class="wiki-text">${escapeHtml(e.description)}</div>
        </div>
      `).join('');
      
      renderPagination('wikiPagination', page, itemsPerPage, setWikiPage);
    }
    
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    function renderPagination(elId, currentPage, itemsPerPage, setPage) {
      const data = elId.includes('wiki') ? wikiData : bbcData;
      const totalPages = Math.ceil(data.length / itemsPerPage) || 1;
      let html = '';
      
      html += `<button class="page-btn ${currentPage === 1 ? 'active' : ''}" onclick="${elId === 'bbcPagination' ? 'setBBCPage' : 'setWikiPage'}(1)">1</button>`;
      
      if (totalPages <= 7) {
        for (let i = 2; i <= totalPages; i++) {
          html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="${elId === 'bbcPagination' ? 'setBBCPage' : 'setWikiPage'}(${i})">${i}</button>`;
        }
      } else {
        if (currentPage > 4) html += `<span class="page-btn" style="background:#000080;color:#fff">...</span>`;
        
        const start = Math.max(2, currentPage - 2);
        const end = Math.min(totalPages - 1, currentPage + 2);
        
        for (let i = start; i <= end; i++) {
          html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="${elId === 'bbcPagination' ? 'setBBCPage' : 'setWikiPage'}(${i})">${i}</button>`;
        }
        
        if (currentPage < totalPages - 3) html += `<span class="page-btn" style="background:#000080;color:#fff">...</span>`;
        html += `<button class="page-btn ${totalPages === currentPage ? 'active' : ''}" onclick="${elId === 'bbcPagination' ? 'setBBCPage' : 'setWikiPage'}(${totalPages})">${totalPages}</button>`;
      }
      
      document.getElementById(elId).innerHTML = html;
    }
    
    function setBBCPage(page) {
      bbcPage = page;
      updateBBC(page);
      if (currentPage === 1) startPageRotation();
    }
    
    function setWikiPage(page) {
      wikiPage = page;
      updateWiki(page);
      if (currentPage === 2) startPageRotation();
    }
    
    updateMiniClock();
    setInterval(updateMiniClock, 1000);
    
    fetchWeather();
    fetchWiki();
    fetchBBC();
    
    setInterval(fetchWeather, 30 * 60 * 1000);
    setInterval(fetchBBC, 30 * 60 * 1000);
    
    startPageRotation();
  </script>
</body>
</html>
