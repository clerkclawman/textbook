<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎯 Classroom Timer - Fun & Loud!</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: 'Comic Sans MS', 'Chalkboard SE', 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #FF6B6B 0%, #4ECDC4 50%, #45B7D1 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      color: #fff;
      overflow: hidden;
    }
    
    header {
      padding: 1.5rem 2rem;
      background: rgba(0,0,0,0.2);
      text-align: center;
      backdrop-filter: blur(10px);
    }
    
    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      text-shadow: 2px 2px 0 rgba(0,0,0,0.2);
    }
    
    .subtitle {
      font-size: 1.1rem;
      opacity: 0.9;
    }
    
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    
    .sound-selector {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    
    .sound-btn {
      padding: 0.8rem 1.5rem;
      border: 3px solid rgba(255,255,255,0.5);
      background: rgba(255,255,255,0.15);
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      border-radius: 25px;
      transition: all 0.3s ease;
      font-weight: bold;
    }
    
    .sound-btn:hover {
      transform: scale(1.1);
    }
    
    .sound-btn.active {
      background: #fff;
      color: #FF6B6B;
      border-color: #fff;
    }
    
    .timer-container {
      background: rgba(255,255,255,0.15);
      padding: 2rem;
      border-radius: 30px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      text-align: center;
      margin-bottom: 2rem;
    }
    
    .timer-display {
      font-size: 6rem;
      font-weight: bold;
      margin: 1rem 0;
      color: #fff;
      text-shadow: 3px 3px 0 rgba(0,0,0,0.3);
      font-family: 'Courier New', monospace;
    }
    
    .timer-display.warning {
      color: #FFD700;
      animation: wobble 0.5s ease-in-out infinite;
    }
    
    .timer-display.danger {
      color: #FF0000;
      animation: shake 0.3s ease-in-out infinite;
    }
    
    @keyframes wobble {
      0%, 100% { transform: rotate(-5deg); }
      50% { transform: rotate(5deg); }
    }
    
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }
    
    .phase-display {
      font-size: 1.8rem;
      margin-bottom: 0.5rem;
      font-weight: bold;
    }
    
    .controls {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    
    .btn {
      padding: 1rem 2rem;
      border: 3px solid rgba(255,255,255,0.5);
      background: linear-gradient(145deg, rgba(255,255,255,0.2), rgba(255,255,255,0.1));
      color: #fff;
      font-size: 1.3rem;
      cursor: pointer;
      border-radius: 25px;
      transition: all 0.3s ease;
      min-width: 140px;
      font-weight: bold;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    
    .btn:hover {
      transform: scale(1.1) translateY(-3px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.2);
    }
    
    .btn-green { border-color: #4CAF50; }
    .btn-red { border-color: #FF5252; }
    .btn-yellow { border-color: #FFD93D; }
    .btn-blue { border-color: #2196F3; }
    
    .lap-times {
      background: rgba(255,255,255,0.1);
      padding: 1rem;
      border-radius: 20px;
      max-width: 400px;
      width: 100%;
    }
    
    .lap-list {
      list-style: none;
      max-height: 150px;
      overflow-y: auto;
    }
    
    .lap-item {
      display: flex;
      justify-content: space-between;
      padding: 0.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    
    .finish-animation {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      pointer-events: none;
    }
    
    .finish-animation.active {
      display: flex;
    }
    
    .finish-emoji {
      font-size: 15rem;
      animation: pop 0.5s ease-out;
    }
    
    @keyframes pop {
      0% { transform: scale(0); opacity: 0; }
      50% { transform: scale(1.5); }
      100% { transform: scale(1); opacity: 1; }
    }
    
    .confetti {
      position: fixed;
      width: 10px;
      height: 10px;
      pointer-events: none;
      animation: confetti-fall 3s linear forwards;
    }
    
    @keyframes confetti-fall {
      0% { transform: translateY(-100vh) rotate(0deg); }
      100% { transform: translateY(100vh) rotate(720deg); }
    }
    
    @media (max-width: 768px) {
      .timer-display { font-size: 4rem; }
      .btn { font-size: 1.1rem; min-width: 100px; }
      h1 { font-size: 1.8rem; }
    }
    
    @media TV {
      .timer-display { font-size: 12rem; }
      .btn { font-size: 2rem; min-width: 250px; }
      h1 { font-size: 4rem; }
    }
  </style>
</head>
<body>
  <header>
    <h1>🎯 Classroom Timer</h1>
    <p class="subtitle">Fun countdown with awesome sounds! 🎉</p>
  </header>
  
  <main>
    <div class="sound-selector">
      <button class="sound-btn active" data-sound="countdown">🔢 Countdown</button>
      <button class="sound-btn" data-sound="bomb">💣 Bomb</button>
      <button class="sound-btn" data-sound="fireworks">🎆 Fireworks</button>
      <button class="sound-btn" data-sound="horn">📯 Horn</button>
    </div>
    
    <div class="timer-container">
      <div class="phase-display" id="phaseDisplay">Ready to start!</div>
      <div class="timer-display" id="timerDisplay">05:00</div>
    </div>
    
    <div class="controls">
      <button class="btn btn-green" id="startBtn">▶️ Start</button>
      <button class="btn btn-red" id="stopBtn">⏸️ Pause</button>
      <button class="btn btn-yellow" id="resetBtn">🔄 Reset</button>
      <button class="btn btn-blue" id="lapBtn">📊 Lap</button>
    </div>
    
    <div class="lap-times">
      <div class="phase-display" style="font-size: 1.2rem;">Lap Times</div>
      <ul class="lap-list" id="lapList">
        <li class="lap-item">
          <span>No laps yet</span>
        </li>
      </ul>
    </div>
  </main>
  
  <div class="finish-animation" id="finishAnimation">
    <div class="finish-emoji">🎉</div>
  </div>

  <script>
    // State
    let timerRunning = false;
    let timerInterval = null;
    let totalSeconds = 300; // 5 minutes default
    let remainingSeconds = 300;
    let laps = [];
    let currentSoundMode = 'countdown';
    let countdownSoundInterval = null;
    
    // Audio Context
    let audioContext = null;
    
    function initAudio() {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
    }
    
    // Sound Functions
    function playCountdownSound(seconds) {
      if (currentSoundMode !== 'countdown') return;
      
      initAudio();
      const oscillator = audioContext.createOscillator();
      const gainNode = audioContext.createGain();
      
      oscillator.connect(gainNode);
      gainNode.connect(audioContext.destination);
      
      oscillator.frequency.setValueAtTime(880 - (seconds * 10), audioContext.currentTime);
      oscillator.type = 'sine';
      
      gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
      
      oscillator.start(audioContext.currentTime);
      oscillator.stop(audioContext.currentTime + 0.3);
    }
    
    function playBombSound() {
      initAudio();
      const oscillator = audioContext.createOscillator();
      const gainNode = audioContext.createGain();
      
      oscillator.connect(gainNode);
      gainNode.connect(audioContext.destination);
      
      oscillator.frequency.setValueAtTime(100, audioContext.currentTime);
      oscillator.frequency.exponentialRampToValueAtTime(30, audioContext.currentTime + 1);
      oscillator.type = 'sawtooth';
      
      gainNode.gain.setValueAtTime(0.5, audioContext.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 1);
      
      oscillator.start(audioContext.currentTime);
      oscillator.stop(audioContext.currentTime + 1);
    }
    
    function playFireworksSound() {
      initAudio();
      
      // Multiple explosions
      for (let i = 0; i < 5; i++) {
        setTimeout(() => {
          const oscillator = audioContext.createOscillator();
          const gainNode = audioContext.createGain();
          
          oscillator.connect(gainNode);
          gainNode.connect(audioContext.destination);
          
          oscillator.frequency.setValueAtTime(200 + Math.random() * 300, audioContext.currentTime);
          oscillator.type = 'triangle';
          
          gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
          gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
          
          oscillator.start(audioContext.currentTime);
          oscillator.stop(audioContext.currentTime + 0.5);
        }, i * 200);
      }
    }
    
    function playHornSound() {
      initAudio();
      const oscillator = audioContext.createOscillator();
      const gainNode = audioContext.createGain();
      
      oscillator.connect(gainNode);
      gainNode.connect(audioContext.destination);
      
      oscillator.frequency.setValueAtTime(350, audioContext.currentTime);
      oscillator.frequency.setValueAtTime(300, audioContext.currentTime + 0.3);
      oscillator.type = 'square';
      
      gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 1);
      
      oscillator.start(audioContext.currentTime);
      oscillator.stop(audioContext.currentTime + 1);
    }
    
    // DOM Elements
    const timerDisplay = document.getElementById('timerDisplay');
    const phaseDisplay = document.getElementById('phaseDisplay');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const resetBtn = document.getElementById('resetBtn');
    const lapBtn = document.getElementById('lapBtn');
    const lapList = document.getElementById('lapList');
    const soundBtns = document.querySelectorAll('.sound-btn');
    const finishAnimation = document.getElementById('finishAnimation');
    
    // Format time
    function formatTime(seconds) {
      const mins = Math.floor(seconds / 60);
      const secs = seconds % 60;
      return `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
    }
    
    // Update display
    function updateDisplay() {
      timerDisplay.textContent = formatTime(remainingSeconds);
      
      // Color coding
      timerDisplay.classList.remove('warning', 'danger');
      if (remainingSeconds <= 10) {
        timerDisplay.classList.add('danger');
        phaseDisplay.textContent = '⚠️ Almost done!';
      } else if (remainingSeconds <= 30) {
        timerDisplay.classList.add('warning');
        phaseDisplay.textContent = '⏰ Hurry up!';
      } else {
        phaseDisplay.textContent = 'Time ticking...';
      }
    }
    
    // Start timer
    function startTimer() {
      if (timerRunning) return;
      
      timerRunning = true;
      initAudio();
      
      timerInterval = setInterval(() => {
        if (remainingSeconds > 0) {
          remainingSeconds--;
          updateDisplay();
          
          // Countdown sounds (last 10 seconds)
          if (currentSoundMode === 'countdown' && remainingSeconds <= 10 && remainingSeconds > 0) {
            playCountdownSound(remainingSeconds);
          }
          
          // Bomb ticking (every second in last 10)
          if (currentSoundMode === 'bomb' && remainingSeconds <= 10 && remainingSeconds > 0) {
            initAudio();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            oscillator.frequency.setValueAtTime(1000, audioContext.currentTime);
            oscillator.type = 'square';
            gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.1);
          }
        } else {
          // Timer finished!
          clearInterval(timerInterval);
          timerRunning = false;
          timerFinished();
        }
      }, 1000);
    }
    
    // Stop timer
    function stopTimer() {
      timerRunning = false;
      clearInterval(timerInterval);
      phaseDisplay.textContent = 'Paused';
    }
    
    // Reset timer
    function resetTimer() {
      stopTimer();
      remainingSeconds = totalSeconds;
      laps = [];
      updateLapDisplay();
      updateDisplay();
      phaseDisplay.textContent = 'Ready to start!';
      timerDisplay.classList.remove('warning', 'danger');
      finishAnimation.classList.remove('active');
    }
    
    // Lap
    function lap() {
      if (!timerRunning) return;
      
      const lapTime = totalSeconds - remainingSeconds;
      laps.push(lapTime);
      updateLapDisplay();
    }
    
    // Update lap display
    function updateLapDisplay() {
      if (laps.length === 0) {
        lapList.innerHTML = '<li class="lap-item"><span>No laps yet</span></li>';
        return;
      }
      
      lapList.innerHTML = laps.map((lap, index) => `
        <li class="lap-item">
          <span>Lap ${index + 1}</span>
          <span>${formatTime(lap)}</span>
        </li>
      `).join('');
    }
    
    // Timer finished
    function timerFinished() {
      phaseDisplay.textContent = '🎉 Time is UP!';
      timerDisplay.classList.add('danger');
      
      // Play finish sound
      switch (currentSoundMode) {
        case 'bomb':
          playBombSound();
          finishAnimation.innerHTML = '<div class="finish-emoji">💥</div>';
          break;
        case 'fireworks':
          playFireworksSound();
          finishAnimation.innerHTML = '<div class="finish-emoji">🎆</div>';
          createConfetti();
          break;
        case 'horn':
          playHornSound();
          finishAnimation.innerHTML = '<div class="finish-emoji">📯</div>';
          break;
        case 'countdown':
        default:
          initAudio();
          const oscillator = audioContext.createOscillator();
          const gainNode = audioContext.createGain();
          oscillator.connect(gainNode);
          gainNode.connect(audioContext.destination);
          oscillator.frequency.setValueAtTime(523.25, audioContext.currentTime);
          oscillator.frequency.setValueAtTime(659.25, audioContext.currentTime + 0.3);
          oscillator.frequency.setValueAtTime(783.99, audioContext.currentTime + 0.6);
          oscillator.type = 'sine';
          gainNode.gain.setValueAtTime(0.5, audioContext.currentTime);
          gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 1);
          oscillator.start(audioContext.currentTime);
          oscillator.stop(audioContext.currentTime + 1);
          finishAnimation.innerHTML = '<div class="finish-emoji">⏰</div>';
          break;
      }
      
      finishAnimation.classList.add('active');
      setTimeout(() => {
        finishAnimation.classList.remove('active');
      }, 3000);
    }
    
    // Create confetti
    function createConfetti() {
      const colors = ['#FF6B6B', '#4ECDC4', '#45B7D1', '#FFD93D', '#6BCB77'];
      
      for (let i = 0; i < 50; i++) {
        setTimeout(() => {
          const confetti = document.createElement('div');
          confetti.className = 'confetti';
          confetti.style.left = Math.random() * 100 + 'vw';
          confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
          confetti.style.animationDelay = Math.random() * 2 + 's';
          document.body.appendChild(confetti);
          
          setTimeout(() => confetti.remove(), 5000);
        }, i * 50);
      }
    }
    
    // Sound mode switching
    function switchSound(mode) {
      currentSoundMode = mode;
      soundBtns.forEach(btn => {
        btn.classList.toggle('active', btn.dataset.sound === mode);
      });
    }
    
    // Event listeners
    startBtn.addEventListener('click', startTimer);
    stopBtn.addEventListener('click', stopTimer);
    resetBtn.addEventListener('click', resetTimer);
    lapBtn.addEventListener('click', lap);
    
    soundBtns.forEach(btn => {
      btn.addEventListener('click', () => switchSound(btn.dataset.sound));
    });
    
    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        if (timerRunning) {
          stopTimer();
        } else {
          startTimer();
        }
      } else if (e.code === 'KeyR') {
        resetTimer();
      } else if (e.code === 'KeyL') {
        lap();
      }
    });
    
    // Initialize
    updateDisplay();
  </script>
</body>
</html>
