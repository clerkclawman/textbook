<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lesson News - Simple Mode</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    header {
      padding: 1.5rem 2rem;
      background: linear-gradient(135deg, #0f3460 0%, #16213e 100%);
    }
    
    .header-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }
    
    h1 {
      font-size: 2rem;
      color: #00ff87;
    }
    
    .datetime {
      display: flex;
      gap: 1rem;
      font-size: 1.2rem;
      font-weight: bold;
    }
    
    .ticker-section {
      background: #0a0a1a;
      border-bottom: 3px solid #00ff87;
      overflow: hidden;
    }
    
    .ticker {
      display: flex;
      align-items: center;
      padding: 1rem 0;
      white-space: nowrap;
      animation: scroll 30s linear infinite;
      cursor: pointer;
    }
    
    .ticker:hover {
      animation-play-state: paused;
    }
    
    @keyframes scroll {
      0% { transform: translateX(100%); }
      100% { transform: translateX(-100%); }
    }
    
    .ticker .breaking {
      background: #ff4444;
      color: white;
      padding: 0.3rem 0.8rem;
      border-radius: 5px;
      font-weight: bold;
      font-size: 0.9rem;
      animation: blink 1s ease-in-out infinite;
    }
    
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    
    .ticker-item {
      display: inline-block;
      font-size: 1.4rem;
      padding: 0 2rem;
    }
    
    .ticker-source {
      color: #00ff87;
      font-weight: bold;
      margin-right: 0.5rem;
    }
    
    .weather-ticker {
      background: #1a1a3a;
      overflow: hidden;
      border-bottom: 2px solid #4a90e2;
    }
    
    .weather-ticker-content {
      display: flex;
      align-items: center;
      padding: 0.8rem 0;
      white-space: nowrap;
      animation: scroll 40s linear infinite;
    }
    
    .weather-item {
      display: inline-block;
      padding: 0 1.5rem;
      font-size: 1.3rem;
    }
    
    .weather-city {
      color: #ffa500;
      font-weight: bold;
    }
    
    .weather-emoji {
      margin-left: 0.5rem;
    }
    
    main {
      flex: 1;
      padding: 1rem 2rem;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
    }
    
    .sections {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
    }
    
    .section {
      background: rgba(255,255,255,0.05);
      padding: 1.5rem;
      border-radius: 15px;
      border: 2px solid rgba(0, 255, 135, 0.2);
    }
    
    .section.full-width {
      grid-column: 1 / -1;
    }
    
    h2 {
      font-size: 1.4rem;
      color: #00ff87;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid rgba(0, 255, 135, 0.3);
    }
    
    .headline-list {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }
    
    .headline {
      background: rgba(255,255,255,0.05);
      padding: 1.2rem 1.5rem;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
      border-left: 4px solid #00ff87;
    }
    
    .headline:hover {
      background: rgba(255,255,255,0.1);
      transform: translateX(5px);
    }
    
    .headline-title {
      font-size: 1.3rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: #fff;
    }
    
    .headline-meta {
      display: flex;
      gap: 1rem;
      font-size: 0.9rem;
      opacity: 0.7;
    }
    
    .headline-source {
      color: #00ff87;
    }
    
    .headline-time {
      color: #ffa500;
    }
    
    .wiki-item {
      background: rgba(255,255,255,0.05);
      padding: 1rem 1.2rem;
      border-radius: 8px;
      margin-bottom: 0.8rem;
      border-left: 3px solid #ffa500;
    }
    
    .wiki-year {
      color: #ffa500;
      font-weight: bold;
      font-size: 1.2rem;
    }
    
    .wiki-text {
      margin-top: 0.3rem;
      font-size: 1.1rem;
    }
    
    footer {
      padding: 1rem 2rem;
      background: #0a0a1a;
      text-align: center;
      font-size: 0.9rem;
      opacity: 0.6;
    }
    
    .source-selector {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
      justify-content: center;
    }
    
    .source-btn {
      padding: 0.5rem 1rem;
      border: 1px solid rgba(0, 255, 135, 0.3);
      background: rgba(0, 255, 135, 0.1);
      color: #00ff87;
      cursor: pointer;
      border-radius: 20px;
      transition: all 0.3s ease;
      font-size: 0.9rem;
    }
    
    .source-btn:hover {
      background: rgba(0, 255, 135, 0.3);
    }
    
    .source-btn.active {
      background: #00ff87;
      color: #1a1a2e;
      font-weight: bold;
    }
    
    @media (max-width: 768px) {
      .sections {
        grid-template-columns: 1fr;
      }
      
      h1 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-content">
      <h1>📺 Lesson News</h1>
      <div class="datetime">
        <span id="time">00:00 AM</span>
        <span id="date">Wednesday, January 1</span>
      </div>
    </div>
  </header>
  
  <div class="ticker-section">
    <div class="ticker" id="newsTicker">
      <span class="breaking">BREAKING</span>
      <span class="ticker-item">Loading news...</span>
    </div>
  </div>
  
  <div class="weather-ticker">
    <div class="weather-ticker-content" id="weatherTicker">
      <span class="weather-item">Loading weather...</span>
    </div>
  </div>
  
  <main>
    <div class="sections">
      <div class="section">
        <div class="source-selector">
          <button class="source-btn active" data-source="bbc">BBC News</button>
          <button class="source-btn" data-source="reuters">Reuters</button>
          <button class="source-btn" data-source="ap">Associated Press</button>
        </div>
        
        <h2 id="sourceTitle">📰 Today's News</h2>
        <div class="headline-list" id="headlineList">
          <div class="headline">
            <div class="headline-title">Loading news...</div>
          </div>
        </div>
      </div>
      
      <div class="section">
        <h2>📅 On This Day</h2>
        <div id="wikiContent">
          <div class="wiki-item">Loading...</div>
        </div>
      </div>
    </div>
  </main>
  
  <footer>
    <p>Simple news ticker for classroom discussion • Click headlines to read more</p>
  </footer>

  <script>
    // Configuration
    const config = {
      rssParserAPI: 'https://api.rss2json.com/v1/api.json?rss_url=',
      sources: {
        bbc: {
          name: 'BBC News',
          url: 'http://feeds.bbci.co.uk/news/rss.xml'
        },
        reuters: {
          name: 'Reuters',
          url: 'https://www.reutersagency.com/rss/feed/news'
        },
        ap: {
          name: 'Associated Press',
          url: 'https://rssfeeds.apnews.com/apnews-topnews'
        }
      },
      cities: [
        { name: 'Tokyo', lat: 35.6895, lon: 139.6917 },
        { name: 'Osaka', lat: 34.6937, lon: 135.5023 },
        { name: 'Kyoto', lat: 35.0116, lon: 135.7681 },
        { name: 'London', lat: 51.5074, lon: -0.1278 },
        { name: 'New York', lat: 40.7128, lon: -74.0060 },
        { name: 'Paris', lat: 48.8566, lon: 2.3522 },
        { name: 'Sydney', lat: -33.8688, lon: 151.2093 },
        { name: 'Singapore', lat: 1.3521, lon: 103.8198 }
      ]
    };
    
    // Weather code to emoji mapping
    const weatherEmojis = {
      0: '☀️', 1: '🌤️', 2: '⛅', 3: '☁️',
      45: '🌫️', 48: '🌫️',
      51: '🌦️', 53: '🌦️', 55: '🌦️',
      61: '🌧️', 63: '🌧️', 65: '🌧️',
      71: '🌨️', 73: '🌨️', 75: '🌨️',
      80: '🌦️', 81: '🌦️', 82: '🌦️',
      95: '⛈️', 96: '⛈️', 99: '⛈️'
    };
    
    // State
    let currentSource = 'bbc';
    let headlines = [];
    let weatherData = [];
    let cache = {};
    const CACHE_TTL = 30 * 60 * 1000; // 30 minutes
    
    // DOM Elements
    const timeEl = document.getElementById('time');
    const dateEl = document.getElementById('date');
    const newsTicker = document.getElementById('newsTicker');
    const weatherTicker = document.getElementById('weatherTicker');
    const headlineList = document.getElementById('headlineList');
    const sourceTitle = document.getElementById('sourceTitle');
    const sourceBtns = document.querySelectorAll('.source-btn');
    const wikiContent = document.getElementById('wikiContent');
    
    // Time and Date
    function updateDateTime() {
      const now = new Date();
      let hours = now.getHours();
      const ampm = hours >= 12 ? 'PM' : 'AM';
      hours = hours % 12;
      hours = hours ? hours : 12;
      const minutes = String(now.getMinutes()).padStart(2, '0');
      
      timeEl.textContent = `${hours}:${minutes} ${ampm}`;
      
      const options = { weekday: 'long', month: 'long', day: 'numeric' };
      dateEl.textContent = now.toLocaleDateString('en-US', options);
    }
    
    // Real Weather using Open-Meteo (free, no API key)
    async function fetchWeather() {
      const cacheKey = 'weather';
      
      // Check cache
      if (cache[cacheKey] && Date.now() - cache[cacheKey].time < CACHE_TTL) {
        weatherData = cache[cacheKey].data;
        updateWeatherTicker();
        return;
      }
      
      try {
        const promises = config.cities.map(async city => {
          const url = `https://api.open-meteo.com/v1/forecast?latitude=${city.lat}&longitude=${city.lon}&current_weather=true`;
          const response = await fetch(url);
          const data = await response.json();
          
          return {
            name: city.name,
            temp: Math.round(data.current_weather.temperature),
            code: data.current_weather.weathercode
          };
        });
        
        weatherData = await Promise.all(promises);
        
        // Cache
        cache[cacheKey] = {
          data: weatherData,
          time: Date.now()
        };
        
        updateWeatherTicker();
      } catch (error) {
        console.error('Failed to fetch weather:', error);
        // Fallback to offline mode
        weatherTicker.innerHTML = '<span class="weather-item">Weather unavailable - please check connection</span>';
      }
    }
    
    // Update weather ticker
    function updateWeatherTicker() {
      const items = weatherData.map(city => {
        const emoji = weatherEmojis[city.code] || '🌡️';
        return `<span class="weather-item">
          <span class="weather-city">${city.name}:</span>
          ${city.temp}°C ${emoji}
        </span>`;
      }).join('');
      
      weatherTicker.innerHTML = items;
    }
    
    // Wikipedia On This Day
    async function fetchWikiOnThisDay() {
      const cacheKey = 'wiki';
      
      if (cache[cacheKey] && Date.now() - cache[cacheKey].time < CACHE_TTL) {
        updateWikiContent(cache[cacheKey].data);
        return;
      }
      
      const now = new Date();
      const month = now.getMonth() + 1;
      const day = now.getDate();
      
      try {
        const url = `https://en.wikipedia.org/api/rest_v1/feed/onthisday/all/${month}/${day}`;
        const response = await fetch(url);
        const data = await response.json();
        
        const events = [];
        
        // Get events from different years
        if (data.events && data.events.length) {
          for (let i = 0; i < Math.min(8, data.events.length); i++) {
            events.push({
              year: data.events[i].year,
              text: data.events[i].text
            });
          }
        }
        
        // Sort by recency (most recent last)
        events.sort((a, b) => b.year - a.year);
        
        // Cache
        cache[cacheKey] = {
          data: events,
          time: Date.now()
        };
        
        updateWikiContent(events);
      } catch (error) {
        console.error('Failed to fetch wiki:', error);
        const now = new Date();
        wikiContent.innerHTML = `
          <div class="wiki-item">
            <div class="wiki-year">${now.getFullYear()}</div>
            <div class="wiki-text">A great day for learning!</div>
          </div>
        `;
      }
    }
    
    // Update wiki content
    function updateWikiContent(events) {
      wikiContent.innerHTML = events.map(e => `
        <div class="wiki-item">
          <div class="wiki-year">${e.year}</div>
          <div class="wiki-text">${e.text}</div>
        </div>
      `).join('');
    }
    
    // News Fetching
    async function fetchHeadlines() {
      const source = config.sources[currentSource];
      const cacheKey = `news_${currentSource}`;
      
      if (cache[cacheKey] && Date.now() - cache[cacheKey].time < CACHE_TTL) {
        headlines = cache[cacheKey].data;
        updateUI();
        return;
      }
      
      try {
        const proxyUrl = config.rssParserAPI + encodeURIComponent(source.url);
        const response = await fetch(proxyUrl);
        const data = await response.json();
        
        if (data.items && data.items.length) {
          headlines = data.items.map(item => ({
            title: item.title || 'No title',
            link: item.link || '#',
            pubDate: item.pubDate || new Date(),
            source: source.name
          }));
          
          cache[cacheKey] = {
            data: headlines,
            time: Date.now()
          };
          
          updateUI();
        }
      } catch (error) {
        console.error('Failed to fetch news:', error);
        headlineList.innerHTML = `
          <div class="headline">
            <div class="headline-title">Unable to load news</div>
            <div class="headline-meta">Please check your connection</div>
          </div>
        `;
      }
    }
    
    // Update UI
    function updateUI() {
      const tickerItems = headlines.slice(0, 8).map(h =>
        `<span class="ticker-item">
          <span class="ticker-source">[${h.source}]</span>
          ${h.title}
        </span>`
      ).join('');
      
      newsTicker.innerHTML = `
        <span class="breaking">BREAKING</span>
        ${tickerItems}
      `;
      
      headlineList.innerHTML = headlines.slice(0, 10).map(h => {
        const date = new Date(h.pubDate);
        const timeAgo = getTimeAgo(date);
        
        return `
          <div class="headline" onclick="window.open('${h.link}', '_blank')">
            <div class="headline-title">${h.title}</div>
            <div class="headline-meta">
              <span class="headline-source">${h.source}</span>
              <span class="headline-time">${timeAgo}</span>
            </div>
          </div>
        `;
      }).join('');
      
      sourceTitle.textContent = `📰 ${source.name}`;
    }
    
    function getTimeAgo(date) {
      const seconds = Math.floor((new Date() - date) / 1000);
      
      if (seconds < 60) return 'Just now';
      if (seconds < 3600) return `${Math.floor(seconds / 60)} min ago`;
      if (seconds < 86400) return `${Math.floor(seconds / 3600)} hours ago`;
      return `${Math.floor(seconds / 86400)} days ago`;
    }
    
    function switchSource(source) {
      currentSource = source;
      sourceBtns.forEach(btn => {
        btn.classList.toggle('active', btn.dataset.source === source);
      });
      fetchHeadlines();
    }
    
    sourceBtns.forEach(btn => {
      btn.addEventListener('click', () => switchSource(btn.dataset.source));
    });
    
    updateDateTime();
    setInterval(updateDateTime, 1000);
    fetchWeather();
    fetchHeadlines();
    fetchWikiOnThisDay();
    
    setInterval(fetchHeadlines, 30 * 60 * 1000);
    setInterval(fetchWeather, 30 * 60 * 1000);
    setInterval(fetchWikiOnThisDay, 60 * 60 * 1000);
  </script>
</body>
</html>
