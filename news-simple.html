<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News Center</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #1a1a2e;
      color: #eee;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    header {
      padding: 0.5rem 1rem;
      background: linear-gradient(135deg, #0f3460 0%, #16213e 100%);
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }
    
    h1 {
      font-size: 1.2rem;
      color: #00ff87;
      font-weight: bold;
    }
    
    .datetime {
      font-size: 0.9rem;
      color: #fff;
    }
    
    .ticker-section {
      background: #0a0a1a;
      border-bottom: 2px solid #00ff87;
      overflow: hidden;
      flex-shrink: 0;
    }
    
    .ticker {
      display: flex;
      align-items: center;
      padding: 0.4rem 0;
      white-space: nowrap;
      animation: scroll 30s linear infinite;
    }
    
    @keyframes scroll {
      0% { transform: translateX(100%); }
      100% { transform: translateX(-100%); }
    }
    
    .ticker .breaking {
      background: #ff4444;
      color: white;
      padding: 0.1rem 0.5rem;
      border-radius: 4px;
      font-weight: bold;
      font-size: 0.7rem;
      margin-right: 0.5rem;
    }
    
    .ticker-item {
      display: inline-block;
      font-size: 0.85rem;
      padding: 0 1rem;
    }
    
    .weather-ticker {
      background: #1a1a3a;
      border-bottom: 2px solid #4a90e2;
      overflow: hidden;
      flex-shrink: 0;
    }
    
    .weather-ticker-content {
      display: flex;
      align-items: center;
      padding: 0.4rem 0;
      white-space: nowrap;
      animation: scroll 25s linear infinite;
    }
    
    .weather-item {
      display: inline-block;
      padding: 0 1rem;
      font-size: 0.85rem;
    }
    
    .weather-city {
      color: #ffa500;
      font-weight: bold;
    }
    
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
      padding: 0.5rem;
      overflow: hidden;
    }
    
    .section {
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    .section-header {
      padding: 0.4rem 0.6rem;
      background: rgba(0,255,135,0.1);
      border-bottom: 1px solid rgba(0,255,135,0.2);
      font-size: 0.85rem;
      color: #00ff87;
      font-weight: bold;
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .pagination {
      display: flex;
      gap: 0.4rem;
    }
    
    .page-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff;
      padding: 0.2rem 0.6rem;
      font-size: 0.75rem;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.2s ease;
    }
    
    .page-btn:hover {
      background: rgba(255,255,255,0.2);
    }
    
    .page-btn.active {
      background: #00ff87;
      color: #1a1a2e;
    }
    
    .content-area {
      flex: 1;
      padding: 0.4rem 0.6rem;
      overflow-y: auto;
      overflow-x: hidden;
    }
    
    .headline {
      background: rgba(255,255,255,0.05);
      padding: 0.5rem 0.6rem;
      border-radius: 6px;
      margin-bottom: 0.4rem;
      border-left: 3px solid #00ff87;
      font-size: 0.8rem;
      line-height: 1.3;
    }
    
    .headline:hover {
      background: rgba(255,255,255,0.1);
    }
    
    .headline-title {
      color: #fff;
      font-weight: 500;
    }
    
    .headline-time {
      color: #888;
      font-size: 0.7rem;
      margin-top: 0.2rem;
    }
    
    .wiki-item {
      background: rgba(255,255,255,0.05);
      padding: 0.4rem 0.5rem;
      border-radius: 5px;
      margin-bottom: 0.3rem;
      border-left: 3px solid #ffa500;
      font-size: 0.8rem;
      line-height: 1.3;
    }
    
    .wiki-year {
      color: #ffa500;
      font-weight: bold;
      font-size: 0.85rem;
    }
    
    .wiki-text {
      color: #ddd;
      margin-top: 0.15rem;
    }
    
    @media TV {
      header {
        padding: 1vh 2vw;
      }
      
      h1 {
        font-size: 2.5rem;
      }
      
      .datetime {
        font-size: 1.8rem;
      }
      
      .ticker-item {
        font-size: 1.3rem;
      }
      
      .weather-item {
        font-size: 1.3rem;
      }
      
      .section-header {
        font-size: 1.5rem;
        padding: 0.8vh 1vw;
      }
      
      .page-btn {
        padding: 0.5rem 1rem;
        font-size: 1.1rem;
      }
      
      .headline, .wiki-item {
        font-size: 1.2rem;
        padding: 1vh 1vw;
        margin-bottom: 0.6rem;
      }
      
      .headline-time {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>📺 NEWS</h1>
    <div class="datetime">
      <span id="time">00:00 AM</span>
      <span id="date">Jan 1</span>
    </div>
  </header>
  
  <div class="ticker-section">
    <div class="ticker" id="newsTicker">
      <span class="breaking">BREAKING</span>
      <span class="ticker-item">Loading...</span>
    </div>
  </div>
  
  <div class="weather-ticker">
    <div class="weather-ticker-content" id="weatherTicker">
      <span class="weather-item">Loading weather...</span>
    </div>
  </div>
  
  <main>
    <div class="section">
      <div class="section-header">
        <span>📚 On This Day</span>
      </div>
      <div class="content-area" id="wikiContent">
        <div class="wiki-item">Loading...</div>
      </div>
    </div>
    
    <div class="section">
      <div class="section-header">
        <span>🇬🇧 BBC News</span>
        <div class="pagination" id="bbcpagination"></div>
      </div>
      <div class="content-area" id="bbcContent">
        <div class="headline">Loading...</div>
      </div>
    </div>
    
    <div class="section">
      <div class="section-header">
        <span>🇯🇵 Japan News</span>
        <div class="pagination" id="jppagination"></div>
      </div>
      <div class="content-area" id="jpContent">
        <div class="headline">Loading...</div>
      </div>
    </div>
  </main>

  <script>
    const ITEMS_PER_PAGE = 7;
    let bbcPage = 1;
    let jpPage = 1;
    
    let bbcData = [];
    let jpData = [];
    let weatherData = [];
    let wikiData = [];
    const CACHE_TTL = 30 * 60 * 1000;
    const cache = {};
    
    const rssParserAPI = 'https://api.rss2json.com/v1/api.json?rss_url=';
    
    const cities = [
      { name: 'Osaka', lat: 34.6937, lon: 135.5023 },
      { name: 'Sapporo', lat: 43.0642, lon: 141.3469 },
      { name: 'Naha', lat: 26.2124, lon: 127.6792 },
      { name: 'New York', lat: 40.7128, lon: -74.0060 },
      { name: 'London', lat: 51.5074, lon: -0.1278 },
      { name: 'Lancaster', lat: 54.0466, lon: -2.8008 },
      { name: 'Moscow', lat: 55.7558, lon: 37.6173 },
      { name: 'Beijing', lat: 39.9042, lon: 116.4074 },
      { name: 'Hollywood', lat: 34.0928, lon: -118.3287 }
    ];
    
    const weatherEmojis = {
      0: '☀️', 1: '🌤️', 2: '⛅', 3: '☁️',
      45: '🌫️', 48: '🌫️',
      51: '🌦️', 53: '🌦️', 55: '🌦️',
      61: '🌧️', 63: '🌧️', 65: '🌧️',
      71: '🌨️', 73: '🌨️', 75: '🌨️',
      80: '🌦️', 81: '🌦️', 82: '🌦️',
      95: '⛈️', 96: '⛈️', 99: '⛈️'
    };
    
    function updateDateTime() {
      const now = new Date();
      let hours = now.getHours();
      const ampm = hours >= 12 ? 'PM' : 'AM';
      hours = hours % 12;
      hours = hours ? hours : 12;
      const minutes = String(now.getMinutes()).padStart(2, '0');
      
      document.getElementById('time').textContent = `${hours}:${minutes} ${ampm}`;
      document.getElementById('date').textContent = now.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }
    
    async function fetchWeather() {
      const cacheKey = 'weather';
      if (cache[cacheKey] && Date.now() - cache[cacheKey].time < CACHE_TTL) {
        updateWeather(cache[cacheKey].data);
        return;
      }
      
      try {
        const promises = cities.map(async city => {
          const url = `https://api.open-meteo.com/v1/forecast?latitude=${city.lat}&longitude=${city.lon}&current_weather=true`;
          const response = await fetch(url);
          const data = await response.json();
          return {
            name: city.name,
            temp: Math.round(data.current_weather.temperature),
            code: data.current_weather.weathercode
          };
        });
        
        weatherData = await Promise.all(promises);
        cache[cacheKey] = { data: weatherData, time: Date.now() };
        updateWeather(weatherData);
      } catch (e) {
        console.log('Weather error:', e);
      }
    }
    
    function updateWeather(data) {
      const items = data.map(city => {
        const emoji = weatherEmojis[city.code] || '🌡️';
        return `<span class="weather-item">${city.name}: ${city.temp}°C ${emoji}</span>`;
      }).join('');
      document.getElementById('weatherTicker').innerHTML = items;
    }
    
    async function fetchWiki() {
      const cacheKey = 'wiki';
      if (cache[cacheKey] && Date.now() - cache[cacheKey].time < 60 * 60 * 1000) {
        updateWiki(cache[cacheKey].data);
        return;
      }
      
      const now = new Date();
      const month = now.getMonth() + 1;
      const day = now.getDate();
      
      try {
        const url = `https://en.wikipedia.org/api/rest_v1/feed/onthisday/all/${month}/${day}`;
        const response = await fetch(url);
        const data = await response.json();
        
        if (data.events && data.events.length) {
          wikiData = data.events.slice(0, 20).map(e => ({
            year: e.year,
            text: e.text.substring(0, 100) + (e.text.length > 100 ? '...' : '')
          }));
          cache[cacheKey] = { data: wikiData, time: Date.now() };
          updateWiki(wikiData);
        }
      } catch (e) {
        console.log('Wiki error:', e);
        // Fallback
        document.getElementById('wikiContent').innerHTML = `
          <div class="wiki-item">
            <div class="wiki-year">${now.getFullYear()}</div>
            <div class="wiki-text">Today is a great day for learning!</div>
          </div>
        `;
      }
    }
    
    function updateWiki(data) {
      document.getElementById('wikiContent').innerHTML = data.map(e => `
        <div class="wiki-item">
          <div class="wiki-year">${e.year}</div>
          <div class="wiki-text">${e.text}</div>
        </div>
      `).join('');
    }
    
    async function fetchBBC() {
      const cacheKey = 'bbc';
      if (cache[cacheKey] && Date.now() - cache[cacheKey].time < CACHE_TTL) {
        bbcData = cache[cacheKey].data;
        updateBBC(bbcPage);
        return;
      }
      
      try {
        const response = await fetch(rssParserAPI + encodeURIComponent('http://feeds.bbci.co.uk/news/rss.xml'));
        const data = await response.json();
        
        if (data.items) {
          bbcData = data.items.map(item => ({
            title: item.title,
            link: item.link,
            pubDate: new Date(item.pubDate)
          }));
          cache[cacheKey] = { data: bbcData, time: Date.now() };
          updateBBC(bbcPage);
        }
      } catch (e) {
        console.log('BBC error:', e);
      }
    }
    
    async function fetchJapan() {
      const cacheKey = 'jp';
      if (cache[cacheKey] && Date.now() - cache[cacheKey].time < CACHE_TTL) {
        updateJapan(jpPage);
        return;
      }
      
      // Try multiple sources
      const sources = [
        'https://www.japantimes.co.jp/feed/topstories/',
        'https://www3.nhk.or.jp/rss/news/cat0.xml'
      ];
      
      for (const url of sources) {
        try {
          const response = await fetch(rssParserAPI + encodeURIComponent(url));
          const data = await response.json();
          
          if (data.items && data.items.length) {
            jpData = data.items.map(item => ({
              title: item.title,
              link: item.link,
              pubDate: new Date(item.pubDate)
            }));
            cache[cacheKey] = { data: jpData, time: Date.now() };
            updateJapan(jpPage);
            return;
          }
        } catch (e) {
          console.log('Japan source failed:', e.message);
        }
      }
      
      // Fallback message
      document.getElementById('jpContent').innerHTML = '<div class="headline">Japan news unavailable</div>';
    }
    
    function renderPagination(elId, total, currentPage, setPage) {
      const totalPages = Math.ceil(total / ITEMS_PER_PAGE) || 1;
      let html = '';
      
      if (totalPages > 1) {
        for (let i = 1; i <= totalPages; i++) {
          const active = i === currentPage ? 'active' : '';
          html += `<button class="page-btn ${active}" onclick="${setPage}(${i})">${i}</button>`;
        }
      }
      
      document.getElementById(elId).innerHTML = html;
    }
    
    function updateBBC(page) {
      const start = (page - 1) * ITEMS_PER_PAGE;
      const end = start + ITEMS_PER_PAGE;
      const items = bbcData.slice(start, end);
      
      document.getElementById('bbcContent').innerHTML = items.map(h => `
        <div class="headline" onclick="window.open('${h.link}', '_blank')">
          <div class="headline-title">${h.title}</div>
          <div class="headline-time">${getTimeAgo(h.pubDate)}</div>
        </div>
      `).join('');
      
      renderPagination('bbcpagination', bbcData.length, page, 'setBBCPage');
      
      // Update ticker
      const tickerItems = bbcData.slice(0, 8).map(h => `<span class="ticker-item">${h.title}</span>`).join('');
      document.getElementById('newsTicker').innerHTML = `<span class="breaking">BREAKING</span>${tickerItems}`;
    }
    
    function updateJapan(page) {
      const start = (page - 1) * ITEMS_PER_PAGE;
      const end = start + ITEMS_PER_PAGE;
      const items = jpData.slice(start, end);
      
      document.getElementById('jpContent').innerHTML = items.map(h => `
        <div class="headline" onclick="window.open('${h.link}', '_blank')">
          <div class="headline-title">${h.title}</div>
          <div class="headline-time">${getTimeAgo(h.pubDate)}</div>
        </div>
      `).join('');
      
      renderPagination('jppagination', jpData.length, page, 'setJPPage');
    }
    
    function getTimeAgo(date) {
      const seconds = Math.floor((new Date() - date) / 1000);
      if (seconds < 60) return 'Just now';
      if (seconds < 3600) return `${Math.floor(seconds / 60)}m ago`;
      if (seconds < 86400) return `${Math.floor(seconds / 3600)}h ago`;
      return `${Math.floor(seconds / 86400)}d ago`;
    }
    
    function setBBCPage(page) {
      bbcPage = page;
      updateBBC(page);
    }
    
    function setJPPage(page) {
      jpPage = page;
      updateJapan(page);
    }
    
    updateDateTime();
    setInterval(updateDateTime, 60000);
    
    fetchWeather();
    fetchWiki();
    fetchBBC();
    fetchJapan();
    
    setInterval(fetchWeather, 30 * 60 * 1000);
    setInterval(fetchBBC, 30 * 60 * 1000);
    setInterval(fetchJapan, 30 * 60 * 1000);
  </script>
</body>
</html>
