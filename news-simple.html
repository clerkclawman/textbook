<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lesson News - TV Mode</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    header {
      padding: 1rem 1.5rem;
      background: linear-gradient(135deg, #0f3460 0%, #16213e 100%);
      flex-shrink: 0;
    }
    
    .header-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    h1 {
      font-size: 1.8rem;
      color: #00ff87;
    }
    
    .datetime {
      display: flex;
      gap: 1rem;
      font-size: 1rem;
      font-weight: bold;
    }
    
    .ticker-section {
      background: #0a0a1a;
      border-bottom: 2px solid #00ff87;
      overflow: hidden;
      flex-shrink: 0;
    }
    
    .ticker {
      display: flex;
      align-items: center;
      padding: 0.6rem 0;
      white-space: nowrap;
      animation: scroll 25s linear infinite;
    }
    
    @keyframes scroll {
      0% { transform: translateX(100%); }
      100% { transform: translateX(-100%); }
    }
    
    .ticker .breaking {
      background: #ff4444;
      color: white;
      padding: 0.2rem 0.6rem;
      border-radius: 5px;
      font-weight: bold;
      font-size: 0.8rem;
      font-family: 'Arial', sans-serif;
    }
    
    .ticker-item {
      display: inline-block;
      font-size: 1.1rem;
      padding: 0 1.5rem;
    }
    
    .ticker-source {
      color: #00ff87;
      font-weight: bold;
      margin-right: 0.4rem;
      font-family: 'Arial', sans-serif;
    }
    
    .weather-ticker {
      background: #1a1a3a;
      overflow: hidden;
      border-bottom: 2px solid #4a90e2;
      flex-shrink: 0;
    }
    
    .weather-ticker-content {
      display: flex;
      align-items: center;
      padding: 0.6rem 0;
      white-space: nowrap;
      animation: scroll 35s linear infinite;
    }
    
    .weather-item {
      display: inline-block;
      padding: 0 1.2rem;
      font-size: 1.1rem;
    }
    
    .weather-city {
      color: #ffa500;
      font-weight: bold;
      font-family: 'Arial', sans-serif;
    }
    
    main {
      flex: 1;
      padding: 0.8rem 1.2rem;
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
      display: flex;
      gap: 0.8rem;
      overflow: hidden;
    }
    
    .sections {
      display: grid;
      grid-template-columns: 1fr 1.5fr;
      gap: 0.8rem;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    
    .section {
      background: rgba(255,255,255,0.05);
      padding: 0.8rem 1rem;
      border-radius: 10px;
      border: 1px solid rgba(0, 255, 135, 0.15);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    .section-title {
      font-size: 1.1rem;
      color: #00ff87;
      margin-bottom: 0.5rem;
      padding-bottom: 0.3rem;
      border-bottom: 1px solid rgba(0, 255, 135, 0.2);
      font-family: 'Arial', sans-serif;
    }
    
    .content-scroll {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
    }
    
    .content-scroll::-webkit-scrollbar {
      width: 6px;
    }
    
    .content-scroll::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.05);
    }
    
    .content-scroll::-webkit-scrollbar-thumb {
      background: rgba(0, 255, 135, 0.3);
      border-radius: 3px;
    }
    
    .headline {
      background: rgba(255,255,255,0.05);
      padding: 0.6rem 0.8rem;
      border-radius: 8px;
      margin-bottom: 0.5rem;
      border-left: 3px solid #00ff87;
      transition: all 0.2s ease;
    }
    
    .headline:hover {
      background: rgba(255,255,255,0.1);
    }
    
    .headline-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: #fff;
      line-height: 1.3;
    }
    
    .headline-meta {
      display: flex;
      gap: 0.5rem;
      font-size: 0.75rem;
      opacity: 0.6;
      margin-top: 0.2rem;
    }
    
    .wiki-item {
      background: rgba(255,255,255,0.05);
      padding: 0.5rem 0.7rem;
      border-radius: 6px;
      margin-bottom: 0.4rem;
      border-left: 3px solid #ffa500;
      line-height: 1.3;
    }
    
    .wiki-year {
      color: #ffa500;
      font-weight: bold;
      font-size: 0.9rem;
      font-family: 'Arial', sans-serif;
    }
    
    .wiki-text {
      font-size: 0.85rem;
      margin-top: 0.2rem;
    }
    
    @media TV {
      body {
        font-size: 1.2rem;
      }
      
      h1 {
        font-size: 2.5rem;
      }
      
      .datetime {
        font-size: 1.5rem;
      }
      
      .ticker-item {
        font-size: 1.6rem;
      }
      
      .weather-item {
        font-size: 1.5rem;
      }
      
      .section-title {
        font-size: 1.5rem;
      }
      
      .headline-title {
        font-size: 1.2rem;
      }
      
      .wiki-item {
        font-size: 1.1rem;
      }
      
      .wiki-year {
        font-size: 1.2rem;
      }
      
      .wiki-text {
        font-size: 1.1rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-content">
      <h1>📺 News Center</h1>
      <div class="datetime">
        <span id="time">00:00 AM</span>
        <span id="date">Wednesday, January 1</span>
      </div>
    </div>
  </header>
  
  <div class="ticker-section">
    <div class="ticker" id="newsTicker">
      <span class="breaking">BREAKING</span>
      <span class="ticker-item">Loading news...</span>
    </div>
  </div>
  
  <div class="weather-ticker">
    <div class="weather-ticker-content" id="weatherTicker">
      <span class="weather-item">Loading weather...</span>
    </div>
  </div>
  
  <main>
    <div class="sections">
      <div class="section">
        <div class="section-title">📅 On This Day</div>
        <div class="content-scroll" id="wikiContent">
          <div class="wiki-item">Loading...</div>
        </div>
      </div>
      
      <div class="section">
        <div class="section-title">📰 BBC News</div>
        <div class="content-scroll" id="headlineList">
          <div class="headline">
            <div class="headline-title">Loading news...</div>
          </div>
        </div>
      </div>
      
      <div class="section" style="display: none;" id="jpNewsSection">
        <div class="section-title">🇯🇵 Japan News</div>
        <div class="content-scroll" id="jpHeadlineList">
          <div class="headline">
            <div class="headline-title">Loading news...</div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script>
    const config = {
      rssParserAPI: 'https://api.rss2json.com/v1/api.json?rss_url=',
      sources: {
        bbc: {
          name: 'BBC News',
          url: 'http://feeds.bbci.co.uk/news/rss.xml'
        },
        japanTimes: {
          name: 'Japan Times',
          url: 'https://www.japantimes.co.jp/feed/topstories/'
        },
        nhk: {
          name: 'NHK World',
          url: 'https://www3.nhk.or.jp/rss/news/cat0.xml'
        }
      },
      cities: [
        { name: 'Osaka', lat: 34.6937, lon: 135.5023 },
        { name: 'Sapporo', lat: 43.0642, lon: 141.3469 },
        { name: 'Naha', lat: 26.2124, lon: 127.6792 },
        { name: 'New York', lat: 40.7128, lon: -74.0060 },
        { name: 'London', lat: 51.5074, lon: -0.1278 },
        { name: 'Lancaster', lat: 54.0466, lon: -2.8008 },
        { name: 'Moscow', lat: 55.7558, lon: 37.6173 },
        { name: 'Beijing', lat: 39.9042, lon: 116.4074 },
        { name: 'Hollywood', lat: 34.0928, lon: -118.3287 }
      ]
    };
    
    const weatherEmojis = {
      0: '☀️', 1: '🌤️', 2: '⛅', 3: '☁️',
      45: '🌫️', 48: '🌫️',
      51: '🌦️', 53: '🌦️', 55: '🌦️',
      61: '🌧️', 63: '🌧️', 65: '🌧️',
      71: '🌨️', 73: '🌨️', 75: '🌨️',
      80: '🌦️', 81: '🌦️', 82: '🌦️',
      95: '⛈️', 96: '⛈️', 99: '⛈️'
    };
    
    let bbcHeadlines = [];
    let japanHeadlines = [];
    let weatherData = [];
    let cache = {};
    const CACHE_TTL = 30 * 60 * 1000;
    
    const timeEl = document.getElementById('time');
    const dateEl = document.getElementById('date');
    const newsTicker = document.getElementById('newsTicker');
    const weatherTicker = document.getElementById('weatherTicker');
    const headlineList = document.getElementById('headlineList');
    const jpHeadlineList = document.getElementById('jpHeadlineList');
    const wikiContent = document.getElementById('wikiContent');
    
    function updateDateTime() {
      const now = new Date();
      let hours = now.getHours();
      const ampm = hours >= 12 ? 'PM' : 'AM';
      hours = hours % 12;
      hours = hours ? hours : 12;
      const minutes = String(now.getMinutes()).padStart(2, '0');
      
      timeEl.textContent = `${hours}:${minutes} ${ampm}`;
      const options = { weekday: 'long', month: 'long', day: 'numeric' };
      dateEl.textContent = now.toLocaleDateString('en-US', options);
    }
    
    async function fetchWeather() {
      const cacheKey = 'weather';
      
      if (cache[cacheKey] && Date.now() - cache[cacheKey].time < CACHE_TTL) {
        weatherData = cache[cacheKey].data;
        updateWeatherTicker();
        return;
      }
      
      try {
        const promises = config.cities.map(async city => {
          const url = `https://api.open-meteo.com/v1/forecast?latitude=${city.lat}&longitude=${city.lon}&current_weather=true`;
          const response = await fetch(url);
          const data = await response.json();
          
          return {
            name: city.name,
            temp: Math.round(data.current_weather.temperature),
            code: data.current_weather.weathercode
          };
        });
        
        weatherData = await Promise.all(promises);
        cache[cacheKey] = { data: weatherData, time: Date.now() };
        updateWeatherTicker();
      } catch (error) {
        console.error('Weather error:', error);
        weatherTicker.innerHTML = '<span class="weather-item">Weather unavailable</span>';
      }
    }
    
    function updateWeatherTicker() {
      const items = weatherData.map(city => {
        const emoji = weatherEmojis[city.code] || '🌡️';
        return `<span class="weather-item">
          <span class="weather-city">${city.name}:</span>
          ${city.temp}°C ${emoji}
        </span>`;
      }).join('');
      weatherTicker.innerHTML = items;
    }
    
    async function fetchWikiOnThisDay() {
      const cacheKey = 'wiki';
      
      if (cache[cacheKey] && Date.now() - cache[cacheKey].time < CACHE_TTL) {
        updateWikiContent(cache[cacheKey].data);
        return;
      }
      
      const now = new Date();
      const month = now.getMonth() + 1;
      const day = now.getDate();
      
      try {
        // Try Wikipedia REST API first
        const url = `https://en.wikipedia.org/api/rest_v1/feed/onthisday/all/${month}/${day}`;
        const response = await fetch(url);
        const data = await response.json();
        
        const events = [];
        
        if (data.events && data.events.length) {
          for (let i = 0; i < Math.min(6, data.events.length); i++) {
            events.push({
              year: data.events[i].year,
              text: data.events[i].text.substring(0, 150) + '...'
            });
          }
        }
        
        events.sort((a, b) => b.year - a.year);
        cache[cacheKey] = { data: events, time: Date.now() };
        updateWikiContent(events);
      } catch (error) {
        console.error('Wiki error:', error);
        // Fallback
        const today = new Date();
        const months = ['January', 'February', 'March', 'April', 'May', 'June', 
                        'July', 'August', 'September', 'October', 'November', 'December'];
        wikiContent.innerHTML = `
          <div class="wiki-item">
            <div class="wiki-year">${today.getFullYear()}</div>
            <div class="wiki-text">Today is ${months[today.getMonth()]} ${today.getDate()} - A great day for learning!</div>
          </div>
        `;
      }
    }
    
    function updateWikiContent(events) {
      wikiContent.innerHTML = events.map(e => `
        <div class="wiki-item">
          <div class="wiki-year">${e.year}</div>
          <div class="wiki-text">${e.text}</div>
        </div>
      `).join('');
    }
    
    async function fetchBBCNews() {
      const cacheKey = 'bbc_news';
      
      if (cache[cacheKey] && Date.now() - cache[cacheKey].time < CACHE_TTL) {
        bbcHeadlines = cache[cacheKey].data;
        updateNewsUI();
        return;
      }
      
      try {
        const proxyUrl = config.rssParserAPI + encodeURIComponent(config.sources.bbc.url);
        const response = await fetch(proxyUrl);
        const data = await response.json();
        
        if (data.items && data.items.length) {
          bbcHeadlines = data.items.slice(0, 12).map(item => ({
            title: item.title || 'No title',
            link: item.link || '#',
            pubDate: item.pubDate || new Date(),
            source: 'BBC'
          }));
          
          cache[cacheKey] = { data: bbcHeadlines, time: Date.now() };
          updateNewsUI();
        }
      } catch (error) {
        console.error('BBC news error:', error);
        headlineList.innerHTML = '<div class="headline"><div class="headline-title">Unable to load BBC news</div></div>';
      }
    }
    
    async function fetchJapanNews() {
      const cacheKey = 'jp_news';
      
      if (cache[cacheKey] && Date.now() - cache[cacheKey].time < CACHE_TTL) {
        japanHeadlines = cache[cacheKey].data;
        updateJapanUI();
        return;
      }
      
      // Try Japanese news sources
      const sources = [config.sources.japanTimes, config.sources.nhk];
      
      for (const source of sources) {
        try {
          const proxyUrl = config.rssParserAPI + encodeURIComponent(source.url);
          const response = await fetch(proxyUrl);
          const data = await response.json();
          
          if (data.items && data.items.length) {
            japanHeadlines = data.items.slice(0, 8).map(item => ({
              title: item.title || 'No title',
              link: item.link || '#',
              pubDate: item.pubDate || new Date(),
              source: source.name
            }));
            
            cache[cacheKey] = { data: japanHeadlines, time: Date.now() };
            updateJapanUI();
            return;
          }
        } catch (error) {
          console.log(`${source.name} failed:`, error.message);
        }
      }
      
      // If both fail, hide Japanese section
      if (japanHeadlines.length === 0) {
        jpHeadlineList.innerHTML = '<div class="headline"><div class="headline-title">Japan news unavailable</div></div>';
      }
    }
    
    function updateNewsUI() {
      const tickerItems = bbcHeadlines.slice(0, 6).map(h =>
        `<span class="ticker-item">
          <span class="ticker-source">[BBC]</span>
          ${h.title}
        </span>`
      ).join('');
      
      newsTicker.innerHTML = `
        <span class="breaking">BREAKING</span>
        ${tickerItems}
      `;
      
      headlineList.innerHTML = bbcHeadlines.map(h => {
        const date = new Date(h.pubDate);
        const timeAgo = getTimeAgo(date);
        return `
          <div class="headline" onclick="window.open('${h.link}', '_blank')">
            <div class="headline-title">${h.title}</div>
            <div class="headline-meta">
              <span>${timeAgo}</span>
            </div>
          </div>
        `;
      }).join('');
    }
    
    function updateJapanUI() {
      jpHeadlineList.innerHTML = japanHeadlines.map(h => {
        const date = new Date(h.pubDate);
        const timeAgo = getTimeAgo(date);
        return `
          <div class="headline" onclick="window.open('${h.link}', '_blank')">
            <div class="headline-title">${h.title}</div>
            <div class="headline-meta">
              <span>${h.source}</span>
              <span>${timeAgo}</span>
            </div>
          </div>
        `;
      }).join('');
    }
    
    function getTimeAgo(date) {
      const seconds = Math.floor((new Date() - date) / 1000);
      if (seconds < 60) return 'Just now';
      if (seconds < 3600) return `${Math.floor(seconds / 60)}m ago`;
      if (seconds < 86400) return `${Math.floor(seconds / 3600)}h ago`;
      return `${Math.floor(seconds / 86400)}d ago`;
    }
    
    updateDateTime();
    setInterval(updateDateTime, 1000);
    fetchWeather();
    fetchBBCNews();
    fetchWikiOnThisDay();
    fetchJapanNews();
    
    setInterval(fetchBBCNews, 30 * 60 * 1000);
    setInterval(fetchWeather, 30 * 60 * 1000);
    setInterval(fetchWikiOnThisDay, 60 * 60 * 1000);
    setInterval(fetchJapanNews, 30 * 60 * 1000);
  </script>
</body>
</html>
