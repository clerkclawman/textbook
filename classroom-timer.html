<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎯 Classroom Timer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Courier New', 'Courier', monospace;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    header {
      padding: 0.5rem 1rem;
      background: rgba(255,255,255,0.05);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    
    .mini-clock {
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
      color: #00ff87;
    }
    
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    
    .timer-display {
      font-size: 20vw;
      font-weight: bold;
      color: #fff;
      text-shadow: 4px 4px 0 rgba(0,0,0,0.5);
      line-height: 1;
      margin-top: -5vh;
    }
    
    .timer-display.warning {
      color: #FFD700;
      animation: pulse 1s infinite;
    }
    
    .timer-display.danger {
      color: #FF0000;
      animation: shake 0.2s infinite;
    }
    
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.07); } }
    @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-12px); } 75% { transform: translateX(12px); } }
    
    .controls-row {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      width: 100%;
      padding: 0 2rem;
      margin-top: 2rem;
    }
    
    .controls-group {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    
    button, select {
      padding: 1rem 1.5rem;
      border: 3px solid rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.1);
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      border-radius: 15px;
      font-weight: bold;
      font-family: 'Segoe UI', sans-serif;
      transition: all 0.3s;
    }
    
    button:hover, select:hover { transform: scale(1.05); background: rgba(255,255,255,0.2); }
    button.active, select.active { background: #00ff87; color: #1a1a2e; border-color: #00ff87; }
    
    .btn-green { border-color: #4CAF50; }
    .btn-red { border-color: #FF5252; }
    .btn-yellow { border-color: #FFD93D; }
    
    @media TV {
      .timer-display { font-size: 25vh !important; }
      button, select { font-size: 1.5rem; min-width: 180px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="mini-clock" id="miniClock"></div>
  </header>
  
  <main>
    <div class="timer-display" id="timerDisplay">05:00</div>
    
    <div class="controls-row">
      <div class="controls-group">
        <button class="btn-green" id="startBtn">▶ START</button>
        <button class="btn-red" id="stopBtn">⏸ PAUSE</button>
        <button class="btn-yellow" id="resetBtn">🔄 RESET</button>
      </div>
      
      <div class="controls-group">
        <button class="preset-btn" data-seconds="5">5s</button>
        <button class="preset-btn" data-seconds="60">1 min</button>
        <button class="preset-btn" data-seconds="120">2 min</button>
        <button class="preset-btn" data-seconds="300">5 min</button>
        <button class="preset-btn" data-seconds="600">10 min</button>
        <button class="preset-btn" data-seconds="1500">25 min</button>
        <button class="preset-btn" data-seconds="3000">50 min</button>
      </div>
      
      <div class="controls-group">
        <button id="testSoundBtn">🔊 Test Sound</button>
        <select id="soundSelect">
          <option value="bell">🔔 Bell</option>
          <option value="trump">🎺 Trump</option>
          <option value="alarm">🚨 Alarm</option>
          <option value="siren">🚨 Siren</option>
          <option value="foghorn">🌫️ Foghorn</option>
          <option value="airhorn">📯 Air Horn</option>
          <option value="whoop">📢 Whoop</option>
          <option value="buzz">🔊 Buzz</option>
          <option value="chime">🔔 Chime</option>
          <option value="gong">🔔 Gong</option>
          <option value="horn">📯 Horn</option>
          <option value="whistle">🎵 Whistle</option>
          <option value="rooster">🐓 Rooster</option>
          <option value="fireworks">🎆 Fireworks</option>
          <option value="bomb">💣 Bomb</option>
        </select>
      </div>
    </div>
  </main>

  <script>
    let timerRunning = false;
    let timerInterval = null;
    let totalSeconds = 300;
    let remainingSeconds = 300;
    let currentSound = 'bell';
    let audioContext = null;
    
    function initAudio() {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
    }
    
    function updateMiniClock() {
      const now = new Date();
      const time = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
      const date = now.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
      document.getElementById('miniClock').textContent = `${date} ${time}`;
    }
    
    function playTone(freq, duration, type = 'sine', volume = 0.4) {
      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();
      osc.connect(gain);
      gain.connect(audioContext.destination);
      osc.frequency.value = freq;
      osc.type = type;
      gain.gain.setValueAtTime(volume, audioContext.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
      osc.start();
      osc.stop(audioContext.currentTime + duration);
    }
    
    function playBell() {
      initAudio();
      for (let i = 1; i <= 5; i++) {
        setTimeout(() => {
          playTone(523.25 + (i * 20), 0.3, 'sine', 0.4);
        }, i * 200);
      }
    }
    
    function playTrump() {
      initAudio();
      const duration = 1.5;
      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();
      
      osc.connect(gain);
      gain.connect(audioContext.destination);
      
      osc.frequency.setValueAtTime(220, audioContext.currentTime);
      osc.frequency.linearRampToValueAtTime(350, audioContext.currentTime + 0.5);
      osc.type = 'sawtooth';
      
      gain.gain.setValueAtTime(0.5, audioContext.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
      
      osc.start();
      osc.stop(audioContext.currentTime + duration);
    }
    
    function playAlarm() {
      initAudio();
      for (let i = 0; i < 8; i++) {
        setTimeout(() => {
          playTone(880, 0.1, 'square', 0.5);
        }, i * 150);
      }
    }
    
    function playSiren() {
      initAudio();
      let freq = 600;
      for (let i = 0; i < 20; i++) {
        setTimeout(() => {
          playTone(freq, 0.1, 'sawtooth', 0.5);
          freq = freq === 600 ? 1200 : 600;
        }, i * 100);
      }
    }
    
    function playFoghorn() {
      initAudio();
      const duration = 1.5;
      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();
      
      osc.connect(gain);
      gain.connect(audioContext.destination);
      
      osc.frequency.setValueAtTime(80, audioContext.currentTime);
      osc.frequency.linearRampToValueAtTime(120, audioContext.currentTime + 0.5);
      osc.type = 'sawtooth';
      
      gain.gain.setValueAtTime(0.7, audioContext.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
      
      osc.start();
      osc.stop(audioContext.currentTime + duration);
    }
    
    function playAirHorn() {
      initAudio();
      playTone(400, 0.3, 'sawtooth', 0.5);
      setTimeout(() => playTone(350, 0.2, 'sawtooth', 0.5), 300);
      setTimeout(() => playTone(300, 0.1, 'sawtooth', 0.4), 500);
    }
    
    function playWhoop() {
      initAudio();
      setTimeout(() => playTone(300, 0.3, 'sine', 0.3), 0);
      setTimeout(() => playTone(500, 0.2, 'sine', 0.3), 300);
      setTimeout(() => playTone(800, 0.3, 'sine', 0.3), 500);
    }
    
    function playBuzz() {
      initAudio();
      for (let i = 0; i < 15; i++) {
        setTimeout(() => {
          const freq = 120 + Math.random() * 50;
          playTone(freq, 0.05, 'sawtooth', 0.4);
        }, i * 100);
      }
    }
    
    function playChime() {
      initAudio();
      playTone(440, 0.3, 'sine', 0.3);
      setTimeout(() => playTone(554, 0.3, 'sine', 0.3), 200);
      setTimeout(() => playTone(659, 0.4, 'sine', 0.3), 400);
    }
    
    function playGong() {
      initAudio();
      playTone(200, 2.0, 'triangle', 0.6);
      playTone(150, 1.5, 'triangle', 0.4);
    }
    
    function playHorn() {
      initAudio();
      const duration = 1.0;
      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();
      
      osc.connect(gain);
      gain.connect(audioContext.destination);
      
      osc.frequency.setValueAtTime(350, audioContext.currentTime);
      osc.frequency.linearRampToValueAtTime(300, audioContext.currentTime + 0.5);
      osc.type = 'sawtooth';
      
      gain.gain.setValueAtTime(0.5, audioContext.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
      
      osc.start();
      osc.stop(audioContext.currentTime + duration);
    }
    
    function playWhistle() {
      initAudio();
      playTone(1200, 0.2, 'sine', 0.35);
      setTimeout(() => playTone(1500, 0.15, 'sine', 0.3), 200);
      setTimeout(() => playTone(1800, 0.1, 'sine', 0.25), 350);
    }
    
    function playRooster() {
      initAudio();
      playTone(800, 0.1, 'sawtooth', 0.4);
      setTimeout(() => playTone(600, 0.15, 'sawtooth', 0.3), 100);
      setTimeout(() => playTone(1000, 0.4, 'sawtooth', 0.45), 250);
    }
    
    function playFireworks() {
      initAudio();
      const explosions = 5;
      for (let e = 0; e < explosions; e++) {
        const delay = e * 400;
        setTimeout(() => {
          // Whistle up
          const osc1 = audioContext.createOscillator();
          const gain1 = audioContext.createGain();
          osc1.connect(gain1);
          gain1.connect(audioContext.destination);
          osc1.frequency.setValueAtTime(200, audioContext.currentTime);
          osc1.frequency.exponentialRampToValueAtTime(800, audioContext.currentTime + 0.3);
          osc1.type = 'sine';
          gain1.gain.setValueAtTime(0.3, audioContext.currentTime);
          gain1.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
          osc1.start();
          osc1.stop(audioContext.currentTime + 0.3);
          
          // Explosion boom
          setTimeout(() => {
            const osc2 = audioContext.createOscillator();
            const gain2 = audioContext.createGain();
            const noise = audioContext.createOscillator();
            const noiseGain = audioContext.createGain();
            
            osc2.connect(gain2);
            gain2.connect(audioContext.destination);
            osc2.frequency.setValueAtTime(100, audioContext.currentTime);
            osc2.frequency.exponentialRampToValueAtTime(30, audioContext.currentTime + 0.5);
            osc2.type = 'sawtooth';
            gain2.gain.setValueAtTime(0.6, audioContext.currentTime);
            gain2.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
            osc2.start();
            osc2.stop(audioContext.currentTime + 0.5);
            
            // Crackle
            for (let c = 0; c < 8; c++) {
              setTimeout(() => {
                const crackle = audioContext.createOscillator();
                const crackleGain = audioContext.createGain();
                crackle.connect(crackleGain);
                crackleGain.connect(audioContext.destination);
                crackle.frequency.value = 500 + Math.random() * 1000;
                crackle.type = 'square';
                crackleGain.gain.setValueAtTime(0.15, audioContext.currentTime);
                crackleGain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.05);
                crackle.start();
                crackle.stop(audioContext.currentTime + 0.05);
              }, c * 50);
            }
          }, 300);
        }, delay);
      }
    }
    
    function playBomb() {
      initAudio();
      
      // Tick tick tick
      for (let i = 0; i < 5; i++) {
        setTimeout(() => {
          playTone(1000, 0.05, 'square', 0.2);
        }, i * 200);
      }
      
      // Fuse burning sound
      setTimeout(() => {
        const osc = audioContext.createOscillator();
        const gain = audioContext.createGain();
        osc.connect(gain);
        gain.connect(audioContext.destination);
        osc.frequency.setValueAtTime(400, audioContext.currentTime);
        osc.frequency.exponentialRampToValueAtTime(200, audioContext.currentTime + 0.8);
        osc.type = 'sawtooth';
        gain.gain.setValueAtTime(0.25, audioContext.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.8);
        osc.start();
        osc.stop(audioContext.currentTime + 0.8);
      }, 1000);
      
      // BIG EXPLOSION
      setTimeout(() => {
        const osc1 = audioContext.createOscillator();
        const gain1 = audioContext.createGain();
        const osc2 = audioContext.createOscillator();
        const gain2 = audioContext.createGain();
        
        osc1.connect(gain1);
        gain1.connect(audioContext.destination);
        osc1.frequency.setValueAtTime(80, audioContext.currentTime);
        osc1.frequency.exponentialRampToValueAtTime(20, audioContext.currentTime + 1.5);
        osc1.type = 'sawtooth';
        gain1.gain.setValueAtTime(0.8, audioContext.currentTime);
        gain1.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 1.5);
        osc1.start();
        osc1.stop(audioContext.currentTime + 1.5);
        
        osc2.connect(gain2);
        gain2.connect(audioContext.destination);
        osc2.frequency.setValueAtTime(60, audioContext.currentTime);
        osc2.frequency.exponentialRampToValueAtTime(15, audioContext.currentTime + 2);
        osc2.type = 'triangle';
        gain2.gain.setValueAtTime(0.6, audioContext.currentTime);
        gain2.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 2);
        osc2.start();
        osc2.stop(audioContext.currentTime + 2);
        
        // Shockwave
        for (let w = 0; w < 6; w++) {
          setTimeout(() => {
            const osc3 = audioContext.createOscillator();
            const gain3 = audioContext.createGain();
            osc3.connect(gain3);
            gain3.connect(audioContext.destination);
            osc3.frequency.value = 100 + Math.random() * 200;
            osc3.type = 'square';
            gain3.gain.setValueAtTime(0.3, audioContext.currentTime);
            gain3.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
            osc3.start();
            osc3.stop(audioContext.currentTime + 0.1);
          }, w * 100);
        }
      }, 1800);
    }
    
    // Tick sound - quiet
    function playTick() {
      initAudio();
      playTone(600, 0.03, 'square', 0.08);
    }
    
    // Urgent tick - louder
    function playUrgentTick() {
      initAudio();
      playTone(880, 0.08, 'square', 0.25);
    }
    
    function formatTime(seconds) {
      const mins = Math.floor(seconds / 60);
      const secs = seconds % 60;
      return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }
    
    function updateDisplay() {
      const display = document.getElementById('timerDisplay');
      display.textContent = formatTime(remainingSeconds);
      
      display.classList.remove('warning', 'danger');
      if (remainingSeconds <= 10) {
        display.classList.add('danger');
      } else if (remainingSeconds <= 30) {
        display.classList.add('warning');
      }
    }
    
    function playFinalSound() {
      switch(currentSound) {
        case 'bell': playBell(); break;
        case 'trump': playTrump(); break;
        case 'alarm': playAlarm(); break;
        case 'siren': playSiren(); break;
        case 'foghorn': playFoghorn(); break;
        case 'airhorn': playAirHorn(); break;
        case 'whoop': playWhoop(); break;
        case 'buzz': playBuzz(); break;
        case 'chime': playChime(); break;
        case 'gong': playGong(); break;
        case 'horn': playHorn(); break;
        case 'whistle': playWhistle(); break;
        case 'rooster': playRooster(); break;
        case 'fireworks': playFireworks(); break;
        case 'bomb': playBomb(); break;
      }
    }
    
    function startTimer() {
      if (timerRunning) return;
      timerRunning = true;
      initAudio();
      
      timerInterval = setInterval(() => {
        if (remainingSeconds > 0) {
          remainingSeconds--;
          updateDisplay();
          
          // Constant ticking
          if (remainingSeconds <= 10) {
            playUrgentTick();
          } else {
            playTick();
          }
        } else {
          clearInterval(timerInterval);
          timerRunning = false;
          playFinalSound();
        }
      }, 1000);
    }
    
    function stopTimer() {
      timerRunning = false;
      clearInterval(timerInterval);
    }
    
    function resetTimer() {
      stopTimer();
      remainingSeconds = totalSeconds;
      updateDisplay();
      document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
      const minutes = Math.floor(totalSeconds / 60);
      document.querySelector(`[data-seconds="${totalSeconds}"]`)?.classList.add('active');
    }
    
    function switchSound(sound) {
      currentSound = sound;
    }
    
    function testSound() {
      initAudio();
      playFinalSound();
    }
    
    document.getElementById('startBtn').onclick = startTimer;
    document.getElementById('stopBtn').onclick = stopTimer;
    document.getElementById('resetBtn').onclick = resetTimer;
    document.getElementById('soundSelect').onchange = (e) => switchSound(e.target.value);
    document.getElementById('testSoundBtn').onclick = testSound;
    
    document.querySelectorAll('.preset-btn').forEach(btn => {
      btn.onclick = () => {
        if (!timerRunning) {
          totalSeconds = parseInt(btn.dataset.seconds);
          remainingSeconds = totalSeconds;
          
          document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          
          updateDisplay();
        }
      };
    });
    
    document.querySelectorAll('.preset-btn').forEach(b => {
      if (b.dataset.seconds === '300') b.classList.add('active');
    });
    
    document.addEventListener('keydown', e => {
      if (e.code === 'Space') e.preventDefault();
      if (e.code === 'Space') (timerRunning ? stopTimer() : startTimer());
      if (e.code === 'KeyR') resetTimer();
    });
    
    updateMiniClock();
    setInterval(updateMiniClock, 1000);
    updateDisplay();
  </script>
</body>
</html>
