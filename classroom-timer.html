<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Classroom Timer - Lesson Pacing</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      color: #fff;
    }
    
    header {
      padding: 1.5rem 2rem;
      background: rgba(0,0,0,0.3);
      text-align: center;
    }
    
    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }
    
    .subtitle {
      font-size: 1rem;
      opacity: 0.8;
    }
    
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    
    .timer-display {
      font-size: 8rem;
      font-weight: bold;
      font-family: 'Courier New', monospace;
      margin: 1rem 0;
      text-align: center;
      color: #00ff87;
      text-shadow: 0 0 30px rgba(0, 255, 135, 0.5);
    }
    
    .timer-display.warning {
      color: #ffcc00;
      text-shadow: 0 0 30px rgba(255, 204, 0, 0.5);
    }
    
    .timer-display.danger {
      color: #ff4444;
      text-shadow: 0 0 30px rgba(255, 68, 68, 0.5);
      animation: pulse 1s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    
    .phase-display {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
      opacity: 0.9;
    }
    
    .lap-times {
      background: rgba(255,255,255,0.1);
      padding: 1.5rem;
      border-radius: 10px;
      max-width: 600px;
      width: 100%;
      margin-bottom: 1.5rem;
    }
    
    .lap-list {
      list-style: none;
      max-height: 200px;
      overflow-y: auto;
    }
    
    .lap-item {
      display: flex;
      justify-content: space-between;
      padding: 0.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    
    .lap-item:last-child {
      border-bottom: none;
    }
    
    .lap-number {
      font-weight: bold;
      color: #00ff87;
    }
    
    .controls {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 1.5rem;
    }
    
    .btn {
      padding: 1rem 2rem;
      border: 2px solid rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.1);
      color: #fff;
      font-size: 1.2rem;
      cursor: pointer;
      border-radius: 10px;
      transition: all 0.3s ease;
      min-width: 120px;
      font-weight: bold;
    }
    
    .btn:hover {
      background: rgba(255,255,255,0.3);
      border-color: #00ff87;
    }
    
    .btn:active {
      transform: scale(0.95);
    }
    
    .btn-start { border-color: #00ff87; }
    .btn-stop { border-color: #ff4444; }
    .btn-reset { border-color: #ffcc00; }
    
    .presets {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 1.5rem;
    }
    
    .preset-btn {
      padding: 0.5rem 1rem;
      border: 1px solid rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.05);
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      border-radius: 20px;
      transition: all 0.3s ease;
    }
    
    .preset-btn:hover {
      background: rgba(255,255,255,0.2);
      border-color: #00ff87;
    }
    
    .settings {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    
    .setting-group {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    
    .setting-label {
      font-size: 0.9rem;
      margin-bottom: 0.5rem;
      opacity: 0.7;
    }
    
    .setting-input {
      padding: 0.5rem;
      font-size: 1.2rem;
      text-align: center;
      border: 2px solid rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.1);
      color: #fff;
      border-radius: 8px;
      width: 100px;
      font-weight: bold;
    }
    
    .setting-input:focus {
      outline: none;
      border-color: #00ff87;
    }
    
    :placeholder-shown {
      color: rgba(255,255,255,0.5);
    }
    
    .sound-toggle {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    
    .checkbox {
      width: 20px;
      height: 20px;
      cursor: pointer;
    }
    
    @media (max-width: 768px) {
      h1 {
        font-size: 1.8rem;
      }
      
      .timer-display {
        font-size: 5rem;
      }
      
      .btn {
        padding: 0.8rem 1.5rem;
        font-size: 1rem;
        min-width: 100px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>⏱️ Classroom Timer</h1>
    <p class="subtitle">Perfect for lesson pacing, activities, and breaks</p>
  </header>
  
  <main>
    <div class="phase-display" id="phase">Ready to start</div>
    
    <div class="timer-display" id="timer">00:00</div>
    
    <div class="presets">
      <button class="preset-btn" data-seconds="60">1 min</button>
      <button class="preset-btn" data-seconds="180">3 min</button>
      <button class="preset-btn" data-seconds="300">5 min</button>
      <button class="preset-btn" data-seconds="600">10 min</button>
      <button class="preset-btn" data-seconds="900">15 min</button>
      <button class="preset-btn" data-seconds="1800">30 min</button>
      <button class="preset-btn" data-seconds="2700">45 min</button>
      <button class="preset-btn" data-seconds="3600">60 min</button>
    </div>
    
    <div class="settings">
      <div class="setting-group">
        <label class="setting-label">Minutes</label>
        <input type="number" class="setting-input" id="minutes" value="5" min="0" max="99">
      </div>
      <div class="setting-group">
        <label class="setting-label">Seconds</label>
        <input type="number" class="setting-input" id="seconds" value="0" min="0" max="59">
      </div>
    </div>
    
    <div class="sound-toggle">
      <input type="checkbox" class="checkbox" id="soundEnabled" checked>
      <label for="soundEnabled">Enable sound alerts</label>
    </div>
    
    <div class="controls">
      <button class="btn btn-start" id="startBtn">▶ Start</button>
      <button class="btn btn-stop" id="stopBtn">⏸ Pause</button>
      <button class="btn btn-reset" id="resetBtn">↺ Reset</button>
      <button class="btn" id="lapBtn">⏱ Lap</button>
    </div>
    
    <div class="lap-times">
      <div style="margin-bottom: 0.5rem; font-weight: bold;">Lap Times</div>
      <ul class="lap-list" id="lapList">
        <li class="lap-item" style="color: #00ff87;">No laps recorded</li>
      </ul>
    </div>
  </main>

  <script>
    // Timer state
    let totalSeconds = 300;
    let remainingSeconds = 300;
    let timerInterval = null;
    let isRunning = false;
    let lapCount = 0;
    
    // Audio contexts for sounds
    let audioContext = null;
    
    // DOM Elements
    const timerDisplay = document.getElementById('timer');
    const phaseDisplay = document.getElementById('phase');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const resetBtn = document.getElementById('resetBtn');
    const lapBtn = document.getElementById('lapBtn');
    const minutesInput = document.getElementById('minutes');
    const secondsInput = document.getElementById('seconds');
    const lapList = document.getElementById('lapList');
    const soundToggle = document.getElementById('soundEnabled');
    
    // Beep sound using Web Audio API
    function playBeep(frequency = 800, duration = 200) {
      if (!soundToggle.checked) return;
      
      try {
        if (!audioContext) {
          audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }
        
        const oscillator = audioContext.createOscillator();
        const gainNode = audioContext.createGain();
        
        oscillator.connect(gainNode);
        gainNode.connect(audioContext.destination);
        
        oscillator.frequency.value = frequency;
        oscillator.type = 'sine';
        
        gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration / 1000);
        
        oscillator.start(audioContext.currentTime);
        oscillator.stop(audioContext.currentTime + duration / 1000);
      } catch (e) {
        console.log('Audio not available:', e);
      }
    }
    
    // Play alarm sound (triple beep)
    function playAlarm() {
      playBeep(600, 200);
      setTimeout(() => playBeep(600, 200), 300);
      setTimeout(() => playBeep(600, 400), 600);
    }
    
    function formatTime(seconds) {
      const mins = Math.floor(seconds / 60);
      const secs = seconds % 60;
      return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }
    
    function updateDisplay() {
      timerDisplay.textContent = formatTime(remainingSeconds);
      
      // Color coding based on time remaining
      const percentage = remainingSeconds / totalSeconds;
      timerDisplay.classList.remove('warning', 'danger');
      
      if (percentage <= 0.1) {
        timerDisplay.classList.add('danger');
      } else if (percentage <= 0.25) {
        timerDisplay.classList.add('warning');
      }
    }
    
    function startTimer() {
      if (isRunning) return;
      
      isRunning = true;
      startBtn.disabled = true;
      stopBtn.disabled = false;
      phaseDisplay.textContent = '⏱ Timer running...';
      phaseDisplay.style.color = '#00ff87';
      
      playBeep(400, 100); // Start beep
      
      timerInterval = setInterval(() => {
        remainingSeconds--;
        updateDisplay();
        
        // At 25% remaining
        if (remainingSeconds === Math.floor(totalSeconds * 0.25)) {
          phaseDisplay.textContent = '⚠️ 25% remaining';
          phaseDisplay.style.color = '#ffcc00';
          playBeep(500, 150);
        }
        
        // At 10% remaining
        if (remainingSeconds === Math.floor(totalSeconds * 0.1)) {
          phaseDisplay.textContent = '🔔 Almost done!';
          phaseDisplay.style.color = '#ff4444';
          playBeep(600, 200);
        }
        
        // Timer complete
        if (remainingSeconds <= 0) {
          clearInterval(timerInterval);
          isRunning = false;
          
          timerDisplay.textContent = '00:00';
          timerDisplay.classList.remove('warning');
          timerDisplay.classList.add('danger');
          
          phaseDisplay.textContent = '⏰ TIME\'S UP!';
          
          playAlarm();
          stopBtn.disabled = true;
          startBtn.disabled = false;
          lapBtn.disabled = true;
        }
      }, 1000);
    }
    
    function pauseTimer() {
      if (!isRunning) return;
      
      clearInterval(timerInterval);
      isRunning = false;
      startBtn.disabled = false;
      stopBtn.disabled = true;
      phaseDisplay.textContent = '⏸ Paused';
      phaseDisplay.style.color = '#ffcc00';
    }
    
    function resetTimer() {
      clearInterval(timerInterval);
      isRunning = false;
      
      // Reset to input values
      totalSeconds = parseInt(minutesInput.value) * 60 + parseInt(secondsInput.value);
      remainingSeconds = totalSeconds;
      
      updateDisplay();
      
      startBtn.disabled = false;
      stopBtn.disabled = true;
      lapBtn.disabled = false;
      lapCount = 0;
      
      timerDisplay.classList.remove('warning', 'danger');
      phaseDisplay.textContent = 'Ready to start';
      phaseDisplay.style.color = '#fff';
      
      lapList.innerHTML = '<li class="lap-item" style="color: #00ff87;">No laps recorded</li>';
    }
    
    function recordLap() {
      lapCount++;
      const lapTime = totalSeconds - remainingSeconds;
      const li = document.createElement('li');
      li.className = 'lap-item';
      li.innerHTML = `
        <span class="lap-number">Lap ${lapCount}</span>
        <span>${formatTime(lapTime)}</span>
      `;
      
      // Clear "no laps" message
      if (lapList.children[0] && lapList.children[0].textContent.includes('No laps')) {
        lapList.innerHTML = '';
      }
      
      lapList.appendChild(li);
      lapList.scrollTop = lapList.scrollHeight;
      
      playBeep(700, 150); // Lap beep
    }
    
    // Quick presets
    function setPreset(seconds) {
      totalSeconds = seconds;
      remainingSeconds = seconds;
      minutesInput.value = Math.floor(seconds / 60);
      secondsInput.value = seconds % 60;
      updateDisplay();
    }
    
    // Event Listeners
    startBtn.addEventListener('click', startTimer);
    stopBtn.addEventListener('click', pauseTimer);
    resetBtn.addEventListener('click', resetTimer);
    lapBtn.addEventListener('click', recordLap);
    
    // Change inputs on the fly
    minutesInput.addEventListener('change', () => {
      if (!isRunning) {
        totalSeconds = parseInt(minutesInput.value) * 60 + parseInt(secondsInput.value);
        remainingSeconds = totalSeconds;
        updateDisplay();
      }
    });
    
    secondsInput.addEventListener('change', () => {
      if (!isRunning) {
        totalSeconds = parseInt(minutesInput.value) * 60 + parseInt(secondsInput.value);
        remainingSeconds = totalSeconds;
        updateDisplay();
      }
    });
    
    // Preset buttons
    document.querySelectorAll('.preset-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        if (!isRunning) {
          setPreset(parseInt(btn.dataset.seconds));
        }
      });
    });
    
    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT') return;
      
      switch(e.key) {
        case ' ':
        case 'Enter':
          e.preventDefault();
          isRunning ? pauseTimer() : startTimer();
          break;
        case 'r':
        case 'R':
          if (isRunning) pauseTimer();
          resetTimer();
          break;
        case 'l':
        case 'L':
          if (isRunning) recordLap();
          break;
      }
    });
    
    // Initialize
    stopBtn.disabled = true;
    updateDisplay();
  </script>
</body>
</html>
