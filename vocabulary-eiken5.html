<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eiken 5 Vocabulary List — 653 Words</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .stats-bar {
            background: #f8f9fa;
            padding: 20px 40px;
            border-bottom: 2px solid #e9ecef;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 20px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-item .label {
            font-size: 0.85em;
            color: #666;
            margin-bottom: 5px;
        }

        .stat-item .value {
            font-size: 1.8em;
            font-weight: bold;
            color: #667eea;
        }

        .content {
            padding: 40px;
        }

        .toolbar {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            min-width: 200px;
            padding: 12px 20px;
            font-size: 1rem;
            border: 2px solid #667eea;
            border-radius: 10px;
        }

        .filter-btn {
            padding: 12px 24px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .filter-btn:hover, .filter-btn.active {
            background: #667eea;
            color: white;
        }

        .mode-toggle {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .vocabulary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .vocab-card {
            background: white;
            border: 2px solid #e9ecef;
            border-radius: 15px;
            padding: 25px;
            transition: all 0.3s ease;
            position: relative;
        }

        .vocab-card:hover {
            border-color: #667eea;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            transform: translateY(-5px);
        }

        .vocab-card.mastered {
            border-color: #28a745;
            background: #f8fff8;
        }

        .vocab-card.mastered::before {
            content: '✓';
            position: absolute;
            top: 15px;
            right: 15px;
            background: #28a745;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .english-word {
            font-size: 1.5em;
            font-weight: bold;
            color: #667eea;
        }

        .pos {
            display: inline-block;
            background: #e9ecef;
            color: #666;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: bold;
            text-transform: uppercase;
        }

        .pronunciation {
            color: #999;
            font-size: 0.9em;
            margin-bottom: 10px;
            font-style: italic;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .pronunciation:hover {
            color: #667eea;
        }

        .japanese-translation {
            color: #764ba2;
            font-size: 1.1em;
            margin-bottom: 12px;
        }

        .example-sentence {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            border-left: 3px solid #667eea;
            margin-bottom: 15px;
        }

        .example-english {
            color: #333;
            font-size: 0.95em;
            margin-bottom: 5px;
        }

        .example-japanese {
            color: #666;
            font-size: 0.85em;
            font-style: italic;
        }

        .card-actions {
            display: flex;
            gap: 10px;
        }

        .card-btn {
            flex: 1;
            padding: 8px 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85em;
            transition: all 0.3s ease;
        }

        .card-btn.master {
            background: #28a745;
            color: white;
        }

        .card-btn.master:hover {
            background: #218838;
        }

        .card-btn.unmaster {
            background: #dc3545;
            color: white;
        }

        .card-btn.unmaster:hover {
            background: #bd2130;
        }

        .card-btn.hide-jp {
            background: #667eea;
            color: white;
        }

        .card-btn.hide-jp:hover {
            background: #764ba2;
        }

        .hidden-japanese .japanese-translation,
        .hidden-japanese .example-japanese {
            opacity: 0.1;
            user-select: none;
        }

        .back-link {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 5px;
            margin-top: 20px;
        }

        .back-link:hover {
            background: rgba(255,255,255,0.3);
        }

        @media (max-width: 768px) {
            .stats-bar {
                padding: 20px;
                justify-content: center;
            }

            .stat-item {
                min-width: 100px;
            }

            .toolbar {
                flex-direction: column;
                gap: 10px;
            }

            .search-box {
                width: 100%;
            }

            .vocabulary-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 Eiken 5 Vocabulary List</h1>
            <p>Complete vocabulary list with 653 words, examples, and audio</p>
            <a href="index.html" class="back-link">← Back to Textbook</a>
        </div>

        <div class="stats-bar">
            <div class="stat-item">
                <div class="label">Total Words</div>
                <div class="value" id="totalWords">653</div>
            </div>
            <div class="stat-item">
                <div class="label">Mastered</div>
                <div class="value" id="masteredCount">0</div>
            </div>
            <div class="stat-item">
                <div class="label">Remaining</div>
                <div class="value" id="remainingCount">653</div>
            </div>
            <div class="stat-item">
                <div class="label">Progress</div>
                <div class="value" id="progressPercent">0%</div>
            </div>
        </div>

        <div class="content">
            <div class="toolbar">
                <input type="text" id="searchInput" class="search-box" placeholder="Search vocabulary...">
                
                <button class="filter-btn active" data-filter="all" id="filter-all">All</button>
                <button class="filter-btn" data-filter="noun" id="filter-nouns">Nouns (0)</button>
                <button class="filter-btn" data-filter="verb" id="filter-verbs">Verbs (0)</button>
                <button class="filter-btn" data-filter="adjective" id="filter-adjectives">Adjectives (0)</button>
                <button class="filter-btn" data-filter="adverb" id="filter-adverbs">Adverbs (0)</button>
                <button class="filter-btn" data-filter="preposition" id="filter-prepositions">Prepositions (0)</button>
                <button class="filter-btn" data-filter="conjunction" id="filter-conjunctions">Conjunctions (0)</button>
                <button class="filter-btn" data-filter="pronoun" id="filter-pronouns">Pronouns (0)</button>
                <button class="filter-btn" data-filter="determiner" id="filter-determiners">Determiners (0)</button>
                <button class="filter-btn" data-filter="article" id="filter-articles">Articles (0)</button>
                <button class="filter-btn" data-filter="interjection" id="filter-interjections">Interjections (0)</button>

                <div class="mode-toggle">
                    <button class="filter-btn" id="toggleJapanese">Show/Hide Japanese</button>
                </div>
            </div>

            <div class="vocabulary-grid" id="vocabGrid">
                <!-- Vocabulary cards will be generated here -->
            </div>
        </div>
    </div>

    <script src="analytics.js"></script>
    <script>
        // Track page view
        Analytics.trackPageView('vocabulary-eiken5.html');

        // Load vocabulary data from JSON
        let eiken5Vocab = [];
        
        async function loadVocabulary() {
            try {
                const response = await fetch('vocabulary-data/eiken5-500.json');
                const data = await response.json();
                
                // Convert JSON structure to flat array
                eiken5Vocab = [];
                
                // Helper to convert category arrays to flat vocab items
                function addVocabItems(items, defaultPos = 'noun') {
                    if (!items) return;
                    items.forEach(item => {
                        if (item.word && item.jp) {
                            eiken5Vocab.push({
                                en: item.word,
                                jp: item.jp,
                                pos: item.pos || defaultPos,
                                example: item.examples && item.examples[0] 
                                    ? { en: item.examples[0], jp: item.jp } 
                                    : { en: item.word, jp: item.jp }
                            });
                        }
                    });
                }
                
                // Add words from all categories
                if (data.categories) {
                    // Verbs from JSON
                    if (data.categories.verbs_top80) {
                        data.categories.verbs_top80.forEach(item => {
                            if (item.word) {
                                eiken5Vocab.push({
                                    en: item.word,
                                    jp: item.jp,
                                    pos: 'verb',
                                    emoji: item.emoji || '',
                                    example: item.examples && item.examples[0]
                                        ? { en: item.examples[0], jp: item.jp }
                                        : { en: item.word, jp: item.jp }
                                });
                            }
                        });
                    }
                    
                    // Adjectives
                    if (data.categories.adjectives_top60) {
                        data.categories.adjectives_top60.forEach(item => {
                            if (item.word) {
                                eiken5Vocab.push({
                                    en: item.word,
                                    jp: item.jp,
                                    pos: 'adjective',
                                    emoji: item.emoji || '',
                                    example: item.examples && item.examples[0]
                                        ? { en: item.examples[0], jp: item.jp }
                                        : { en: item.word, jp: item.jp }
                                });
                            }
                        });
                    }
                    
                    // Nouns by category (in categories object)
                    if (data.categories.nouns_by_category) {
                        Object.values(data.categories.nouns_by_category).forEach(category => {
                            category.forEach(item => {
                                if (item.word) {
                                    eiken5Vocab.push({
                                        en: item.word,
                                        jp: item.jp,
                                        pos: 'noun',
                                        emoji: item.emoji || '',
                                        example: { en: item.word, jp: item.jp }
                                    });
                                }
                            });
                        });
                    }
                    
                    // Function words (at root level, not in categories object)
                    if (data.function_words) {
                        const funcWords = [
                            ...data.function_words.articles.map(w => ({ word: w, pos: 'article' })),
                            ...data.function_words.prepositions.map(w => ({ word: w, pos: 'preposition' })),
                            ...data.function_words.conjunctions.map(w => ({ word: w, pos: 'conjunction' })),
                            ...data.function_words.pronouns.map(w => ({ word: w, pos: 'pronoun' })),
                            ...data.function_words.interjections.map(w => ({ word: w, pos: 'interjection' }))
                        ];
                        
                        funcWords.forEach(item => {
                            eiken5Vocab.push({
                                en: item.word,
                                jp: '',
                                pos: item.pos,
                                example: { en: item.word, jp: '' }
                            });
                        });
                    }
                }
                
                // Update page title with actual count
                document.title = `Eiken 5 Vocabulary List — ${eiken5Vocab.length} Words`;
                // Also update the heading
                const heading = document.querySelector('.header h1');
                if (heading) {
                    heading.textContent = `📚 Eiken 5 Vocabulary List — ${eiken5Vocab.length} Words`;
                }
                
                // Initialize UI now that data is loaded
                initializeVocabularyUI();
                
            } catch (error) {
                console.error('Failed to load vocabulary:', error);
                alert('Failed to load vocabulary data');
            }
        }
        
        // Initialize mastery tracking
        let masteredWords = JSON.parse(localStorage.getItem('vocabularyMastered') || '{}');

        // Update stats
        function updateStats() {
            const mastered = Object.keys(masteredWords).length;
            const total = eiken5Vocab.length;
            const remaining = total - mastered;
            const percent = Math.round((mastered / total) * 100);

            document.getElementById('masteredCount').textContent = mastered;
            document.getElementById('remainingCount').textContent = remaining;
            document.getElementById('progressPercent').textContent = percent + '%';
        }

        // Render vocabulary cards
        function renderVocabulary(vocabList) {
            const grid = document.getElementById('vocabGrid');

            if (vocabList.length === 0) {
                grid.innerHTML = '<div class="empty-state"><h3>No words found</h3><p>Try adjusting your search or filter.</p></div>';
                return;
            }

            // Sort alphabetically by English word
            const sortedList = [...vocabList].sort((a, b) => a.en.localeCompare(b.en));

            grid.innerHTML = sortedList.map((word, index) => `
                <div class="vocab-card" data-word="${word.en}" data-pos="${word.pos}">
                    <div class="card-header">
                        <div class="english-word">${word.emoji ? word.emoji + ' ' : ''}${word.en}</div>
                        <div class="pos">${word.pos}</div>
                    </div>
                    <div class="pronunciation" onclick="speak('${word.en}')">
                        🔊 ${word.en.split('(')[0].trim().toLowerCase()}
                    </div>
                    <div class="japanese-translation">${word.jp}</div>
                    <div class="example-sentence">
                        <div class="example-english">${word.example.en}</div>
                        <div class="example-japanese">${word.example.jp}</div>
                    </div>
                    <div class="card-actions">
                        <button class="card-btn master" onclick="markMastered('${word.en}')">
                            ✓ Mastered
                        </button>
                        <button class="card-btn unmaster hide-jp" onclick="unmarkMastered('${word.en}')">
                            ✗ Not Yet
                        </button>
                    </div>
                </div>
            `).join('');

            // Apply mastery styling
            vocabList.forEach(word => {
                if (masteredWords[word.en]) {
                    const card = document.querySelector(`.vocab-card[data-word="${word.en}"]`);
                    if (card) card.classList.add('mastered');
                }
            });

            updateStats();
        }

        // Speak word using Web Speech API
        function speak(word) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(word);
                utterance.lang = 'en-US';
                utterance.rate = 0.8;
                speechSynthesis.speak(utterance);
            } else {
                alert('Sorry, your browser does not support text-to-speech.');
            }
        }

        // Mark word as mastered
        window.markMastered = function(word) {
            masteredWords[word] = true;
            localStorage.setItem('vocabularyMastered', JSON.stringify(masteredWords));
            
            const card = document.querySelector(`.vocab-card[data-word="${word}"]`);
            if (card) card.classList.add('mastered');
            
            updateStats();
        };

        // Unmark word as mastered
        window.unmarkMastered = function(word) {
            delete masteredWords[word];
            localStorage.setItem('vocabularyMastered', JSON.stringify(masteredWords));
            
            const card = document.querySelector(`.vocab-card[data-word="${word}"]`);
            if (card) card.classList.remove('mastered');
            
            updateStats();
        };

        // Search functionality
        document.getElementById('searchInput').addEventListener('input', function() {
            const searchTerm = this.value.toLowerCase();
            const filtered = eiken5Vocab.filter(word => 
                word.en.toLowerCase().includes(searchTerm) || 
                word.jp.includes(searchTerm) ||
                word.example.en.toLowerCase().includes(searchTerm) ||
                word.example.jp.includes(searchTerm)
            );
            applyCurrentFilter(filtered);
        });

        // Filter buttons
        let currentFilter = 'all';
        const filterButtons = document.querySelectorAll('.filter-btn[data-filter]');
        
        filterButtons.forEach(btn => {
            btn.addEventListener('click', function() {
                filterButtons.forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentFilter = this.dataset.filter;
                
                if (currentFilter === 'all') {
                    renderVocabulary(eiken5Vocab);
                } else {
                    const filtered = eiken5Vocab.filter(word => word.pos === currentFilter);
                    renderVocabulary(filtered);
                }
            });
        });

        // Toggle Japanese visibility
        document.getElementById('toggleJapanese').addEventListener('click', function() {
            const grid = document.getElementById('vocabGrid');
            grid.classList.toggle('hidden-japanese');
        });

        function applyCurrentFilter(wordList) {
            if (currentFilter === 'all') {
                renderVocabulary(wordList);
            } else {
                const filtered = wordList.filter(word => word.pos === currentFilter);
                renderVocabulary(filtered);
            }
        }
        
        // Update filter button counts
        function updateFilterCounts() {
            const filterMap = {
                'nouns': 'Nouns',
                'verbs': 'Verbs',
                'adjectives': 'Adjectives',
                'adverbs': 'Adverbs',
                'prepositions': 'Prepositions',
                'conjunctions': 'Conjunctions',
                'pronouns': 'Pronouns',
                'determiners': 'Determiners',
                'articles': 'Articles',
                'interjections': 'Interjections'
            };

            const posMap = {
                'nouns': 'noun',
                'verbs': 'verb',
                'adjectives': 'adjective',
                'adverbs': 'adverb',
                'prepositions': 'preposition',
                'conjunctions': 'conjunction',
                'pronouns': 'pronoun',
                'determiners': 'determiner',
                'articles': 'article',
                'interjections': 'interjection'
            };

            Object.keys(filterMap).forEach(filterKey => {
                const label = filterMap[filterKey];
                const pos = posMap[filterKey];
                const count = eiken5Vocab.filter(word => word.pos === pos).length;
                const btn = document.getElementById(`filter-${filterKey}`);
                if (btn) {
                    btn.textContent = `${label} (${count})`;
                }
            });

            // Update All button with total count
            const allBtn = document.getElementById('filter-all');
            if (allBtn) {
                allBtn.textContent = `All (${eiken5Vocab.length})`;
            }
        }

        // Initialize UI after vocabulary is loaded
        function initializeVocabularyUI() {
            updateFilterCounts();
            renderVocabulary(eiken5Vocab);
            updateStats();

            // Mark mastered words
            Object.keys(masteredWords).forEach(word => {
                if (masteredWords[word]) {
                    const card = document.querySelector(`.vocab-card[data-word="${word}"]`);
                    if (card) card.classList.add('mastered');
                }
            });
        }

        // Initialize - load vocabulary data
        loadVocabulary();

        // Say something
        function sayIt(msg) {
            console.log(msg);
        }
    </script>
</body>
</html>
